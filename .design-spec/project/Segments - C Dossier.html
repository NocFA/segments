<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Segments · Dossier</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; background:#efece4; color:#161312; height:100%; }
  * { box-sizing: border-box; }
  ::selection { background: rgba(168,41,31,0.2); }
  input::placeholder, textarea::placeholder { color: #a49d8f; font-style: italic; }
  .seg-blink-c { animation: segBlinkC 1.4s ease-in-out infinite; }
  @keyframes segBlinkC { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .seg-pulse-c { animation: segPulseC 1.4s ease-out; }
  @keyframes segPulseC {
    0% { background: rgba(168,41,31,0.1); box-shadow: 0 0 0 0 rgba(168,41,31,0.3);}
    100% { background: transparent; box-shadow: 0 0 0 12px rgba(168,41,31,0);}
  }
  .seg-enter-c { animation: segEnterC 560ms cubic-bezier(.2,.7,.2,1); }
  @keyframes segEnterC {
    0%   { opacity:0; transform: translateY(-8px); background: rgba(168,41,31,0.06); }
    100% { opacity:1; transform: none; background: transparent; }
  }
  *::-webkit-scrollbar { width:10px; height:10px; }
  *::-webkit-scrollbar-thumb { background: rgba(22,19,18,0.2); }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="shared/seed.js"></script>
<script type="text/babel" src="shared/direction-a-components.jsx"></script>
<script type="text/babel" src="direction-a-app.jsx"></script>
<script type="text/babel" src="direction-c-app.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<SegmentsC/>);
</script>
</body>
</html>
