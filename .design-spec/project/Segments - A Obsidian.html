<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Segments · Obsidian</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin:0; padding:0; background:#0e1012; color:#e7e5e2; height:100%; }
  * { box-sizing: border-box; }
  ::selection { background: rgba(122,167,217,0.25); }
  input::placeholder, textarea::placeholder { color: #5b5b57; }
  /* status pulse */
  .seg-pulse { animation: segPulse 1.4s ease-out; }
  @keyframes segPulse {
    0%   { box-shadow: 0 0 0 0 rgba(122,167,217,0.55); }
    100% { box-shadow: 0 0 0 8px rgba(122,167,217,0); }
  }
  .seg-enter { animation: segSlideIn 420ms cubic-bezier(.2,.7,.2,1); }
  @keyframes segSlideIn {
    0%   { opacity:0; transform: translateY(-6px); background: rgba(122,167,217,0.08); }
    100% { opacity:1; transform: none; background: transparent; }
  }
  .seg-agent-dot { animation: segDot 1.6s ease-in-out infinite; }
  @keyframes segDot {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  /* scrollbar */
  *::-webkit-scrollbar { width:10px; height:10px; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius:5px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
  *::-webkit-scrollbar-track { background: transparent; }
  [data-theme="light"] *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
  [data-theme="light"] ::selection { background: rgba(46,90,138,0.2); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="shared/seed.js"></script>
<script type="text/babel" src="shared/direction-a-components.jsx"></script>
<script type="text/babel" src="direction-a-app.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<SegmentsA/>);
</script>
</body>
</html>
