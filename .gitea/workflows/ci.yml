name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-linux:
    name: Test (linux/amd64)
    runs-on: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install musl
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: CGO_ENABLED=1 CC=musl-gcc go build ./cmd/segments/

      - name: Test
        run: CGO_ENABLED=1 CC=musl-gcc go test ./...

  test-darwin:
    name: Test (darwin/arm64)
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/segments/

      - name: Test
        run: CGO_ENABLED=1 go test ./...
