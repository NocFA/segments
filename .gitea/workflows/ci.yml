name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-linux:
    name: Test (linux/amd64)
    runs-on: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install musl
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: CGO_ENABLED=1 CC=musl-gcc go build ./cmd/segments/

      - name: Test
        run: CGO_ENABLED=1 CC=musl-gcc go test ./...

  test-darwin:
    name: Test (darwin/arm64)
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/segments/

      - name: Test
        run: CGO_ENABLED=1 go test ./...

  build-windows:
    name: Build (windows/amd64)
    runs-on: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mingw-w64
        run: sudo apt-get install -y mingw-w64

      - name: Build
        run: |
          cp web/index.html internal/server/index.html
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build \
            -ldflags "-extldflags '-static'" \
            -o segments.exe ./cmd/segments/
