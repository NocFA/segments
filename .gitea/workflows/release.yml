name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: linux-amd64
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create release
        id: create
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          API: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
        run: |
          response=$(curl -fsSL -X POST "${API}/repos/${REPO}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${TAG}\",\"draft\":false,\"prerelease\":true}")
          release_id=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build (linux/amd64)
    needs: create-release
    runs-on: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install musl
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: |
          CGO_ENABLED=1 CC=musl-gcc go build \
            -ldflags "-X main.version=${{ github.ref_name }} -linkmode external -extldflags '-static'" \
            -o segments-linux-amd64 ./cmd/segments/

      - name: Upload
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@segments-linux-amd64" \
            "${API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=segments-linux-amd64"

  build-windows-amd64:
    name: Build (windows/amd64)
    needs: create-release
    runs-on: linux-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mingw-w64
        run: sudo apt-get install -y mingw-w64

      - name: Build
        run: |
          cp web/index.html internal/server/index.html
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc go build \
            -ldflags "-X main.version=${{ github.ref_name }} -extldflags '-static'" \
            -o segments-windows-amd64.exe ./cmd/segments/

      - name: Upload
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@segments-windows-amd64.exe" \
            "${API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=segments-windows-amd64.exe"

  build-darwin-arm64:
    name: Build (darwin/arm64)
    needs: create-release
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          CGO_ENABLED=1 GOARCH=arm64 go build \
            -ldflags "-X main.version=${{ github.ref_name }}" \
            -o segments-darwin-arm64 ./cmd/segments/

      - name: Upload
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.server_url }}/api/v1
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@segments-darwin-arm64" \
            "${API}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=segments-darwin-arm64"

