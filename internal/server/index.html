<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segments</title>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface-hover: #222;
  --fg: #d4d4d4;
  --fg-bright: #f0f0f0;
  --dim: #737373;
  --border: #333;
  --accent: #4a9eff;
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono: "SF Mono", Menlo, Monaco, "Cascadia Code", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font: 14px/1.6 var(--font);
  padding: 24px;
}
.container { max-width: 720px; margin: 0 auto; }

header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
h1 { font-size: 20px; font-weight: 500; color: var(--fg-bright); letter-spacing: -0.3px; }

.ws-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--dim);
}
.ws-indicator.connected { background: var(--success); }

.toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
.toolbar select {
  flex: 1;
  max-width: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 8px 12px;
  border-radius: 4px;
  font-size: 13px;
}
.toolbar button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 8px 14px;
  border-radius: 4px;
  font-size: 13px;
}
.toolbar button:hover { border-color: var(--accent); color: var(--fg-bright); }

.task-form { display: flex; gap: 8px; margin-bottom: 20px; }
.task-form input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--fg-bright);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 14px;
}
.task-form input::placeholder { color: var(--dim); }
.task-form input:focus { outline: none; border-color: var(--accent); }
.task-form button {
  background: var(--accent);
  border: none;
  color: #000;
  padding: 10px 18px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 500;
}
.task-form button:hover { opacity: 0.9; }

.task-list { display: flex; flex-direction: column; gap: 12px; }

.task {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
}
.task:hover { border-color: #444; }
.task.expanded { border-color: var(--accent); }

.task-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-todo { background: #262626; color: #a3a3a3; }
.status-in_progress { background: #1e3a5f; color: #60a5fa; }
.status-done { background: #14532d; color: #4ade80; }
.status-blocker { background: #450a0a; color: #f87171; }

.task-title { flex: 1; font-weight: 500; color: var(--fg-bright); font-size: 15px; }
.priority { font-size: 11px; color: var(--dim); font-family: var(--font-mono); }

.task-body {
  margin-top: 10px;
  padding: 12px;
  background: #0f0f0f;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: #a3a3a3;
  white-space: pre-wrap;
  line-height: 1.5;
  border: 1px solid #222;
}

.task .blocker {
  display: block;
  margin-top: 8px;
  font-size: 11px;
  color: var(--warning);
  font-family: var(--font-mono);
}

.task-edit {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: none;
}
.task.expanded .task-edit { display: block; }

.task-edit input {
  width: 100%;
  background: #0f0f0f;
  border: 1px solid var(--border);
  color: var(--fg-bright);
  padding: 10px 12px;
  border-radius: 4px;
  font-size: 14px;
  margin-bottom: 10px;
}
.task-edit input:focus { outline: none; border-color: var(--accent); }

.task-edit textarea {
  width: 100%;
  min-height: 100px;
  background: #0f0f0f;
  border: 1px solid var(--border);
  color: var(--fg-bright);
  padding: 12px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  resize: vertical;
}
.task-edit textarea:focus { outline: none; border-color: var(--accent); }

.task-edit-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}
.task-edit select {
  background: #0f0f0f;
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
}
.task-edit select.edit-blocked-by {
  color: var(--warning);
}
.task-edit button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
}
.task-edit button:hover { border-color: var(--accent); }
.task-edit button.save-btn { background: var(--accent); color: #000; border: none; font-weight: 500; }
.task-edit button.delete-btn { color: var(--danger); }
.task-edit button.delete-btn:hover { border-color: var(--danger); }

.empty { color: var(--dim); text-align: center; padding: 40px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>Segments</h1>
<div class="ws-indicator" id="ws"></div>
</header>
<div class="toolbar">
<select id="projectSelect"><option value="">Select Project</option></select>
<button id="newProjectBtn">New Project</button>
</div>
<div class="task-form">
<input type="text" id="taskInput" placeholder="Add a new task...">
<button id="addTaskBtn">Add</button>
</div>
<div class="task-list" id="taskList"></div>
</div>
<script>
const wsPath = '/ws';
let ws, projects = [], tasks = [], reconnectDelay = 1000, reconnectTimer;
const projectSelect = document.getElementById('projectSelect');
const taskList = document.getElementById('taskList');
const taskInput = document.getElementById('taskInput');
const wsIndicator = document.getElementById('ws');

function connect() {
  ws = new WebSocket('ws://' + location.host + wsPath);
  ws.onopen = () => {
    wsIndicator.classList.add('connected');
    reconnectDelay = 1000;
    send({type: 'connected'});
  };
  ws.onclose = () => {
    wsIndicator.classList.remove('connected');
    reconnectTimer = setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function send(msg) { ws && ws.send(JSON.stringify(msg)); }

function handleMessage(msg) {
  switch(msg.type) {
    case 'connected':
      loadProjects();
      break;
    case 'task:created':
    case 'task:updated':
      if (msg.data && msg.data.project_id === projectSelect.value) {
        upsertTaskLocal(msg.data);
        sortAndRender();
      } else if (!msg.data) {
        loadTasks();
      }
      break;
    case 'tasks:created':
      if (Array.isArray(msg.data)) {
        const pid = projectSelect.value;
        let changed = false;
        for (const t of msg.data) {
          if (t && t.project_id === pid) {
            upsertTaskLocal(t);
            changed = true;
          }
        }
        if (changed) sortAndRender();
      }
      break;
    case 'task:deleted':
      if (msg.data && msg.data.id) {
        const before = tasks.length;
        tasks = tasks.filter(t => t.id !== msg.data.id);
        if (tasks.length !== before) renderTasks();
      } else {
        loadTasks();
      }
      break;
    case 'project:created':
    case 'project:updated':
    case 'project:deleted':
      loadProjects();
      break;
  }
}

function upsertTaskLocal(task) {
  const idx = tasks.findIndex(t => t.id === task.id);
  if (idx >= 0) tasks[idx] = task;
  else tasks.push(task);
}

function sortAndRender() {
  tasks.sort((a,b) => a.sort_order - b.sort_order);
  renderTasks();
}

async function loadProjects() {
  const r = await fetch('/api/projects');
  projects = await r.json();
  projectSelect.innerHTML = '<option value="">Select Project</option>' +
    projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  if (projects.length && !projectSelect.value) {
    projectSelect.value = projects[0].id;
    loadTasks();
  }
}

async function loadTasks() {
  const pid = projectSelect.value;
  if (!pid) { tasks = []; renderTasks(); return; }
  const r = await fetch('/api/projects/' + pid + '/tasks');
  tasks = await r.json();
  tasks.sort((a,b) => a.sort_order - b.sort_order);
  renderTasks();
}

function renderTasks() {
  if (!tasks.length) {
    taskList.innerHTML = '<div class="empty">No tasks</div>';
    return;
  }
  const expanded = new Set();
  taskList.querySelectorAll('.task.expanded').forEach(el => expanded.add(el.dataset.id));
  taskList.innerHTML = tasks.map(t => {
    const blocker = t.blocked_by ? tasks.find(x => x.id === t.blocked_by) : null;
    const blockerLabel = blocker ? `<span class="blocker">← blocked by ${escape(blocker.title.substring(0,15))}</span>` : '';
    const blockerOptions = tasks.filter(x => x.id !== t.id).map(x => `<option value="${x.id}" ${t.blocked_by===x.id?'selected':''}>${escape(x.title.substring(0,20))}</option>`).join('');
    return '<div class="task" data-id="' + t.id + '">' +
      '<div class="task-header">' +
      '<span class="status-badge status-' + t.status + '">' + t.status + '</span>' +
      '<span class="task-title">' + escape(t.title) + '</span>' +
      '<span class="priority">P' + t.priority + '</span>' +
      '</div>' +
      (t.body ? '<div class="task-body">' + escape(t.body) + '</div>' : '') +
      blockerLabel +
      '<div class="task-edit">' +
      '<input type="text" class="edit-title" value="' + escape(t.title) + '">' +
      '<textarea class="edit-body">' + escape(t.body || '') + '</textarea>' +
      '<div class="task-edit-row">' +
      '<select class="edit-status">' +
      '<option value="todo" ' + (t.status==='todo'?'selected':'') + '>todo</option>' +
      '<option value="in_progress" ' + (t.status==='in_progress'?'selected':'') + '>in_progress</option>' +
      '<option value="done" ' + (t.status==='done'?'selected':'') + '>done</option>' +
      '<option value="blocker" ' + (t.status==='blocker'?'selected':'') + '>blocker</option>' +
      '</select>' +
      '<select class="edit-priority">' +
      [0,1,2,3].map(p => '<option value="' + p + '" ' + (t.priority===p?'selected':'') + '>P' + p + '</option>').join('') +
      '</select>' +
      '<select class="edit-blocked-by">' +
      '<option value="">-- blocks --</option>' +
      blockerOptions +
      '</select>' +
      '</div>' +
      '<div class="task-edit-row">' +
      '<button class="save-btn">Save</button>' +
      '<button class="delete-btn">Delete</button>' +
      '</div>' +
      '</div>' +
      '</div>';
  }).join('');
  if (expanded.size) {
    taskList.querySelectorAll('.task').forEach(el => {
      if (expanded.has(el.dataset.id)) el.classList.add('expanded');
    });
  }
}

function escape(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

taskInput.addEventListener('keypress', (e) => { if(e.key==='Enter') addTask(); });
document.getElementById('addTaskBtn').addEventListener('click', addTask);
projectSelect.addEventListener('change', loadTasks);

async function addTask() {
  const title = taskInput.value.trim();
  const pid = projectSelect.value;
  if (!title || !pid) return;
  await fetch('/api/projects/' + pid + '/tasks', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title, body: '', priority: 0})
  });
  taskInput.value = '';
}

taskList.addEventListener('click', async (e) => {
  const taskEl = e.target.closest('.task');
  if (!taskEl) return;
  const id = taskEl.dataset.id;
  if (e.target.classList.contains('save-btn')) {
    const task = tasks.find(t => t.id === id);
    const newTitle = taskEl.querySelector('.edit-title').value;
    const newBody = taskEl.querySelector('.edit-body').value;
    const newStatus = taskEl.querySelector('.edit-status').value;
    const newPriority = parseInt(taskEl.querySelector('.edit-priority').value);
    const newBlockedBy = taskEl.querySelector('.edit-blocked-by').value;
    await fetch('/api/tasks/' + id, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({project_id: task.project_id, title: newTitle, body: newBody, status: newStatus, priority: newPriority, blocked_by: newBlockedBy})
    });
    taskEl.classList.remove('expanded');
  } else if (e.target.classList.contains('delete-btn')) {
    if (!confirm('Delete task?')) return;
    const task = tasks.find(t => t.id === id);
    await fetch('/api/tasks/' + id + '?project_id=' + task.project_id, {method: 'DELETE'});
  } else if (!e.target.closest('.task-edit')) {
    taskEl.classList.toggle('expanded');
  }
});

taskList.addEventListener('keydown', (e) => {
  if (e.target.classList.contains('edit-body') && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    e.target.closest('.task').querySelector('.save-btn').click();
  }
});

document.getElementById('newProjectBtn').addEventListener('click', async () => {
  const name = prompt('Project name:');
  if (!name) return;
  await fetch('/api/projects', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
});

connect();
loadProjects();
</script>
</body>
</html>
