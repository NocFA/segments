function conKanbanCard(T, t, byId) {
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const selected = Store.selectedId === t.id;
  const dragging = Store.dragging === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['kanban-card', 's-' + t.status];
  if (selected) classes.push('selected');
  if (dragging) classes.push('dragging');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const bangs = ['!!!', '!!', '!', '\u00B7'];
  const bang = bangs[t.priority] || '\u00B7';

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : 'resolved') + '" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? '\u2298' : '\u2713') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span></span>';

  return '<div class="' + classes.join(' ') + '" draggable="true" data-act="kanban-card" data-id="' + Util.esc(t.id) + '" aria-label="' + Util.esc(t.title) + '">' +
    '<div class="card-top">' +
      '<span class="pri-bang p' + t.priority + '" aria-label="Priority P' + t.priority + '">' + bang + '</span>' +
      '<span class="card-id" title="' + Util.esc(t.id) + '">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
    '</div>' +
    '<div class="card-title">' + Util.esc(t.title) + '</div>' +
    '<div class="card-bottom">' +
      blockerChip +
      '<span class="card-time">' + Util.esc(Util.relTime(t.updated_at)) + '</span>' +
    '</div>' +
  '</div>';
}

function conGraphView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="graph"><div class="empty">' +
      (hasActiveScope()
        ? '$ no tasks' + (Store.search ? ' match \u201C' + Util.esc(Store.search) + '\u201D' : '') + '. press <kbd>c</kbd> to create.'
        : '$ select or create a project to get started.') +
    '</div></div>';
  }
  const layout = Graph.layout(tasks, byId, {
    W: 168, H: 58, gapX: 18, gapY: 30, padX: 20, padY: 20, rankGap: 12,
    containerW: Graph.containerWidth(),
  });
  const ready = new Set(Util.ready(Store.tasks).map(t => t.id));
  const readyInView = tasks.reduce((n, t) => n + (ready.has(t.id) ? 1 : 0), 0);
  const sel = Store.selectedId;
  const focus = Graph.focusSet(sel, tasks, byId);
  const blockingMap = Graph.blockingMap(tasks);
  const edges = Graph.edges(tasks, byId).map(e => {
    const from = layout.pos[e.parent.id], to = layout.pos[e.child.id];
    if (!from || !to) return '';
    const x1 = from.x + layout.W / 2, y1 = from.y + layout.H;
    const x2 = to.x + layout.W / 2, y2 = to.y;
    const mid = (y1 + y2) / 2;
    const inFocus = !focus || (focus.has(e.parent.id) && focus.has(e.child.id));
    const cls = 'edge ' + (e.blocked ? 'blocked' : 'open') + (inFocus ? '' : ' off');
    const marker = e.blocked ? 'con-arrow-r' : 'con-arrow';
    return '<path class="' + cls + '" d="M ' + x1 + ' ' + y1 + ' L ' + x1 + ' ' + mid + ' L ' + x2 + ' ' + mid + ' L ' + x2 + ' ' + y2 + '" marker-end="url(#' + marker + ')"></path>';
  }).join('');
  const nodes = tasks.map(t => {
    const p = layout.pos[t.id]; if (!p) return '';
    const isReady = ready.has(t.id);
    const isSel = sel === t.id;
    const blocks = blockingMap.get(t.id) || 0;
    const cls = ['g-node', 's-' + t.status, 'p-' + t.priority];
    if (isSel) cls.push('sel');
    if (isReady) cls.push('ready');
    if (blocks > 0) cls.push('is-blocking');
    if (focus && !focus.has(t.id)) cls.push('off');
    const priTag = t.priority === 0 ? '' :
      ' \u00B7 <tspan class="g-pri p-' + t.priority + '">[P' + t.priority + ']</tspan>';
    const depsTag = blocks > 0 ? ' \u00B7 <tspan class="g-deps">[BLK&gt;' + blocks + ']</tspan>' : '';
    return '<g class="' + cls.join(' ') + '" data-act="select" data-id="' + Util.esc(t.id) + '" transform="translate(' + p.x + ',' + p.y + ')">' +
      (isReady ? '<rect class="ring" x="-2" y="-2" width="' + (layout.W + 4) + '" height="' + (layout.H + 4) + '"></rect>' : '') +
      '<rect class="bg" width="' + layout.W + '" height="' + layout.H + '"></rect>' +
      '<text class="g-meta" x="10" y="14">' + Util.esc(Util.shortId(t.id, 8)) + priTag + depsTag + '</text>' +
      '<line class="bar" x1="0" y1="22" x2="' + layout.W + '" y2="22"></line>' +
      '<foreignObject x="10" y="26" width="' + (layout.W - 20) + '" height="' + (layout.H - 30) + '">' +
        '<div xmlns="http://www.w3.org/1999/xhtml" class="g-title">' + Util.esc(t.title) + '</div>' +
      '</foreignObject>' +
    '</g>';
  }).join('');
  const inTree = Store.filter === 'ready';
  return '<div class="graph' + (sel ? ' has-detail' : '') + '" data-act="deselect">' +
    '<div class="graph-head">' +
      '<span class="head-tag">' + (inTree ? 'TREE' : 'DAG') + '[' + tasks.length + ']</span>' +
      '<span>topological \u00B7 top\u2192down \u00B7 ' + readyInView + ' ready</span>' +
      '<span><span class="d-ready">\u25CF</span> ready \u00B7 <span class="d-blk">\u25CF</span> blocked \u00B7 <span class="d-act">\u25CF</span> in-flight</span>' +
    '</div>' +
    '<svg class="graph-svg" width="' + layout.width + '" height="' + layout.height + '">' +
      '<defs>' +
        '<marker id="con-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow open"></path></marker>' +
        '<marker id="con-arrow-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow blocked"></path></marker>' +
      '</defs>' +
      '<rect class="g-bg" data-act="deselect" width="' + layout.width + '" height="' + layout.height + '"></rect>' +
      edges +
      nodes +
    '</svg>' +
  '</div>';
}

function conListView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="list"><div class="empty">' +
      (hasActiveScope()
        ? '$ no tasks' + (Store.search ? ' match “' + Util.esc(Store.search) + '”' : '') + '. press <kbd>c</kbd> to create.'
        : '$ select or create a project to get started.') +
    '</div></div>';
  }
  const groups = groupedByStatus(tasks);
  return '<div class="list" role="grid" aria-label="Task list">' +
    groups.map(g => {
      const meta = T.statusMeta[g.key];
      const label = meta ? meta.label : g.key;
      const rule = '─'.repeat(Math.max(2, 40 - label.length - String(g.items.length).length));
      return '<div class="list-group" role="rowgroup">' +
        '<div class="list-group-header g-' + g.key + '" role="row">' +
          '── ' + Util.esc(label) + ' · ' + g.items.length + ' ' + rule +
        '</div>' +
        g.items.map(t => conListRow(T, t, byId)).join('') +
      '</div>';
    }).join('') +
  '</div>';
}

function conListRow(T, t, byId) {
  const meta = T.statusMeta[t.status];
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const body1 = Util.firstLine(t.body);
  const selected = Store.selectedId === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['row', 's-' + t.status];
  if (selected) classes.push('selected');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const bangs = ['!!!', '!!', '!', '·'];
  const bang = bangs[t.priority] || '·';

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : 'resolved') + '" role="gridcell" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? '⊘' : '✓') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span role="gridcell"></span>';

  const statusLabel = meta ? meta.label : t.status;
  const projChip = projectChipHTML(t);
  return '<div class="' + classes.join(' ') + '" role="row" tabindex="0" aria-selected="' + (selected ? 'true' : 'false') + '" aria-label="' + Util.esc(statusLabel + ' · ' + t.title) + '" data-act="select" data-id="' + Util.esc(t.id) + '">' +
    '<span class="row-marker" role="gridcell" aria-hidden="true">' + (selected ? '▸' : ' ') + '</span>' +
    '<span class="pri-bang p' + t.priority + '" role="gridcell" aria-label="Priority P' + t.priority + '">' + bang + '</span>' +
    '<span class="status-pill s-' + t.status + '" role="gridcell">' +
      '<span class="mark" aria-hidden="true">' + (meta ? meta.glyph : '') + '</span>' +
      '<span class="label">' + Util.esc(statusLabel) + '</span>' +
    '</span>' +
    '<span class="row-id" role="gridcell" title="' + Util.esc(t.id) + '">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
    '<span class="row-title-wrap" role="gridcell">' +
      '<span class="row-title">' + Util.esc(t.title) + '</span>' +
      (body1 ? '<span class="row-body">// ' + Util.esc(body1) + '</span>' : '') +
      projChip +
    '</span>' +
    blockerChip +
    '<span class="row-time" role="gridcell">' + Util.esc(Util.relTime(t.updated_at)) + '</span>' +
  '</div>';
}

function conDetail(T, task, byId) {
  const proj = Store.projects.find(p => p.id === task.project_id);
  const blocker = task.blocked_by ? byId[task.blocked_by] : null;
  const dependents = Object.values(byId).filter(t => t.blocked_by === task.id);
  const statusOpts = Object.keys(T.statusMeta).map(s =>
    '<option value="' + s + '"' + (task.status === s ? ' selected' : '') + '>' +
    T.statusMeta[s].glyph + ' ' + T.statusMeta[s].label + '</option>').join('');

  const editing = Store.editingBody !== null || Store.editingTitle !== null;
  const titleHtml = Store.editingTitle !== null
    ? '<input class="composer-title" type="text" value="' + Util.esc(Store.editingTitle) + '" aria-label="Task title" data-act="detail-edit-title" style="background:var(--seg-surface);border:1px solid var(--seg-line);padding:8px 12px;width:calc(100% - 28px);margin:14px 14px 8px;font-family:var(--seg-font-body)">'
    : '<h2 class="detail-title" tabindex="0" role="button" aria-label="Edit title" data-act="edit-title">' + Util.esc(task.title) + '</h2>';
  const bodyHtml = Store.editingBody !== null
    ? '<div class="detail-body"><textarea data-act="detail-edit-body">' + Util.esc(Store.editingBody) + '</textarea><div style="margin-top:6px;font-size:10px;color:var(--seg-faint)"><kbd>⌘↵</kbd> save · <kbd>esc</kbd> cancel</div></div>'
    : '<div class="detail-body" data-act="edit-body">' +
        (task.body ? Util.esc(task.body) : '<span style="color:var(--seg-faint)">// no body. click to add.</span>') +
      '</div>';

  return '<aside class="detail">' +
    '<div class="detail-head">' +
      '<span class="id">$ task show ' + Util.esc(Util.shortId(task.id, 12)) + (proj ? ' · ' + Util.esc(proj.name) : '') + '</span>' +
      '<button class="detail-close" data-act="deselect">[x]</button>' +
    '</div>' +
    titleHtml +
    '<div class="detail-meta">' +
      '<span>status</span>' +
      '<span class="seg-select-wrap"><select data-act="detail-status">' + statusOpts + '</select></span>' +
      '<span>priority</span>' +
      '<span class="seg-select-wrap"><select data-act="detail-priority">' +
        [0, 1, 2, 3].map(p => '<option value="' + p + '"' + (task.priority === p ? ' selected' : '') + '>P' + p + '</option>').join('') +
      '</select></span>' +
      '<span>blocked_by</span>' +
      '<span class="blocker-cell">' + renderBlockerCombo('detail', task.blocked_by || '', task.id) + '</span>' +
      (Store.scope === 'all' && proj ? '<span>project</span><span class="val">' + Util.esc(proj.name) + '</span>' : '') +
      '<span>updated</span>' +
      '<span class="val mono">' + Util.esc(Util.relTime(task.updated_at)) + '</span>' +
      '<span>created</span>' +
      '<span class="val mono">' + Util.esc(Util.relTime(task.created_at)) + '</span>' +
      (task.closed_at ? '<span>closed</span><span class="val mono">' + Util.esc(Util.relTime(task.closed_at)) + '</span>' : '') +
    '</div>' +
    bodyHtml +
    (blocker || dependents.length ? '<div class="detail-rel">' +
      (blocker ? '<div style="margin-bottom:10px"><div class="section-title">// blocked_by</div>' +
        '<div class="rel-row" data-act="select" data-id="' + Util.esc(blocker.id) + '">' +
          '<span class="status-pill s-' + blocker.status + '"><span class="mark">' + T.statusMeta[blocker.status].glyph + '</span></span>' +
          '<span class="rel-id">' + Util.esc(Util.shortId(blocker.id, 8)) + '</span>' +
          '<span class="rel-title">' + Util.esc(blocker.title) + '</span>' +
        '</div></div>' : '') +
      (dependents.length ? '<div><div class="section-title">// blocks</div>' +
        dependents.map(d => '<div class="rel-row" data-act="select" data-id="' + Util.esc(d.id) + '">' +
          '<span class="status-pill s-' + d.status + '"><span class="mark">' + T.statusMeta[d.status].glyph + '</span></span>' +
          '<span class="rel-id">' + Util.esc(Util.shortId(d.id, 8)) + '</span>' +
          '<span class="rel-title">' + Util.esc(d.title) + '</span>' +
        '</div>').join('') +
      '</div>' : '') +
    '</div>' : '') +
    '<div class="detail-actions">' +
      (editing
        ? '<button class="primary" data-act="detail-save">save</button><button data-act="detail-cancel">cancel</button>'
        : '<button class="danger" data-act="detail-delete">delete</button>') +
    '</div>' +
  '</aside>';
}

function conNewProjectDialog() {
  return '<div class="dialog-backdrop" data-act="close-new-project-backdrop"><div class="dialog">' +
    '<h3>$ new project</h3>' +
    '<input type="text" placeholder="project name" data-act="new-project-input" autofocus>' +
    '<div class="dialog-actions">' +
      '<button data-act="close-new-project">cancel</button>' +
      '<button class="primary" data-act="confirm-new-project">create</button>' +
    '</div>' +
  '</div></div>';
}

// ===================================================================
// Theme: Dossier (Direction C)
// ===================================================================
Themes.register('dossier', {
  label: 'Dossier',
  description: 'Editorial paper-and-ink, serif display, rubber-stamp accents.',
  statusMeta: {
    todo:        { label: 'To do',     glyph: '\u25C7' }, // ◇
    in_progress: { label: 'In course', glyph: '\u25C8' }, // ◈
    blocker:     { label: 'On hold',   glyph: '\u25C6' }, // ◆
    done:        { label: 'Settled',   glyph: '\u2756' }, // ❖
    closed:      { label: 'Withdrawn', glyph: '\u25AB' }, // ▫
  },
  render: renderDossier,
});

const DOS_ROMAN = ['I', 'II', 'III', 'IV'];

function renderDossier() {
  const T = Themes.get(Store.theme);
  const tasks = filteredTasks();
  const byId = tasksById();
  const counts = Util.counts(Store.tasks);
  const ready = Util.ready(Store.tasks);
  const selected = Store.selectedId ? byId[Store.selectedId] : null;

  return '<div class="app">' +
    dosTopbar(T, counts, ready.length) +
    '<div class="main">' +
      dosSidebar(T, ready.length) +
      '<div class="content">' +
        (Store.composerOpen ? dosComposer(T) : '') +
        dosMainView(T, tasks, byId) +
      '</div>' +
      (selected ? dosDetail(T, selected, byId) : '') +
    '</div>' +
    (Store.newProjectOpen ? dosNewProjectDialog() : '') +
    paletteOverlay() +
  '</div>';
}

function dosTopbar(T, counts, readyCount) {
  const date = new Date().toISOString().slice(0, 10);
  const total = counts.total || 0;
  const tabs = [
    { id: 'list',   label: 'List',    hint: 'gl', enabled: true },
    { id: 'kanban', label: 'Board',   hint: 'gk', enabled: true },
    { id: 'graph',  label: 'Lineage', hint: 'gg', enabled: true },
  ];
  return '<div class="topbar" role="banner">' +
    '<div class="dossier-masthead">' +
      '<div class="left">Vol. I \u00B7 No. ' + total + ' \u00B7 ' + date + '</div>' +
      '<div class="title">Segments <span class="sub">\u2014 a register of work</span>' +
        (Store.version ? '<span class="ver">v' + Util.esc(Store.version) + '</span>' : '') +
      '</div>' +
      '<div class="right">' +
        '<span class="agent-ind ' + (Store.wsConnected ? 'on' : '') + '" role="status" aria-live="polite" title="' + (Store.wsConnected ? 'Live WebSocket connection' : 'Reconnecting\u2026') + '">' +
          '<span class="agent-dot" aria-hidden="true"></span>' +
          '<span>Agent ' + (Store.wsConnected ? 'Live' : 'Paused') + '</span>' +
        '</span>' +
        '<select class="theme-select" data-act="theme" aria-label="Theme">' +
          Themes.list().map(k => '<option value="' + k + '"' + (k === Store.theme ? ' selected' : '') + '>' +
            Util.esc(Themes.get(k).label || k) + '</option>').join('') +
        '</select>' +
        '<button class="mode-btn" data-act="toggle-mode" title="Toggle light/dark">' + (Store.mode === 'dark' ? 'day' : 'night') + '</button>' +
      '</div>' +
    '</div>' +
    '<div class="topbar-stats" aria-label="Task counts">' +
      '<span><strong>' + counts.in_progress + '</strong> in course</span>' +
      '<span>\u00B7</span>' +
      '<span class="c-blocker"><strong>' + counts.blocker + '</strong> on hold</span>' +
      '<span>\u00B7</span>' +
      '<span><strong>' + counts.todo + '</strong> outstanding</span>' +
      '<span>\u00B7</span>' +
      '<span class="c-done"><strong>' + counts.done + '</strong> settled</span>' +
      '<span class="stat-spacer"></span>' +
      '<span>ready \u00B7 <strong>' + readyCount + '</strong></span>' +
    '</div>' +
    '<div class="topbar-controls">' +
      '<div class="view-tabs" role="tablist" aria-label="View mode">' +
        tabs.map(t => '<button class="view-tab ' + (Store.view === t.id ? 'active' : '') + '"' +
          ' role="tab" aria-selected="' + (Store.view === t.id ? 'true' : 'false') + '"' +
          (t.enabled ? ' data-act="view" data-view="' + t.id + '"' : ' aria-disabled="true" data-disabled="1" title="coming soon"') + '>' +
          Util.esc(t.label) + '<span class="hint">' + t.hint + '</span></button>').join('') +
      '</div>' +
      '<div class="search-wrap"><label class="search">' +
        '<span class="icon" aria-hidden="true">SEARCH \u2014</span>' +
        '<input type="text" placeholder="title, description, or id" aria-label="Search tasks" value="' + Util.esc(Store.search) + '" data-act="search">' +
        '<span class="slash" aria-hidden="true"></span>' +
      '</label></div>' +
      '<button class="topbar-btn" data-act="palette" title="Command palette (Ctrl/Cmd+K)">\u2318K</button>' +
    '</div>' +
  '</div>';
}

function dosSidebar(T, readyCount) {
  const allActive = Store.scope === 'all';
  const projectsHtml = Store.projects.map(p => {
    const ptasks = Store.tasks.filter(t => t.project_id === p.id);
    const c = Util.counts(ptasks);
    const active = !allActive && Store.activeProjectId === p.id;
    const ornaments = [];
    if (c.in_progress) ornaments.push('<span class="c-inprog">\u25C8 ' + c.in_progress + '</span>');
    if (c.blocker)     ornaments.push('<span class="c-blocker">\u25C6 ' + c.blocker + '</span>');
    if (c.todo)        ornaments.push('<span>\u25C7 ' + c.todo + '</span>');
    if (c.done)        ornaments.push('<span class="c-done">\u2756 ' + c.done + '</span>');
    return '<button class="project-item ' + (active ? 'active' : '') + '" data-act="project" data-id="' + Util.esc(p.id) + '">' +
      '<div class="project-row">' +
        '<span class="project-name">' + (active ? '\u203A ' : '') + Util.esc(p.name) + '</span>' +
        '<span class="project-count">' + ptasks.length + '</span>' +
      '</div>' +
      (ornaments.length ? '<div class="project-ornaments">' + ornaments.join('') + '</div>' : '') +
    '</button>';
  }).join('');

  const readyActive = Store.filter === 'ready';
  const allTasksTotal = allActive ? Store.tasks.length : 0;
  return '<aside class="sidebar" aria-label="Sidebar">' +
    '<div class="side-label">' +
      '<span>\u2014 Projects \u2014</span>' +
      '<button class="add-btn" data-act="new-project" title="New project" aria-label="New project">+</button>' +
    '</div>' +
    '<div>' + projectsHtml + '</div>' +
    '<button class="ready-box all-tasks ' + (allActive ? 'active' : '') + '" data-act="scope-all" title="Aggregate every project" aria-pressed="' + (allActive ? 'true' : 'false') + '">' +
      '<div class="label">ALL TASKS</div>' +
      '<div class="num">' + (allActive ? allTasksTotal : '\u2014') + '</div>' +
      '<div class="sub">aggregated across every project</div>' +
    '</button>' +
    '<button class="ready-box ' + (readyActive ? 'active' : '') + '" data-act="toggle-ready" title="Toggle ready filter" aria-pressed="' + (readyActive ? 'true' : 'false') + '">' +
      '<div class="label">READY QUEUE</div>' +
      '<div class="num">' + readyCount + '</div>' +
      '<div class="sub">entries with no outstanding dependencies</div>' +
    '</button>' +
    '<div class="side-shortcuts">' +
      '<div class="title">Keys</div>' +
      '<div>j \u00B7 k navigate</div>' +
      '<div>c compose \u00B7 e edit</div>' +
      '<div>/ search \u00B7 esc close</div>' +
      '<div>\u21B5 open task</div>' +
    '</div>' +
  '</aside>';
}

function dosComposer(T) {
  const stagedPri = parseInt(app.dataset.composerPri || '2', 10);
  const stagedBlk = Store.composerBlocker || '';
  return '<div class="composer" role="form" aria-label="New task">' +
    '<div class="composer-header">New Entry</div>' +
    '<input class="composer-title" type="text" placeholder="subject of the work\u2026" aria-label="Title" data-act="composer-submit" value="' + Util.esc(Store.composerTitle || '') + '">' +
    '<textarea class="composer-body" rows="2" placeholder="notes (optional)" aria-label="Description" data-act="composer-body">' + Util.esc(Store.composerBody || '') + '</textarea>' +
    '<div class="composer-row">' +
      composerProjectSelector() +
      '<span class="label">Priority</span>' +
      [0, 1, 2, 3].map(p => {
        const on = p === stagedPri;
        return '<button class="pri-btn' + (on ? ' active' : '') + '" data-act="composer-pri" data-pri="' + p + '" aria-pressed="' + (on ? 'true' : 'false') + '" title="P' + p + '">' + DOS_ROMAN[p] + '</button>';
      }).join('') +
      '<span class="label" style="margin-left:12px">Blocker</span>' +
      renderBlockerCombo('composer', stagedBlk, null) +
      '<span class="composer-hint">\u21B5 submit \u00B7 esc discard</span>' +
    '</div>' +
  '</div>';
}

function dosMainView(T, tasks, byId) {
  if (Store.view === 'kanban') return dosKanbanView(T, tasks, byId);
  if (Store.view === 'graph') return dosGraphView(T, tasks, byId);
  return dosListView(T, tasks, byId);
}

function dosKanbanView(T, tasks, byId) {
  if (!hasActiveScope()) {
    return '<div class="view-stub">' +
      '<div class="big">Board</div>' +
      '<div class="hint">\u2014 select or create a project to get started \u2014</div>' +
    '</div>';
  }
  const buckets = groupedForKanban(tasks);
  const meta = T.statusMeta;
  return '<div class="kanban" data-act="deselect">' +
    KANBAN_COLS.map(col => {
      const items = buckets[col] || [];
      const m = meta[col] || { label: col, glyph: '' };
      const over = Store.dragging && Store.dragOverCol === col;
      return '<div class="kanban-col' + (over ? ' drag-over' : '') + '" data-act="kanban-col" data-status="' + col + '">' +
        '<div class="kanban-col-head g-' + col + '">' +
          '<span class="glyph" aria-hidden="true">' + m.glyph + '</span>' +
          '<span>' + Util.esc(m.label) + '</span>' +
          '<span class="n">' + items.length + '</span>' +
        '</div>' +
        '<div class="kanban-col-body">' +
          (items.length
            ? items.map(t => dosKanbanCard(T, t, byId)).join('')
            : '<div class="kanban-empty">\u2014 drop here \u2014</div>') +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
}

function dosKanbanCard(T, t, byId) {
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const selected = Store.selectedId === t.id;
  const dragging = Store.dragging === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['kanban-card', 's-' + t.status];
  if (selected) classes.push('selected');
  if (dragging) classes.push('dragging');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : 'resolved') + '" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? 'on hold \u00B7 ' : 'clear \u00B7 ') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span></span>';

  return '<div class="' + classes.join(' ') + '" draggable="true" data-act="kanban-card" data-id="' + Util.esc(t.id) + '" aria-label="' + Util.esc(t.title) + '">' +
    '<div class="card-top">' +

function dosGraphView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="graph"><div class="empty">' +
      (hasActiveScope()
        ? '\u2014 No entries' + (Store.search ? ' matching \u201C' + Util.esc(Store.search) + '\u201D' : '') + '. Press c to compose. \u2014'
        : '\u2014 Select or create a project to get started. \u2014') +
    '</div></div>';
  }
  const layout = Graph.layout(tasks, byId, {
    W: 188, H: 74, gapX: 28, gapY: 44, padX: 32, padY: 24, rankGap: 18,
    containerW: Graph.containerWidth(),
  });
  const ready = new Set(Util.ready(Store.tasks).map(t => t.id));
  const readyInView = tasks.reduce((n, t) => n + (ready.has(t.id) ? 1 : 0), 0);
  const sel = Store.selectedId;
  const focus = Graph.focusSet(sel, tasks, byId);
  const blockingMap = Graph.blockingMap(tasks);
  const meta = T.statusMeta;
  const edges = Graph.edges(tasks, byId).map(e => {
    const from = layout.pos[e.parent.id], to = layout.pos[e.child.id];
    if (!from || !to) return '';
    const x1 = from.x + layout.W / 2, y1 = from.y + layout.H;
    const x2 = to.x + layout.W / 2, y2 = to.y;
    const mid = (y1 + y2) / 2;
    const inFocus = !focus || (focus.has(e.parent.id) && focus.has(e.child.id));
    const cls = 'edge ' + (e.blocked ? 'blocked' : 'open') + (inFocus ? '' : ' off');
    const marker = e.blocked ? 'dos-arrow-blocked' : 'dos-arrow';
    return '<path class="' + cls + '" d="M ' + x1 + ' ' + y1 + ' C ' + x1 + ' ' + mid + ' ' + x2 + ' ' + mid + ' ' + x2 + ' ' + y2 + '" marker-end="url(#' + marker + ')"></path>';
  }).join('');
  const nodes = tasks.map(t => {
    const p = layout.pos[t.id]; if (!p) return '';
    const isReady = ready.has(t.id);
    const isSel = sel === t.id;
    const blocks = blockingMap.get(t.id) || 0;
    const cls = ['g-node', 's-' + t.status, 'p-' + t.priority];
    if (isSel) cls.push('sel');
    if (isReady) cls.push('ready');
    if (blocks > 0) cls.push('is-blocking');
    if (focus && !focus.has(t.id)) cls.push('off');
    const sm = meta[t.status] || { label: '?' };
    const priRoman = t.priority === 0 ? '' :
      ' \u00B7 <tspan class="g-pri p-' + t.priority + '">' + DOS_ROMAN[t.priority] + '</tspan>';
    const depsTag = blocks > 0 ? ' \u00B7 <tspan class="g-deps">BLOCKS ' + blocks + '</tspan>' : '';
    return '<g class="' + cls.join(' ') + '" data-act="select" data-id="' + Util.esc(t.id) + '" transform="translate(' + p.x + ',' + p.y + ')">' +
      (isReady ? '<rect class="ring" x="-4" y="-4" width="' + (layout.W + 8) + '" height="' + (layout.H + 8) + '"></rect>' : '') +
      '<rect class="bg" width="' + layout.W + '" height="' + layout.H + '"></rect>' +
      '<text class="g-meta" x="12" y="14">' + Util.esc(Util.shortId(t.id, 8)) + priRoman + ' \u00B7 ' + Util.esc(sm.label.toUpperCase()) + depsTag + '</text>' +
      '<line class="bar" x1="12" y1="20" x2="' + (layout.W - 12) + '" y2="20"></line>' +
      '<foreignObject x="12" y="24" width="' + (layout.W - 24) + '" height="' + (layout.H - 30) + '">' +
        '<div xmlns="http://www.w3.org/1999/xhtml" class="g-title">' + Util.esc(t.title) + '</div>' +
      '</foreignObject>' +
    '</g>';
  }).join('');
  const inTree = Store.filter === 'ready';
  return '<div class="graph' + (sel ? ' has-detail' : '') + '" data-act="deselect">' +
    '<div class="graph-head">' +
      '<div class="head-title">Lineage</div>' +
      '<div class="head-sub">dependency graph \u00B7 ' + readyInView + ' ready of ' + tasks.length + (inTree ? ' in flight' : ' total') + '</div>' +
    '</div>' +
    '<svg class="graph-svg" width="' + layout.width + '" height="' + layout.height + '">' +
      '<defs>' +
        '<marker id="dos-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow open"></path></marker>' +
        '<marker id="dos-arrow-blocked" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow blocked"></path></marker>' +
      '</defs>' +
      '<rect class="g-bg" data-act="deselect" width="' + layout.width + '" height="' + layout.height + '"></rect>' +
      edges +
      nodes +
    '</svg>' +
  '</div>';
}

// ===================================================================
// Render dispatcher
// ===================================================================
const app = document.getElementById('app');

function render(opts) {
  applyTheme();
  // Capture caret + focus target before blowing away the DOM so (a) typing in
  // search doesn't jump to end on every keystroke, and (b) WS-driven
  // re-renders don't steal focus from the composer/edit fields.
  let savedSel = null;
  let autoPreserve = null;
  const active = document.activeElement;
  if (opts && opts.preserveFocus) {
    const prev = document.querySelector(opts.preserveFocus);
    if (prev && prev === active) {
      try { savedSel = { start: prev.selectionStart, end: prev.selectionEnd }; } catch (e) {}
    }
  } else if (active && active !== document.body && app.contains(active)) {
    const tag = (active.tagName || '').toUpperCase();
    const act = active.dataset ? active.dataset.act : null;
    if (tag === 'INPUT' || tag === 'TEXTAREA') {
      // Reconstruct a selector that can re-find this input after re-render.
      if (act) {
        autoPreserve = '[data-act="' + act + '"]';
        try { savedSel = { start: active.selectionStart, end: active.selectionEnd }; } catch (e) {}
      }
    }
  }
  const theme = Themes.get(Store.theme);
  const html = (theme.render || renderObsidian)();
  app.innerHTML = html;
  if (opts && opts.focus) {
    const el = document.querySelector(opts.focus);
    if (el) el.focus();
  }
  if (opts && opts.scrollTo) {
    const el = document.querySelector(opts.scrollTo);
    if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest' });
  }
  const refocus = (opts && opts.preserveFocus) || autoPreserve;
  if (refocus) {
    const el = document.querySelector(refocus);
    if (el) {
      el.focus();
      if (savedSel && el.setSelectionRange) {
        try {
          const len = (el.value || '').length;
          const s = Math.min(savedSel.start != null ? savedSel.start : len, len);
          const e = Math.min(savedSel.end != null ? savedSel.end : len, len);
          el.setSelectionRange(s, e);
        } catch (e) {}
      }
    }
  }
  // Graph view is laid out using the measured .content width so wrap-on-narrow
  // works without horizontal scroll. The first render uses an estimate; once
  // the DOM is in place we measure and re-render once if the estimate was off.
  if (Store.view === 'graph' && typeof requestAnimationFrame === 'function') {
    requestAnimationFrame(() => {
      const content = document.querySelector('.content');
      if (!content) return;
      const w = content.clientWidth;
      if (w > 0 && Math.abs(w - Store._graphContentW) > 8) {
        Store._graphContentW = w;
        render();
      }
    });
  }
  // Combo popup uses position: fixed so it can escape ancestor overflow:hidden.
  // Place it relative to the trigger's viewport rect, clamped to the viewport.
  if (Store.combo && typeof requestAnimationFrame === 'function') {
    requestAnimationFrame(positionBlockerCombo);
  }
}

function positionBlockerCombo() {
  if (!Store.combo) return;
  const scope = Store.combo.scope;
  const wrap = document.querySelector('.blocker-combo.open[data-scope="' + scope + '"]');
  if (!wrap) return;
  const trigger = wrap.querySelector('.blocker-combo-trigger');
  const pop = wrap.querySelector('.blocker-combo-pop');
  if (!trigger || !pop) return;
  const tr = trigger.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const margin = 8;
  // Preferred width: match the trigger (but clamp).
  const desired = Math.max(Math.min(460, vw - margin * 2), Math.min(tr.width, vw - margin * 2));
  const width = Math.max(240, Math.min(desired, vw - margin * 2));
  pop.style.width = width + 'px';
  // Horizontal: right-align to the trigger by default; flip if overflow.
  let left = tr.right - width;
  if (left < margin) left = margin;
  if (left + width > vw - margin) left = vw - margin - width;
  // Vertical: below the trigger; flip above if not enough room.
  const popH = pop.offsetHeight || 280;
  let top = tr.bottom + 4;
  if (top + popH > vh - margin && tr.top - popH - 4 > margin) {
    top = tr.top - popH - 4;
  }
  if (top < margin) top = margin;
  pop.style.left = Math.round(left) + 'px';
  pop.style.top = Math.round(top) + 'px';
  // Scroll the selected option into view (for the pre-selected blocker).
  const selOpt = pop.querySelector('.blocker-combo-opt.selected');
  if (selOpt && selOpt.scrollIntoView) {
    try { selOpt.scrollIntoView({ block: 'nearest' }); } catch (e) {}
  }
}

function applyTheme() {
  document.body.setAttribute('data-theme', Store.theme);
  document.body.setAttribute('data-mode', Store.mode);
}

// ===================================================================
// Event delegation
// ===================================================================
function actOf(el) {
  while (el && el !== app) {
    if (el.dataset && el.dataset.act) return { el, act: el.dataset.act };
    el = el.parentElement;
  }
  return { el: null, act: null };
}

app.addEventListener('click', async (e) => {
  const { el, act } = actOf(e.target);

  // Close combo if user clicked outside it (click-through still processes the action).
  if (Store.combo) {
    const scope = Store.combo.scope;
    const inside = e.target.closest && e.target.closest('.blocker-combo[data-scope="' + scope + '"]');
    const isOpenAct = act === 'blocker-combo-open' && el && el.dataset && el.dataset.scope === scope;
    if (!inside && !isOpenAct) {
      Store.combo = null;
      if (!act) { render(); return; }
      // fall through so the clicked action still runs; it will render.
    }
  }

  if (!act) return;
  const id = el && el.dataset ? el.dataset.id : null;

  switch (act) {
    case 'select': Actions.selectTask(id); return;
    case 'deselect': Actions.clearSelection(); return;
    case 'kanban-card': Actions.selectTask(id); return;
    case 'kanban-col': Actions.clearSelection(); return;
    case 'view': Actions.setView(el.dataset.view); return;
    case 'project': Actions.switchProject(id); return;
    case 'scope-all': Actions.setScopeAll(); return;
    case 'toggle-ready': Actions.toggleReadyFilter(); return;
    case 'new-project': Actions.openNewProject(); return;
    case 'close-new-project': Actions.closeNewProject(); return;
    case 'close-new-project-backdrop':
      if (e.target === el) Actions.closeNewProject();
      return;
    case 'confirm-new-project': {
      const input = document.querySelector('.dialog input');
      if (input) await Actions.createProject(input.value);
      return;
    }
    case 'new-project-input': return;
    case 'toggle-mode': Actions.toggleMode(); return;
    case 'palette': Actions.openPalette(); return;
    case 'palette-backdrop':
      if (e.target === el) Actions.closePalette();
      return;
    case 'palette-item': {
      const idx = parseInt(el.dataset.idx || '0', 10);
      Actions.runPaletteItem(idx);
      return;
    }
    case 'palette-input': return;
    case 'composer-pri': {
      const p = parseInt(el.dataset.pri, 10);
      document.querySelectorAll('.pri-btn').forEach(b => {
        const on = parseInt(b.dataset.pri, 10) === p;
        b.classList.toggle('active', on);
        b.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      app.dataset.composerPri = String(p);
      return;
    }
    case 'edit-title':
      Store.editingTitle = (Store.selectedId && Store.tasks.find(t => t.id === Store.selectedId)?.title) || '';
      render({ focus: '.detail input' });
      return;
    case 'edit-body':
      Store.editingBody = (Store.selectedId && Store.tasks.find(t => t.id === Store.selectedId)?.body) || '';
      render({ focus: '.detail textarea' });
      return;
    case 'detail-save': {
      const sel = Store.selectedId;
      const patch = {};
      if (Store.editingTitle !== null) patch.title = Store.editingTitle;
      if (Store.editingBody !== null) patch.body = Store.editingBody;
      if (sel) await Actions.saveTaskEdit(sel, patch);
      render();
      return;
    }
    case 'detail-cancel':
      Store.editingBody = null; Store.editingTitle = null; render(); return;
    case 'detail-delete':
      if (Store.selectedId) await Actions.deleteTaskById(Store.selectedId);
      return;
    case 'blocker-combo-open':
      Actions.openBlockerCombo(el.dataset.scope);
      return;
    case 'blocker-combo-pick':
      await Actions.pickBlocker(el.dataset.scope, el.dataset.id || '');
      return;
    case 'blocker-combo-toggle-finished':
      // Clicking the label fires this too; the <input> change event is the canonical
      // trigger, so avoid double-toggling here.
      return;
  }
});

app.addEventListener('input', (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  switch (act) {
    case 'search': Store.search = el.value; render({ preserveFocus: '.search input' }); return;
    case 'detail-edit-title': Store.editingTitle = el.value; return;
    case 'detail-edit-body': Store.editingBody = el.value; return;
    case 'composer-submit': Store.composerTitle = el.value; return;
    case 'composer-body': Store.composerBody = el.value; return;
    case 'blocker-combo-input': Actions.setBlockerComboQuery(el.value); return;
    case 'palette-input': Actions.setPaletteQuery(el.value); return;
  }
});

app.addEventListener('change', async (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  switch (act) {
    case 'theme': Actions.setTheme(el.value); return;
    case 'composer-project': Actions.setComposerProject(el.value); return;
    case 'detail-status':
      if (Store.selectedId) await Actions.saveTaskEdit(Store.selectedId, { status: el.value });
      return;
    case 'detail-priority':
      if (Store.selectedId) await Actions.saveTaskEdit(Store.selectedId, { priority: parseInt(el.value, 10) });
      return;
    case 'blocker-combo-toggle-finished':
      Actions.toggleBlockerComboShowFinished();
      return;
  }
});

// Auto-save detail title on blur (keyboard Enter is handled in keydown).
app.addEventListener('focusout', async (e) => {
  const { el, act } = actOf(e.target);
  if (act === 'detail-edit-title' && Store.editingTitle !== null && Store.selectedId) {
    const sel = Store.selectedId;
    const patch = { title: Store.editingTitle };
    Store.editingTitle = null;
    await Actions.saveTaskEdit(sel, patch);
    render();
  }
});

// ===================================================================
// Kanban drag-and-drop (native HTML5). Card fires `dragstart`; the nearest
// `data-act="kanban-col"` ancestor handles dragover/drop. On drop we apply
// an optimistic local status change, then PUT; the WS `task:updated`
// broadcast reconciles any divergence.
// ===================================================================
function findKanbanCol(el) {
  while (el && el !== app) {
    if (el.dataset && el.dataset.act === 'kanban-col') return el;
    el = el.parentElement;
  }
  return null;
}

app.addEventListener('dragstart', (e) => {
  const { el, act } = actOf(e.target);
  if (act !== 'kanban-card' || !el) return;
  const id = el.dataset.id || '';
  Store.dragging = id;
  try {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', id);
  } catch (err) {}
  // Apply .dragging without re-rendering so the browser's native drag image
  // is captured from the pre-dim card, then fade the source immediately after.
  setTimeout(() => {
    const card = document.querySelector('.kanban-card[data-id="' + CSS.escape(id) + '"]');
    if (card) card.classList.add('dragging');
  }, 0);
});

app.addEventListener('dragend', () => {
  if (!Store.dragging && !Store.dragOverCol) return;
  Store.dragging = null;
  Store.dragOverCol = null;
  document.querySelectorAll('.kanban-card.dragging').forEach(n => n.classList.remove('dragging'));
  document.querySelectorAll('.kanban-col.drag-over').forEach(n => n.classList.remove('drag-over'));
});

app.addEventListener('dragover', (e) => {
  if (!Store.dragging) return;
  const col = findKanbanCol(e.target);
  if (!col) return;
  e.preventDefault();
  try { e.dataTransfer.dropEffect = 'move'; } catch (err) {}
  const status = col.dataset.status;
  if (Store.dragOverCol === status) return;
  Store.dragOverCol = status;
  document.querySelectorAll('.kanban-col.drag-over').forEach(n => n.classList.remove('drag-over'));
  col.classList.add('drag-over');
});

app.addEventListener('dragleave', (e) => {
  // Fires when leaving any nested element; we clear only when leaving the column
  // entirely (relatedTarget outside the current column's subtree).
  if (!Store.dragOverCol) return;
  const col = findKanbanCol(e.target);
  if (!col) return;
  const rel = e.relatedTarget;
  if (rel && col.contains(rel)) return;
  col.classList.remove('drag-over');
  if (Store.dragOverCol === col.dataset.status) Store.dragOverCol = null;
});

app.addEventListener('drop', async (e) => {
  const col = findKanbanCol(e.target);
  if (!col) return;
  e.preventDefault();
  const status = col.dataset.status;
  let id = '';
  try { id = e.dataTransfer.getData('text/plain') || Store.dragging || ''; }
  catch (err) { id = Store.dragging || ''; }
  Store.dragging = null;
  Store.dragOverCol = null;
  document.querySelectorAll('.kanban-card.dragging').forEach(n => n.classList.remove('dragging'));
  document.querySelectorAll('.kanban-col.drag-over').forEach(n => n.classList.remove('drag-over'));
  if (!id || !status) { render(); return; }
  const t = Store.tasks.find(x => x.id === id);
  if (!t || t.status === status) { render(); return; }
  // Optimistic: move the card now, persist after. WS broadcast reconciles.
  t.status = status;
  render();
  await Actions.saveTaskEdit(id, { status });
});

app.addEventListener('keydown', async (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  if (act === 'palette-input') {
    if (e.key === 'ArrowDown') { e.preventDefault(); e.stopPropagation(); Actions.movePaletteCursor(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); e.stopPropagation(); Actions.movePaletteCursor(-1); return; }
    if (e.key === 'Enter') {
      e.preventDefault(); e.stopPropagation();
      Actions.runPaletteItem(Store.paletteCursor | 0);
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault(); e.stopPropagation();
      Actions.closePalette();
      return;
    }
  }
  if (act === 'blocker-combo-input') {
    if (e.key === 'ArrowDown') {
      e.preventDefault(); e.stopPropagation();
      Actions.moveBlockerComboCursor(1);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault(); e.stopPropagation();
      Actions.moveBlockerComboCursor(-1);
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault(); e.stopPropagation();
      await Actions.commitBlockerComboAtCursor();
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault(); e.stopPropagation();
      Actions.closeBlockerCombo();
      return;
    }
  }
  if (act === 'composer-submit' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const title = Store.composerTitle || el.value || '';
    const body = Store.composerBody || (document.querySelector('.composer-body') || {}).value || '';
    const pri = parseInt(app.dataset.composerPri || '2', 10);
    await Actions.createTaskFromComposer(title, body, pri, Store.composerBlocker || '');
    return;
  }
  if (act === 'detail-edit-body' && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    const btn = document.querySelector('[data-act="detail-save"]');
    if (btn) btn.click();
    return;
  }
  if (act === 'detail-edit-title' && e.key === 'Enter') {
    e.preventDefault();
    const sel = Store.selectedId;
    if (sel && Store.editingTitle !== null) {
      const patch = { title: Store.editingTitle };
      Store.editingTitle = null;
      await Actions.saveTaskEdit(sel, patch);
      render();
    }
    return;
  }
  if (act === 'edit-title' && e.key === 'Enter') {
    // Keyboard activation of the heading -> open edit mode.
    e.preventDefault();
    Store.editingTitle = (Store.selectedId && Store.tasks.find(t => t.id === Store.selectedId)?.title) || '';
    render({ focus: '.detail input' });
    return;
  }
  if (act === 'new-project-input' && e.key === 'Enter') {
    e.preventDefault();
    await Actions.createProject(el.value);
    return;
  }
});

// ===================================================================
// Global keyboard
// ===================================================================
let gChordPending = false;
let gChordTimer = null;
function armGChord() {
  gChordPending = true;
  if (gChordTimer) clearTimeout(gChordTimer);
  gChordTimer = setTimeout(() => { gChordPending = false; gChordTimer = null; }, 800);
}
function disarmGChord() {
  gChordPending = false;
  if (gChordTimer) { clearTimeout(gChordTimer); gChordTimer = null; }
}

window.addEventListener('keydown', (e) => {
  const target = e.target;
  const isInput = target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable);

  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    Actions.togglePalette();
    return;
  }

  if (e.key === 'Escape') {
    if (Store.paletteOpen) { Actions.closePalette(); e.preventDefault(); return; }
    if (Store.combo) { Actions.closeBlockerCombo(); e.preventDefault(); return; }
    if (Store.newProjectOpen) { Actions.closeNewProject(); e.preventDefault(); return; }
    if (Store.editingBody !== null || Store.editingTitle !== null) {
      Store.editingBody = null; Store.editingTitle = null; render(); e.preventDefault(); return;
    }
    if (Store.composerOpen) { Actions.closeComposer(); e.preventDefault(); return; }
    if (Store.selectedId) { Actions.clearSelection(); e.preventDefault(); return; }
    if (isInput && target.blur) target.blur();
    return;
  }

  if (isInput) return;
  if (Store.paletteOpen) return;

  if (gChordPending) {
    const key = e.key.toLowerCase();
    if (key === 'l' || key === 'k' || key === 'g') {
      disarmGChord();
      const map = { l: 'list', k: 'kanban', g: 'graph' };
      Actions.setView(map[key]);
      e.preventDefault();
      return;
    }
    disarmGChord();
  }

  if (e.key === '/') {
    const el = document.querySelector('.search input');
    if (el) { el.focus(); e.preventDefault(); }
    return;
  }
  if (e.key === 'c') {
    Actions.openComposer();
    e.preventDefault();
    return;
  }
  if (e.key === 'g') {
    armGChord();
    e.preventDefault();
    return;
  }
  if (e.key === 'e' && Store.selectedId) {
    Store.editingBody = (Store.tasks.find(t => t.id === Store.selectedId)?.body) || '';
    render({ focus: '.detail textarea' });
    e.preventDefault();
    return;
  }
  if (e.key === 't' && Store.selectedId) {
    Actions.cycleSelectedStatus();
    e.preventDefault();
    return;
  }
  if (Store.selectedId && (e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4')) {
    const map = { '1': 1, '2': 2, '3': 3, '4': 0 };
    Actions.saveTaskEdit(Store.selectedId, { priority: map[e.key] });
    e.preventDefault();
    return;
  }
  if (e.key === 'j' || e.key === 'ArrowDown') { Actions.navigate(1); e.preventDefault(); return; }
  if (e.key === 'k' || e.key === 'ArrowUp')   { Actions.navigate(-1); e.preventDefault(); return; }
  if (e.key === 'Enter' && Store.selectedId) {
    // Selection already shows detail panel, focus body for edit.
    const el = document.querySelector('.detail');
    if (el && el.scrollIntoView) el.scrollIntoView();
    return;
  }
});

// ===================================================================
// Bootstrap
// ===================================================================
async function loadServerConfig() {
  try {
    const r = await fetch('/internal/config');
    const c = await r.json();
    if (c && c.version) { Store.version = c.version; render(); }
  } catch (e) {}
}

// Reposition combo popup on scroll / resize so it follows the trigger.
window.addEventListener('scroll', () => { if (Store.combo) positionBlockerCombo(); }, true);
window.addEventListener('resize', () => { if (Store.combo) positionBlockerCombo(); });

// Re-flow the graph when the window resizes. The post-render measurement
// pass picks up the new .content width on the next render.
let __resizeTimer = null;
window.addEventListener('resize', () => {
  if (Store.view !== 'graph') return;
  clearTimeout(__resizeTimer);
  __resizeTimer = setTimeout(() => {
    Store._graphContentW = 0;
    render();
  }, 120);
});

applyTheme();
render();
wsConnect();
loadProjects();
loadServerConfig();
</script>
</body>
</html>
