<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Shared base ===== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  background: var(--seg-bg);
  color: var(--seg-text);
  font-family: var(--seg-font);
  font-feature-settings: var(--seg-font-feature, normal);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; padding: 0; cursor: pointer; }
input, textarea, select { background: none; border: none; outline: none; }
::selection { background: var(--seg-accent-dim); }
input::placeholder, textarea::placeholder { color: var(--seg-faint); }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--seg-scroll); border-radius: 5px; }
*::-webkit-scrollbar-thumb:hover { background: var(--seg-scroll-hover); }
*::-webkit-scrollbar-track { background: transparent; }

kbd {
  font-family: var(--seg-font-mono);
  font-size: 9.5px;
  border: 1px solid var(--seg-line2);
  padding: 0 4px;
  border-radius: 3px;
  color: var(--seg-muted);
  background: var(--seg-surface);
}

/* ===== Obsidian theme (Direction A) ===== */
body[data-theme="obsidian"] {
  --seg-bg: #0e1012;
  --seg-surface: #16181b;
  --seg-surface2: #1d2024;
  --seg-line: rgba(255,255,255,0.06);
  --seg-line2: rgba(255,255,255,0.10);
  --seg-text: #e7e5e2;
  --seg-muted: #8a8a85;
  --seg-faint: #5b5b57;
  --seg-accent: #7aa7d9;
  --seg-accent-dim: rgba(122,167,217,0.14);
  --seg-todo: #8a8a85;
  --seg-inprog: #7aa7d9;
  --seg-blocker: #d97a7a;
  --seg-done: #7ac28a;
  --seg-closed: #4a4a47;
  --seg-pri0: #d97a7a;
  --seg-pri1: #e0b675;
  --seg-pri2: #7aa7d9;
  --seg-pri3: #5b5b57;
  --seg-font: "Geist", "Geist Sans", -apple-system, system-ui, sans-serif;
  --seg-font-mono: "Geist Mono", ui-monospace, monospace;
  --seg-font-feature: "ss01", "cv11";
  --seg-glow: 0 0 0 1px rgba(122,167,217,0.35), 0 0 20px rgba(122,167,217,0.12);
  --seg-scroll: rgba(255,255,255,0.08);
  --seg-scroll-hover: rgba(255,255,255,0.16);
}
body[data-theme="obsidian"][data-mode="light"] {
  --seg-bg: #f6f5f2;
  --seg-surface: #ffffff;
  --seg-surface2: #eeece7;
  --seg-line: rgba(0,0,0,0.07);
  --seg-line2: rgba(0,0,0,0.12);
  --seg-text: #14151a;
  --seg-muted: #6a6a65;
  --seg-faint: #9a9a95;
  --seg-accent: #2e5a8a;
  --seg-accent-dim: rgba(46,90,138,0.10);
  --seg-inprog: #2e5a8a;
  --seg-blocker: #b04545;
  --seg-done: #2f7d45;
  --seg-closed: #aaaaa5;
  --seg-glow: 0 0 0 1px rgba(46,90,138,0.35), 0 0 20px rgba(46,90,138,0.10);
  --seg-scroll: rgba(0,0,0,0.12);
  --seg-scroll-hover: rgba(0,0,0,0.22);
}

/* ===== Obsidian component styles ===== */
body[data-theme="obsidian"] .app {
  height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
}

/* topbar */
body[data-theme="obsidian"] .topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 16px; border-bottom: 1px solid var(--seg-line);
  background: var(--seg-bg); flex-shrink: 0;
}
body[data-theme="obsidian"] .brand { display: flex; align-items: center; gap: 8px; }
body[data-theme="obsidian"] .brand-mark {
  width: 18px; height: 18px; border-radius: 3px;
  background: linear-gradient(135deg, var(--seg-accent), var(--seg-text));
  position: relative;
}
body[data-theme="obsidian"] .brand-mark::after {
  content: ""; position: absolute; inset: 4px; border-radius: 1px; background: var(--seg-bg);
}
body[data-theme="obsidian"] .brand-name {
  font-size: 13px; font-weight: 600; letter-spacing: -0.1px; color: var(--seg-text);
}
body[data-theme="obsidian"] .brand-ver {
  font-size: 11px; color: var(--seg-faint); font-family: var(--seg-font-mono);
}

body[data-theme="obsidian"] .view-tabs {
  display: flex; gap: 2px; margin-left: 12px; padding: 2px;
  background: var(--seg-surface); border-radius: 6px; border: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .view-tab {
  padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--seg-muted);
  display: flex; align-items: center; gap: 6px;
}
body[data-theme="obsidian"] .view-tab .hint {
  font-size: 10px; color: var(--seg-faint); font-family: var(--seg-font-mono);
}
body[data-theme="obsidian"] .view-tab.active {
  color: var(--seg-text); background: var(--seg-surface2); font-weight: 500;
}
body[data-theme="obsidian"] .view-tab[data-disabled] { opacity: 0.45; cursor: not-allowed; }

body[data-theme="obsidian"] .search-wrap {
  flex: 1; display: flex; justify-content: center;
}
body[data-theme="obsidian"] .search {
  display: flex; align-items: center; gap: 8px;
  background: var(--seg-surface); border: 1px solid var(--seg-line);
  padding: 5px 10px; border-radius: 6px; min-width: 320px; max-width: 460px; width: 100%;
}
body[data-theme="obsidian"] .search input {
  flex: 1; color: var(--seg-text); font-size: 12.5px;
}
body[data-theme="obsidian"] .search .icon { color: var(--seg-faint); font-size: 12px; }
body[data-theme="obsidian"] .search .slash {
  font-size: 10px; color: var(--seg-faint); font-family: var(--seg-font-mono);
  border: 1px solid var(--seg-line); padding: 1px 4px; border-radius: 3px;
}

body[data-theme="obsidian"] .topbar-btn {
  font-size: 11.5px; color: var(--seg-muted);
  padding: 5px 9px; border: 1px solid var(--seg-line); border-radius: 5px;
  font-family: var(--seg-font-mono);
}
body[data-theme="obsidian"] .topbar-btn:hover { color: var(--seg-text); border-color: var(--seg-line2); }

body[data-theme="obsidian"] .agent-ind {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--seg-muted); user-select: none;
}
body[data-theme="obsidian"] .agent-ind.on { color: var(--seg-accent); }
body[data-theme="obsidian"] .agent-dot {
  width: 6px; height: 6px; border-radius: 3px; background: var(--seg-faint);
}
body[data-theme="obsidian"] .agent-ind.on .agent-dot { background: var(--seg-accent); animation: segDot 1.6s ease-in-out infinite; }

body[data-theme="obsidian"] .mode-btn {
  font-size: 14px; color: var(--seg-muted); padding: 3px 6px;
}

body[data-theme="obsidian"] .theme-select {
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  padding: 4px 8px; border: 1px solid var(--seg-line); border-radius: 5px;
  background: var(--seg-surface); cursor: pointer;
}
body[data-theme="obsidian"] .theme-select:hover { color: var(--seg-text); }

/* body layout */
body[data-theme="obsidian"] .main { display: flex; flex: 1; min-height: 0; }

/* sidebar */
body[data-theme="obsidian"] .sidebar {
  width: 212px; border-right: 1px solid var(--seg-line);
  padding: 14px 8px; display: flex; flex-direction: column; gap: 16px;
  background: var(--seg-bg); flex-shrink: 0; overflow-y: auto;
}
body[data-theme="obsidian"] .side-label {
  font-size: 10.5px; color: var(--seg-faint); letter-spacing: 0.6px;
  padding: 0 10px 6px; text-transform: uppercase;
}
body[data-theme="obsidian"] .side-item {
  width: 100%; padding: 7px 10px; font-size: 12.5px;
  color: var(--seg-muted); border-radius: 5px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
body[data-theme="obsidian"] .side-item:hover { color: var(--seg-text); }
body[data-theme="obsidian"] .side-item.active {
  color: var(--seg-text); background: var(--seg-surface2); font-weight: 500;
}
body[data-theme="obsidian"] .side-item .count { color: var(--seg-faint); font-size: 10.5px; font-variant-numeric: tabular-nums; }
body[data-theme="obsidian"] .side-item .pill {
  color: var(--seg-accent); background: var(--seg-accent-dim);
  font-size: 10.5px; padding: 1px 5px; border-radius: 3px;
}
body[data-theme="obsidian"] .project-item {
  width: 100%; padding: 7px 10px; border-radius: 5px;
  display: flex; align-items: center; gap: 10px;
}
body[data-theme="obsidian"] .project-item:hover { background: rgba(255,255,255,0.02); }
body[data-theme="obsidian"] .project-item.active { background: var(--seg-surface2); }
body[data-theme="obsidian"] .project-dot {
  width: 6px; height: 6px; border-radius: 3px; background: var(--seg-faint); flex-shrink: 0;
}
body[data-theme="obsidian"] .project-item.active .project-dot { background: var(--seg-accent); }
body[data-theme="obsidian"] .project-name {
  font-size: 12.5px; color: var(--seg-muted); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: left;
}
body[data-theme="obsidian"] .project-item.active .project-name { color: var(--seg-text); font-weight: 500; }
body[data-theme="obsidian"] .project-count {
  font-size: 10.5px; color: var(--seg-faint); font-variant-numeric: tabular-nums;
}
body[data-theme="obsidian"] .project-bars { display: flex; gap: 1.5px; align-items: flex-end; }
body[data-theme="obsidian"] .project-bars span { width: 3px; border-radius: 0.5px; }

body[data-theme="obsidian"] .side-shortcuts {
  padding: 10px 12px; font-size: 10.5px; color: var(--seg-faint);
  border-top: 1px solid var(--seg-line); line-height: 1.7; margin-top: auto;
}
body[data-theme="obsidian"] .side-shortcuts .title { color: var(--seg-muted); margin-bottom: 4px; }

/* content area */
body[data-theme="obsidian"] .content {
  flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
}

/* composer */
body[data-theme="obsidian"] .composer {
  border-bottom: 1px solid var(--seg-line);
  background: var(--seg-surface);
  padding: 12px 16px;
}
body[data-theme="obsidian"] .composer-title {
  width: 100%; font-size: 14px; color: var(--seg-text); margin-bottom: 8px;
}
body[data-theme="obsidian"] .composer-body {
  width: 100%; resize: none; color: var(--seg-muted); font-size: 12.5px;
  line-height: 1.5; min-height: 44px;
}
body[data-theme="obsidian"] .composer-row {
  display: flex; gap: 12px; align-items: center; margin-top: 6px;
}
body[data-theme="obsidian"] .composer-row .label {
  font-size: 11px; color: var(--seg-faint);
}
body[data-theme="obsidian"] .pri-btn {
  padding: 2px 7px; border-radius: 3px; font-size: 11px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
}
body[data-theme="obsidian"] .pri-btn.active {
  border-color: var(--seg-accent); color: var(--seg-accent);
}
body[data-theme="obsidian"] .composer-hint {
  flex: 1; text-align: right; font-size: 10.5px; color: var(--seg-faint);
}
body[data-theme="obsidian"] .composer select {
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  border: 1px solid var(--seg-line); padding: 2px 6px; border-radius: 3px;
  background: var(--seg-surface); cursor: pointer;
}

/* list view */
body[data-theme="obsidian"] .list { flex: 1; overflow: auto; }
body[data-theme="obsidian"] .list-group-header {
  display: flex; align-items: baseline; gap: 10px;
  padding: 14px 16px 6px;
  font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--seg-muted); background: var(--seg-bg);
  position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .list-group-header .glyph { font-size: 13px; }
body[data-theme="obsidian"] .list-group-header .n { color: var(--seg-faint); font-size: 10.5px; }
body[data-theme="obsidian"] .row {
  display: grid;
  grid-template-columns: 22px 92px 70px 1fr auto auto;
  gap: 12px; align-items: center;
  padding: 9px 16px;
  border-bottom: 1px solid var(--seg-line);
  cursor: pointer;
  font-size: 13px;
  position: relative;
}
body[data-theme="obsidian"] .row.selected { background: var(--seg-surface2); }
body[data-theme="obsidian"] .row.selected::before {
  content: ""; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 2px; background: var(--seg-accent); border-radius: 2px;
}
body[data-theme="obsidian"] .pri-bars { display: inline-flex; gap: 2px; align-items: flex-end; height: 10px; vertical-align: middle; }
body[data-theme="obsidian"] .pri-bars span { width: 2.5px; border-radius: 0.5px; background: var(--seg-line2); }
body[data-theme="obsidian"] .pri-bars span.f0 { height: 4px; }
body[data-theme="obsidian"] .pri-bars span.f1 { height: 5.5px; }
body[data-theme="obsidian"] .pri-bars span.f2 { height: 7px; }
body[data-theme="obsidian"] .pri-bars span.f3 { height: 8.5px; }
body[data-theme="obsidian"] .pri-bars.p0 span.on { background: var(--seg-pri0); }
body[data-theme="obsidian"] .pri-bars.p1 span.on { background: var(--seg-pri1); }
body[data-theme="obsidian"] .pri-bars.p2 span.on { background: var(--seg-pri2); }
body[data-theme="obsidian"] .pri-bars.p3 span.on { background: var(--seg-pri3); }
body[data-theme="obsidian"] .status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500; letter-spacing: 0.1px;
  min-width: 92px;
}
body[data-theme="obsidian"] .status-pill .glyph { font-size: 13px; line-height: 1; width: 12px; text-align: center; }
body[data-theme="obsidian"] .status-pill.s-todo        { color: var(--seg-todo); }
body[data-theme="obsidian"] .status-pill.s-in_progress { color: var(--seg-inprog); }
body[data-theme="obsidian"] .status-pill.s-blocker     { color: var(--seg-blocker); }
body[data-theme="obsidian"] .status-pill.s-done        { color: var(--seg-done); }
body[data-theme="obsidian"] .status-pill.s-closed      { color: var(--seg-closed); }
body[data-theme="obsidian"] .row-id {
  color: var(--seg-faint); font-family: var(--seg-font-mono);
  font-size: 11px; font-variant-numeric: tabular-nums;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="obsidian"] .row-title-wrap {
  min-width: 0; display: flex; gap: 10px; align-items: baseline; overflow: hidden;
}
body[data-theme="obsidian"] .row-title {
  color: var(--seg-text); font-weight: 450;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 1; min-width: 0;
}
body[data-theme="obsidian"] .row.s-closed .row-title { color: var(--seg-faint); }
body[data-theme="obsidian"] .row-body {
  color: var(--seg-muted); font-size: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
body[data-theme="obsidian"] .blocker-chip {
  font-size: 11px;
  border: 1px solid var(--seg-line2);
  padding: 1px 6px; border-radius: 3px;
  font-variant-numeric: tabular-nums; color: var(--seg-faint);
  white-space: nowrap;
}
body[data-theme="obsidian"] .blocker-chip.unresolved {
  color: var(--seg-blocker); border-color: rgba(217,122,122,0.25);
}
body[data-theme="obsidian"] .row-time {
  color: var(--seg-faint); font-size: 11.5px; font-variant-numeric: tabular-nums;
  min-width: 48px; text-align: right;
}

/* empty */
body[data-theme="obsidian"] .empty {
  color: var(--seg-faint); text-align: center; padding: 60px 20px; font-size: 13px;
}

/* detail panel */
body[data-theme="obsidian"] .detail {
  width: 380px; flex-shrink: 0; border-left: 1px solid var(--seg-line);
  background: var(--seg-bg); overflow: auto;
  display: flex; flex-direction: column;
}
body[data-theme="obsidian"] .detail-head {
  padding: 12px 18px; border-bottom: 1px solid var(--seg-line);
  display: flex; justify-content: space-between; align-items: center;
}
body[data-theme="obsidian"] .detail-head .id {
  font-size: 11px; color: var(--seg-faint); font-family: var(--seg-font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="obsidian"] .detail-close {
  color: var(--seg-muted); font-size: 14px; padding-left: 10px;
}
body[data-theme="obsidian"] .detail-title {
  padding: 14px 18px 8px;
  margin: 0; font-size: 17px; font-weight: 500; color: var(--seg-text);
  line-height: 1.3; letter-spacing: -0.15px;
}
body[data-theme="obsidian"] .detail-meta {
  padding: 8px 18px 14px;
  display: grid; grid-template-columns: 84px 1fr;
  column-gap: 12px; row-gap: 8px; font-size: 12px;
  color: var(--seg-muted);
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .detail-meta select { color: var(--seg-text); cursor: pointer; }
body[data-theme="obsidian"] .detail-meta .val { color: var(--seg-text); }
body[data-theme="obsidian"] .detail-meta .val.mono { font-family: var(--seg-font-mono); font-size: 11px; }
body[data-theme="obsidian"] .detail-body {
  padding: 14px 18px; color: var(--seg-text);
  font-size: 13.5px; line-height: 1.6; white-space: pre-wrap;
}
body[data-theme="obsidian"] .detail-body textarea {
  width: 100%; min-height: 120px; color: var(--seg-text);
  font-size: 13.5px; line-height: 1.6; resize: vertical;
  font-family: inherit; background: var(--seg-surface); border: 1px solid var(--seg-line);
  padding: 10px; border-radius: 4px;
}
body[data-theme="obsidian"] .detail-body textarea:focus { border-color: var(--seg-accent); }
body[data-theme="obsidian"] .detail-rel {
  padding: 12px 18px; border-top: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .detail-rel .section-title {
  font-size: 10.5px; color: var(--seg-faint); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 6px;
}
body[data-theme="obsidian"] .detail-rel .rel-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  font-size: 12px; color: var(--seg-text); cursor: pointer;
}
body[data-theme="obsidian"] .detail-rel .rel-row:hover { color: var(--seg-accent); }
body[data-theme="obsidian"] .detail-rel .rel-id { color: var(--seg-faint); font-family: var(--seg-font-mono); font-size: 11px; }
body[data-theme="obsidian"] .detail-rel .rel-title {
  color: var(--seg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
}
body[data-theme="obsidian"] .detail-actions {
  display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--seg-line); margin-top: auto;
}
body[data-theme="obsidian"] .detail-actions button {
  padding: 6px 12px; border: 1px solid var(--seg-line); border-radius: 4px;
  font-size: 12px; color: var(--seg-muted);
}
body[data-theme="obsidian"] .detail-actions button:hover { color: var(--seg-text); border-color: var(--seg-line2); }
body[data-theme="obsidian"] .detail-actions .primary {
  background: var(--seg-accent); color: #000; border: none; font-weight: 500;
}
body[data-theme="obsidian"] .detail-actions .primary:hover { opacity: 0.9; }
body[data-theme="obsidian"] .detail-actions .danger { color: var(--seg-blocker); }
body[data-theme="obsidian"] .detail-actions .danger:hover { border-color: var(--seg-blocker); }

/* dialog: new project */
body[data-theme="obsidian"] .dialog-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center; padding-top: 120px;
}
body[data-theme="obsidian"] .dialog {
  background: var(--seg-bg); border: 1px solid var(--seg-line2); border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 420px; overflow: hidden;
}
body[data-theme="obsidian"] .dialog h3 {
  margin: 0; padding: 14px 18px; font-size: 14px; font-weight: 500;
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .dialog input {
  width: 100%; padding: 14px 18px; font-size: 14px; color: var(--seg-text);
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .dialog .dialog-actions { padding: 10px 18px; display: flex; gap: 8px; justify-content: flex-end; }
body[data-theme="obsidian"] .dialog .dialog-actions button {
  padding: 6px 14px; border-radius: 4px; font-size: 12px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
}
body[data-theme="obsidian"] .dialog .dialog-actions .primary {
  background: var(--seg-accent); color: #000; border: none; font-weight: 500;
}

/* stub view placeholder */
body[data-theme="obsidian"] .view-stub {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--seg-muted);
}
body[data-theme="obsidian"] .view-stub .big { font-size: 20px; color: var(--seg-text); font-weight: 500; }
body[data-theme="obsidian"] .view-stub .hint { font-size: 12px; color: var(--seg-faint); font-family: var(--seg-font-mono); }

/* connection indicator */
body[data-theme="obsidian"] .ws-indicator {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--seg-faint); transition: background 200ms;
}
body[data-theme="obsidian"] .ws-indicator.connected { background: var(--seg-done); }

/* animations */
@keyframes segPulse {
  0%   { box-shadow: 0 0 0 0 rgba(122,167,217,0.55); }
  100% { box-shadow: 0 0 0 8px rgba(122,167,217,0); }
}
@keyframes segSlideIn {
  0%   { opacity: 0; transform: translateY(-6px); background: rgba(122,167,217,0.08); }
  100% { opacity: 1; transform: none; background: transparent; }
}
@keyframes segDot {
  0%,100% { opacity: 0.5; }
  50%     { opacity: 1; }
}
.seg-pulse { animation: segPulse 1.4s ease-out; }
.seg-enter { animation: segSlideIn 420ms cubic-bezier(.2,.7,.2,1); }
</style>
</head>
<body data-theme="obsidian" data-mode="dark">
<div id="app"></div>
<script>
"use strict";

// ===================================================================
// Registry of themes. Each theme registers via Themes.register(name, spec).
// Obsidian is implemented; Console + Dossier will be added by future tasks.
// ===================================================================
const Themes = {
  registry: {},
  register(name, spec) { this.registry[name] = spec; },
  get(name) { return this.registry[name] || this.registry.obsidian; },
  list() { return Object.keys(this.registry); },
};

// ===================================================================
// Persistent state
// ===================================================================
const Store = {
  projects: [],
  tasks: [],
  activeProjectId: loadPref('project', null),
  selectedId: null,
  view: 'list',                  // list | kanban | graph
  search: '',
  composerOpen: false,
  editingBody: null,             // null | string when editing body in detail panel
  editingTitle: null,
  newProjectOpen: false,
  wsConnected: false,
  theme: loadPref('theme', 'obsidian'),
  mode: loadPref('mode', 'dark'),
  pulse: {},                     // id -> timestamp for pulse animation
  entering: {},                  // id -> timestamp for enter animation
  agentOn: true,                 // WS live flag (decorative)
};

function loadPref(key, fallback) {
  try { return localStorage.getItem('segments.' + key) || fallback; }
  catch (e) { return fallback; }
}
function savePref(key, value) {
  try {
    if (value == null) localStorage.removeItem('segments.' + key);
    else localStorage.setItem('segments.' + key, value);
  } catch (e) {}
}

// ===================================================================
// Utility functions
// ===================================================================
const Util = {
  relTime(iso, now) {
    now = now || Date.now();
    const t = new Date(iso).getTime();
    if (!t || isNaN(t)) return '';
    const diff = Math.max(0, (now - t) / 1000);
    if (diff < 45) return 'just now';
    if (diff < 90) return '1m ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 5400) return '1h ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    if (diff < 86400 * 2) return 'yesterday';
    if (diff < 86400 * 14) return Math.round(diff / 86400) + 'd ago';
    return Math.round(diff / 86400 / 7) + 'w ago';
  },
  firstLine(body) {
    if (!body) return '';
    return (body.split('\n').find(l => l.trim()) || '').trim();
  },
  fuzzy(q, tasks) {
    if (!q) return tasks;
    const n = q.toLowerCase();
    return tasks.filter(t =>
      (t.id || '').toLowerCase().includes(n) ||
      (t.title || '').toLowerCase().includes(n) ||
      (t.body || '').toLowerCase().includes(n)
    );
  },
  counts(tasks) {
    const c = { total: tasks.length, todo: 0, in_progress: 0, blocker: 0, done: 0, closed: 0 };
    tasks.forEach(t => { if (c[t.status] !== undefined) c[t.status]++; });
    return c;
  },
  ready(tasks) {
    const byId = Object.fromEntries(tasks.map(t => [t.id, t]));
    return tasks.filter(t =>
      t.status === 'todo' && (!t.blocked_by || (byId[t.blocked_by] && byId[t.blocked_by].status === 'done'))
    );
  },
  esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  },
  shortId(id, n) {
    if (!id) return '';
    n = n || 8;
    return id.length > n ? id.slice(0, n) : id;
  },
};

// ===================================================================
// API layer
// ===================================================================
const API = {
  async listProjects() {
    const r = await fetch('/api/projects');
    return await r.json();
  },
  async createProject(name) {
    const r = await fetch('/api/projects', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    return await r.json();
  },
  async listTasks(projectId) {
    const r = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/tasks');
    return await r.json();
  },
  async createTask(projectId, payload) {
    const r = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return await r.json();
  },
  async updateTask(id, payload) {
    const r = await fetch('/api/tasks/' + encodeURIComponent(id), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    return await r.json();
  },
  async deleteTask(id, projectId) {
    await fetch('/api/tasks/' + encodeURIComponent(id) + '?project_id=' + encodeURIComponent(projectId), {
      method: 'DELETE',
    });
  },
};

// ===================================================================
// WebSocket
// ===================================================================
let ws = null, reconnectDelay = 1000, reconnectTimer = null;

function wsConnect() {
  if (ws) { try { ws.close(); } catch (e) {} }
  ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => {
    Store.wsConnected = true;
    reconnectDelay = 1000;
    wsSend({ type: 'connected' });
    render();
  };
  ws.onclose = () => {
    Store.wsConnected = false;
    render();
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(wsConnect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch (err) { return; }
    handleWSMessage(msg);
  };
}
function wsSend(msg) { try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); } catch (e) {} }

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'connected':
      loadProjects();
      break;
    case 'task:created':
    case 'task:updated':
      if (msg.data && msg.data.project_id === Store.activeProjectId) {
        const now = Date.now();
        const isNew = !Store.tasks.some(t => t.id === msg.data.id);
        upsertTaskLocal(msg.data);
        if (msg.type === 'task:created' || isNew) Store.entering[msg.data.id] = now;
        else Store.pulse[msg.data.id] = now;
        sortAndRender();
        if (msg.type === 'task:created') setTimeout(() => { delete Store.entering[msg.data.id]; render(); }, 900);
        setTimeout(() => { delete Store.pulse[msg.data.id]; }, 2000);
      } else if (!msg.data) {
        loadTasks();
      }
      break;
    case 'tasks:created':
      if (Array.isArray(msg.data)) {
        let changed = false;
        const now = Date.now();
        for (const t of msg.data) {
          if (t && t.project_id === Store.activeProjectId) {
            upsertTaskLocal(t);
            Store.entering[t.id] = now;
            setTimeout(((id) => () => { delete Store.entering[id]; render(); })(t.id), 900);
            changed = true;
          }
        }
        if (changed) sortAndRender();
      }
      break;
    case 'task:deleted':
      if (msg.data && msg.data.id) {
        const before = Store.tasks.length;
        Store.tasks = Store.tasks.filter(t => t.id !== msg.data.id);
        if (Store.selectedId === msg.data.id) Store.selectedId = null;
        if (Store.tasks.length !== before) render();
      } else {
        loadTasks();
      }
      break;
    case 'project:created':
    case 'project:updated':
    case 'project:deleted':
      loadProjects();
      break;
  }
}

function upsertTaskLocal(task) {
  const i = Store.tasks.findIndex(t => t.id === task.id);
  if (i >= 0) Store.tasks[i] = task; else Store.tasks.push(task);
}

function sortAndRender() {
  Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
  render();
}

// ===================================================================
// Data loaders
// ===================================================================
async function loadProjects() {
  try {
    Store.projects = await API.listProjects();
    if (!Store.projects.some(p => p.id === Store.activeProjectId)) {
      Store.activeProjectId = Store.projects.length ? Store.projects[0].id : null;
      savePref('project', Store.activeProjectId);
    }
    render();
    if (Store.activeProjectId) await loadTasks();
  } catch (e) { console.error('loadProjects', e); }
}

async function loadTasks() {
  if (!Store.activeProjectId) { Store.tasks = []; render(); return; }
  try {
    Store.tasks = await API.listTasks(Store.activeProjectId);
    Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
    render();
  } catch (e) { console.error('loadTasks', e); }
}

// ===================================================================
// Actions (event handlers)
// ===================================================================
const Actions = {
  selectTask(id) { Store.selectedId = id; render(); },
  clearSelection() { Store.selectedId = null; render(); },
  setView(v) { Store.view = v; render(); },
  setSearch(v) { Store.search = v; render({ preserveFocus: '.search input' }); },
  openComposer() { Store.composerOpen = true; render({ focus: '.composer-title' }); },
  closeComposer() { Store.composerOpen = false; render(); },
  setTheme(name) {
    if (!Themes.registry[name]) return;
    Store.theme = name; savePref('theme', name); applyTheme(); render();
  },
  toggleMode() {
    Store.mode = Store.mode === 'dark' ? 'light' : 'dark';
    savePref('mode', Store.mode); applyTheme();
  },
  switchProject(id) {
    Store.activeProjectId = id; savePref('project', id);
    Store.selectedId = null; Store.tasks = [];
    render(); loadTasks();
  },
  openNewProject() { Store.newProjectOpen = true; render({ focus: '.dialog input' }); },
  closeNewProject() { Store.newProjectOpen = false; render(); },
  async createProject(name) {
    if (!name || !name.trim()) return;
    try {
      const p = await API.createProject(name.trim());
      Store.activeProjectId = p.id;
      Store.newProjectOpen = false;
      await loadProjects();
    } catch (e) { console.error('createProject', e); }
  },
  async createTaskFromComposer(title, body, priority, blockedBy) {
    if (!title || !title.trim() || !Store.activeProjectId) return;
    try {
      await API.createTask(Store.activeProjectId, {
        title: title.trim(), body: (body || '').trim(), priority: priority | 0,
      });
      if (blockedBy && blockedBy.trim()) {
        // Follow-up PUT to set blocker since create endpoint doesn't accept it.
        // We'll need the task id from create response; ignore for now if not returned.
      }
      Store.composerOpen = false;
      render();
    } catch (e) { console.error('createTask', e); }
  },
  async saveTaskEdit(id, patch) {
    const t = Store.tasks.find(x => x.id === id); if (!t) return;
    try {
      const payload = {
        project_id: t.project_id,
        title: patch.title !== undefined ? patch.title : t.title,
        body: patch.body !== undefined ? patch.body : t.body,
        status: patch.status !== undefined ? patch.status : t.status,
        priority: patch.priority !== undefined ? patch.priority : t.priority,
        blocked_by: patch.blocked_by !== undefined ? patch.blocked_by : (t.blocked_by || ''),
      };
      await API.updateTask(id, payload);
      Store.editingBody = null; Store.editingTitle = null;
    } catch (e) { console.error('saveTaskEdit', e); }
  },
  async deleteTaskById(id) {
    const t = Store.tasks.find(x => x.id === id); if (!t) return;
    if (!confirm('Delete task "' + t.title + '"?')) return;
    try {
      await API.deleteTask(id, t.project_id);
      if (Store.selectedId === id) Store.selectedId = null;
    } catch (e) { console.error('deleteTask', e); }
  },
  navigate(dir) {
    const filtered = filteredTasks();
    if (!filtered.length) return;
    const i = filtered.findIndex(t => t.id === Store.selectedId);
    const next = dir > 0 ? Math.min(filtered.length - 1, (i < 0 ? 0 : i + 1))
                         : Math.max(0, (i < 0 ? 0 : i - 1));
    Store.selectedId = filtered[next].id; render({ scrollTo: '.row.selected' });
  },
};

// ===================================================================
// Derived selectors
// ===================================================================
function filteredTasks() {
  let out = Store.tasks.slice();
  if (Store.search) out = Util.fuzzy(Store.search, out);
  return out;
}

function tasksById() {
  return Object.fromEntries(Store.tasks.map(t => [t.id, t]));
}

function groupedByStatus(tasks) {
  const order = ['in_progress', 'blocker', 'todo', 'done', 'closed'];
  const buckets = {};
  order.forEach(s => buckets[s] = []);
  tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });
  return order.filter(s => buckets[s].length).map(s => ({ key: s, items: buckets[s] }));
}

// ===================================================================
// Theme: Obsidian (Direction A) — implemented
// ===================================================================
Themes.register('obsidian', {
  label: 'Obsidian',
  description: 'Refined near-black, cool-steel accent.',
  statusMeta: {
    todo:        { label: 'Todo',        glyph: '○' },
    in_progress: { label: 'In progress', glyph: '◐' },
    blocker:     { label: 'Blocker',     glyph: '◉' },
    done:        { label: 'Done',        glyph: '●' },
    closed:      { label: 'Closed',      glyph: '⊘' },
  },
  render: renderObsidian,
});

function renderObsidian() {
  const T = Themes.get(Store.theme);
  const tasks = filteredTasks();
  const byId = tasksById();
  const counts = Util.counts(Store.tasks);
  const ready = Util.ready(Store.tasks);
  const selected = Store.selectedId ? byId[Store.selectedId] : null;

  return '<div class="app">' +
    obsTopbar(T) +
    '<div class="main">' +
      obsSidebar(T, counts, ready.length) +
      '<div class="content">' +
        (Store.composerOpen ? obsComposer(T) : '') +
        obsMainView(T, tasks, byId) +
      '</div>' +
      (selected ? obsDetail(T, selected, byId) : '') +
    '</div>' +
  (Store.newProjectOpen ? obsNewProjectDialog() : '') +
  '</div>';
}

function obsTopbar(T) {
  const tabs = [
    { id: 'list',   label: 'List',   hint: 'G L', enabled: true },
    { id: 'kanban', label: 'Kanban', hint: 'G K', enabled: false },
    { id: 'graph',  label: 'Graph',  hint: 'G G', enabled: false },
  ];
  return '<div class="topbar">' +
    '<div class="brand">' +
      '<div class="brand-mark"></div>' +
      '<span class="brand-name">Segments</span>' +
      '<span class="ws-indicator ' + (Store.wsConnected ? 'connected' : '') + '" title="' + (Store.wsConnected ? 'connected' : 'disconnected') + '"></span>' +
    '</div>' +
    '<div class="view-tabs">' +
      tabs.map(t => '<button class="view-tab ' + (Store.view === t.id ? 'active' : '') + '"' +
        (t.enabled ? ' data-act="view" data-view="' + t.id + '"' : ' data-disabled="1" title="coming soon"') + '>' +
        Util.esc(t.label) + '<span class="hint">' + t.hint + '</span></button>').join('') +
    '</div>' +
    '<div class="search-wrap"><label class="search">' +
      '<span class="icon">⌕</span>' +
      '<input type="text" placeholder="Search tasks… (press / to focus)" value="' + Util.esc(Store.search) + '" data-act="search">' +
      '<span class="slash">/</span>' +
    '</label></div>' +
    '<button class="topbar-btn" data-act="palette" title="Command palette (coming soon)">⌘K</button>' +
    '<label class="agent-ind ' + (Store.agentOn ? 'on' : '') + '" title="WebSocket live-update indicator">' +
      '<span class="agent-dot"></span>' +
      '<span>Agent ' + (Store.wsConnected ? 'live' : 'paused') + '</span>' +
    '</label>' +
    '<select class="theme-select" data-act="theme">' +
      Themes.list().map(k => '<option value="' + k + '"' + (k === Store.theme ? ' selected' : '') + '>' +
        Util.esc(Themes.get(k).label || k) + '</option>').join('') +
    '</select>' +
    '<button class="mode-btn" data-act="toggle-mode" title="Toggle light/dark">' + (Store.mode === 'dark' ? '☾' : '☀') + '</button>' +
  '</div>';
}

function obsSidebar(T, counts, readyCount) {
  const projectsHtml = Store.projects.map(p => {
    const tasks = Store.tasks.filter(t => t.project_id === p.id);
    const c = Util.counts(tasks);
    const bars = ['blocker', 'in_progress', 'todo', 'done']
      .filter(s => c[s]).map(s => {
        const h = 4 + Math.min(c[s], 8);
        return '<span style="height:' + h + 'px;background:var(--seg-' + (s === 'in_progress' ? 'inprog' : s) + ')" title="' + c[s] + ' ' + s + '"></span>';
      }).join('');
    return '<button class="project-item ' + (Store.activeProjectId === p.id ? 'active' : '') + '" data-act="project" data-id="' + Util.esc(p.id) + '">' +
      '<span class="project-dot"></span>' +
      '<span class="project-name">' + Util.esc(p.name) + '</span>' +
      '<span class="project-count">' + tasks.length + '</span>' +
      '<span class="project-bars">' + bars + '</span>' +
    '</button>';
  }).join('');

  return '<aside class="sidebar">' +
    '<div>' +
      '<div class="side-label">Views</div>' +
      '<button class="side-item ' + (!Store.activeProjectId ? 'active' : '') + '" data-act="all-tasks"><span>All tasks</span><span class="count">' + counts.total + '</span></button>' +
      '<button class="side-item"><span>Ready queue</span><span class="pill">' + readyCount + '</span></button>' +
    '</div>' +
    '<div>' +
      '<div class="side-label" style="display:flex;justify-content:space-between;align-items:center">' +
        '<span>Projects</span>' +
        '<button data-act="new-project" title="New project" style="color:var(--seg-faint);font-size:14px;padding:0 4px;line-height:1">+</button>' +
      '</div>' +
      '<div>' + projectsHtml + '</div>' +
    '</div>' +
    '<div class="side-shortcuts">' +
      '<div class="title">Shortcuts</div>' +
      '<div><kbd>j</kbd> <kbd>k</kbd> navigate</div>' +
      '<div><kbd>c</kbd> create · <kbd>e</kbd> edit</div>' +
      '<div><kbd>/</kbd> search · <kbd>esc</kbd> close</div>' +
      '<div><kbd>enter</kbd> open task</div>' +
    '</div>' +
  '</aside>';
}

function obsComposer(T) {
  return '<div class="composer">' +
    '<input class="composer-title" type="text" placeholder="Task title — press Enter to create" data-act="composer-submit">' +
    '<textarea class="composer-body" rows="2" placeholder="Description (optional)"></textarea>' +
    '<div class="composer-row">' +
      '<span class="label">Priority</span>' +
      [0, 1, 2, 3].map(p => '<button class="pri-btn" data-act="composer-pri" data-pri="' + p + '">P' + p + '</button>').join('') +
      '<span class="composer-hint"><kbd>↵</kbd> create · <kbd>esc</kbd> cancel</span>' +
    '</div>' +
  '</div>';
}

function obsMainView(T, tasks, byId) {
  if (Store.view === 'kanban' || Store.view === 'graph') {
    return '<div class="view-stub">' +
      '<div class="big">' + (Store.view === 'kanban' ? 'Kanban' : 'Graph') + ' view</div>' +
      '<div class="hint">coming in a follow-up task</div>' +
    '</div>';
  }
  return obsListView(T, tasks, byId);
}

function obsListView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="list"><div class="empty">' +
      (Store.activeProjectId ? 'No tasks' + (Store.search ? ' match “' + Util.esc(Store.search) + '”' : '') + '. Press <kbd>c</kbd> to create.'
        : 'Select or create a project to get started.') +
    '</div></div>';
  }
  const groups = groupedByStatus(tasks);
  const T_META = T.statusMeta;
  return '<div class="list">' +
    groups.map(g => {
      const meta = T_META[g.key];
      return '<div class="list-group">' +
        '<div class="list-group-header">' +
          '<span class="glyph" style="color:var(--seg-' + (g.key === 'in_progress' ? 'inprog' : g.key) + ')">' + (meta ? meta.glyph : '') + '</span>' +
          '<span>' + (meta ? meta.label : g.key) + '</span>' +
          '<span class="n">' + g.items.length + '</span>' +
        '</div>' +
        g.items.map(t => obsListRow(T, t, byId)).join('') +
      '</div>';
    }).join('') +
  '</div>';
}

function obsListRow(T, t, byId) {
  const meta = T.statusMeta[t.status];
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const body1 = Util.firstLine(t.body);
  const selected = Store.selectedId === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['row', 's-' + t.status];
  if (selected) classes.push('selected');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const bars = [0, 1, 2, 3].map(i => {
    const filled = (4 - t.priority);
    return '<span class="f' + i + ' ' + (i < filled ? 'on' : '') + '"></span>';
  }).join('');

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : '') + '" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? '✕ ' : '✓ ') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span></span>';

  return '<div class="' + classes.join(' ') + '" data-act="select" data-id="' + Util.esc(t.id) + '">' +
    '<span class="pri-bars p' + t.priority + '">' + bars + '</span>' +
    '<span class="status-pill s-' + t.status + '">' +
      '<span class="glyph">' + (meta ? meta.glyph : '') + '</span>' +
      '<span>' + (meta ? meta.label : t.status) + '</span>' +
    '</span>' +
    '<span class="row-id" title="' + Util.esc(t.id) + '">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
    '<span class="row-title-wrap">' +
      '<span class="row-title">' + Util.esc(t.title) + '</span>' +
      (body1 ? '<span class="row-body">— ' + Util.esc(body1) + '</span>' : '') +
    '</span>' +
    blockerChip +
    '<span class="row-time">' + Util.esc(Util.relTime(t.updated_at)) + '</span>' +
  '</div>';
}

function obsDetail(T, task, byId) {
  const proj = Store.projects.find(p => p.id === task.project_id);
  const blocker = task.blocked_by ? byId[task.blocked_by] : null;
  const dependents = Object.values(byId).filter(t => t.blocked_by === task.id);
  const statusOpts = Object.keys(T.statusMeta).map(s =>
    '<option value="' + s + '"' + (task.status === s ? ' selected' : '') + '>' + T.statusMeta[s].label + '</option>').join('');
  const blockerOpts = '<option value="">— none —</option>' + Store.tasks.filter(x => x.id !== task.id).map(x =>
    '<option value="' + Util.esc(x.id) + '"' + (task.blocked_by === x.id ? ' selected' : '') + '>' +
    Util.esc(Util.shortId(x.id, 8)) + ' — ' + Util.esc(x.title.slice(0, 40)) + '</option>').join('');

  const editing = Store.editingBody !== null || Store.editingTitle !== null;
  const titleHtml = Store.editingTitle !== null
    ? '<input class="composer-title" type="text" value="' + Util.esc(Store.editingTitle) + '" data-act="detail-edit-title" style="background:var(--seg-surface);border:1px solid var(--seg-line);padding:8px 12px;border-radius:4px;width:calc(100% - 36px);margin:14px 18px 8px">'
    : '<h2 class="detail-title" data-act="edit-title">' + Util.esc(task.title) + '</h2>';
  const bodyHtml = Store.editingBody !== null
    ? '<div class="detail-body"><textarea data-act="detail-edit-body">' + Util.esc(Store.editingBody) + '</textarea><div style="margin-top:6px;font-size:10.5px;color:var(--seg-faint)"><kbd>⌘↵</kbd> save · <kbd>esc</kbd> cancel</div></div>'
    : '<div class="detail-body" data-act="edit-body">' +
        (task.body ? Util.esc(task.body) : '<span style="color:var(--seg-faint)">No description. Click to add.</span>') +
      '</div>';

  return '<aside class="detail">' +
    '<div class="detail-head">' +
      '<span class="id">' + Util.esc(Util.shortId(task.id, 12)) + (proj ? ' · ' + Util.esc(proj.name) : '') + '</span>' +
      '<button class="detail-close" data-act="deselect">✕</button>' +
    '</div>' +
    titleHtml +
    '<div class="detail-meta">' +
      '<span>Status</span>' +
      '<span><select data-act="detail-status">' + statusOpts + '</select></span>' +
      '<span>Priority</span>' +
      '<span><select data-act="detail-priority">' +
        [0, 1, 2, 3].map(p => '<option value="' + p + '"' + (task.priority === p ? ' selected' : '') + '>P' + p + '</option>').join('') +
      '</select></span>' +
      '<span>Blocked by</span>' +
      '<span><select data-act="detail-blocker">' + blockerOpts + '</select></span>' +
      '<span>Updated</span>' +
      '<span class="val mono">' + Util.esc(Util.relTime(task.updated_at)) + '</span>' +
      '<span>Created</span>' +
      '<span class="val mono">' + Util.esc(Util.relTime(task.created_at)) + '</span>' +
      (task.closed_at ? '<span>Closed</span><span class="val mono">' + Util.esc(Util.relTime(task.closed_at)) + '</span>' : '') +
    '</div>' +
    bodyHtml +
    (blocker || dependents.length ? '<div class="detail-rel">' +
      (blocker ? '<div style="margin-bottom:12px"><div class="section-title">Blocked by</div>' +
        '<div class="rel-row" data-act="select" data-id="' + Util.esc(blocker.id) + '">' +
          '<span class="status-pill s-' + blocker.status + '"><span class="glyph">' + T.statusMeta[blocker.status].glyph + '</span></span>' +
          '<span class="rel-id">' + Util.esc(Util.shortId(blocker.id, 8)) + '</span>' +
          '<span class="rel-title">' + Util.esc(blocker.title) + '</span>' +
        '</div></div>' : '') +
      (dependents.length ? '<div><div class="section-title">Blocking</div>' +
        dependents.map(d => '<div class="rel-row" data-act="select" data-id="' + Util.esc(d.id) + '">' +
          '<span class="status-pill s-' + d.status + '"><span class="glyph">' + T.statusMeta[d.status].glyph + '</span></span>' +
          '<span class="rel-id">' + Util.esc(Util.shortId(d.id, 8)) + '</span>' +
          '<span class="rel-title">' + Util.esc(d.title) + '</span>' +
        '</div>').join('') +
      '</div>' : '') +
    '</div>' : '') +
    '<div class="detail-actions">' +
      (editing
        ? '<button class="primary" data-act="detail-save">Save</button><button data-act="detail-cancel">Cancel</button>'
        : '<button class="danger" data-act="detail-delete">Delete</button>') +
    '</div>' +
  '</aside>';
}

function obsNewProjectDialog() {
  return '<div class="dialog-backdrop" data-act="close-new-project-backdrop"><div class="dialog">' +
    '<h3>New project</h3>' +
    '<input type="text" placeholder="Project name" data-act="new-project-input" autofocus>' +
    '<div class="dialog-actions">' +
      '<button data-act="close-new-project">Cancel</button>' +
      '<button class="primary" data-act="confirm-new-project">Create</button>' +
    '</div>' +
  '</div></div>';
}

// ===================================================================
// Render dispatcher
// ===================================================================
const app = document.getElementById('app');

function render(opts) {
  applyTheme();
  const theme = Themes.get(Store.theme);
  const html = (theme.render || renderObsidian)();
  app.innerHTML = html;
  if (opts && opts.focus) {
    const el = document.querySelector(opts.focus);
    if (el) el.focus();
  }
  if (opts && opts.scrollTo) {
    const el = document.querySelector(opts.scrollTo);
    if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest' });
  }
  if (opts && opts.preserveFocus) {
    const el = document.querySelector(opts.preserveFocus);
    if (el) { el.focus(); if (el.setSelectionRange) { try { const v = el.value; el.setSelectionRange(v.length, v.length); } catch (e) {} } }
  }
}

function applyTheme() {
  document.body.setAttribute('data-theme', Store.theme);
  document.body.setAttribute('data-mode', Store.mode);
}

// ===================================================================
// Event delegation
// ===================================================================
function actOf(el) {
  while (el && el !== app) {
    if (el.dataset && el.dataset.act) return { el, act: el.dataset.act };
    el = el.parentElement;
  }
  return { el: null, act: null };
}

app.addEventListener('click', async (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  const id = el && el.dataset ? el.dataset.id : null;

  switch (act) {
    case 'select': Actions.selectTask(id); return;
    case 'deselect': Actions.clearSelection(); return;
    case 'view': Actions.setView(el.dataset.view); return;
    case 'project': Actions.switchProject(id); return;
    case 'all-tasks': /* deferred until multi-project list-all is wired */ return;
    case 'new-project': Actions.openNewProject(); return;
    case 'close-new-project': Actions.closeNewProject(); return;
    case 'close-new-project-backdrop':
      if (e.target === el) Actions.closeNewProject();
      return;
    case 'confirm-new-project': {
      const input = document.querySelector('.dialog input');
      if (input) await Actions.createProject(input.value);
      return;
    }
    case 'new-project-input': return;
    case 'toggle-mode': Actions.toggleMode(); return;
    case 'palette': /* deferred */ return;
    case 'composer-pri': {
      const p = parseInt(el.dataset.pri, 10);
      document.querySelectorAll('.pri-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.pri, 10) === p));
      app.dataset.composerPri = String(p);
      return;
    }
    case 'edit-title':
      Store.editingTitle = (Store.selectedId && Store.tasks.find(t => t.id === Store.selectedId)?.title) || '';
      render({ focus: '.detail input' });
      return;
    case 'edit-body':
      Store.editingBody = (Store.selectedId && Store.tasks.find(t => t.id === Store.selectedId)?.body) || '';
      render({ focus: '.detail textarea' });
      return;
    case 'detail-save': {
      const sel = Store.selectedId;
      const patch = {};
      if (Store.editingTitle !== null) patch.title = Store.editingTitle;
      if (Store.editingBody !== null) patch.body = Store.editingBody;
      if (sel) await Actions.saveTaskEdit(sel, patch);
      render();
      return;
    }
    case 'detail-cancel':
      Store.editingBody = null; Store.editingTitle = null; render(); return;
    case 'detail-delete':
      if (Store.selectedId) await Actions.deleteTaskById(Store.selectedId);
      return;
  }
});

app.addEventListener('input', (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  switch (act) {
    case 'search': Store.search = el.value; render({ preserveFocus: '.search input' }); return;
    case 'detail-edit-title': Store.editingTitle = el.value; return;
    case 'detail-edit-body': Store.editingBody = el.value; return;
  }
});

app.addEventListener('change', async (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  switch (act) {
    case 'theme': Actions.setTheme(el.value); return;
    case 'detail-status':
      if (Store.selectedId) await Actions.saveTaskEdit(Store.selectedId, { status: el.value });
      return;
    case 'detail-priority':
      if (Store.selectedId) await Actions.saveTaskEdit(Store.selectedId, { priority: parseInt(el.value, 10) });
      return;
    case 'detail-blocker':
      if (Store.selectedId) await Actions.saveTaskEdit(Store.selectedId, { blocked_by: el.value });
      return;
  }
});

app.addEventListener('keydown', async (e) => {
  const { el, act } = actOf(e.target);
  if (!act) return;
  if (act === 'composer-submit' && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const title = el.value;
    const body = (document.querySelector('.composer-body') || {}).value || '';
    const pri = parseInt(app.dataset.composerPri || '1', 10);
    await Actions.createTaskFromComposer(title, body, pri, '');
    return;
  }
  if (act === 'detail-edit-body' && e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    const btn = document.querySelector('[data-act="detail-save"]');
    if (btn) btn.click();
    return;
  }
  if (act === 'new-project-input' && e.key === 'Enter') {
    e.preventDefault();
    await Actions.createProject(el.value);
    return;
  }
});

// ===================================================================
// Global keyboard
// ===================================================================
window.addEventListener('keydown', (e) => {
  const target = e.target;
  const isInput = target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable);

  if (e.key === 'Escape') {
    if (Store.newProjectOpen) { Actions.closeNewProject(); e.preventDefault(); return; }
    if (Store.editingBody !== null || Store.editingTitle !== null) {
      Store.editingBody = null; Store.editingTitle = null; render(); e.preventDefault(); return;
    }
    if (Store.composerOpen) { Actions.closeComposer(); e.preventDefault(); return; }
    if (Store.selectedId) { Actions.clearSelection(); e.preventDefault(); return; }
    if (isInput && target.blur) target.blur();
    return;
  }

  if (isInput) return;

  if (e.key === '/') {
    const el = document.querySelector('.search input');
    if (el) { el.focus(); e.preventDefault(); }
    return;
  }
  if (e.key === 'c') {
    Actions.openComposer();
    e.preventDefault();
    return;
  }
  if (e.key === 'e' && Store.selectedId) {
    Store.editingBody = (Store.tasks.find(t => t.id === Store.selectedId)?.body) || '';
    render({ focus: '.detail textarea' });
    e.preventDefault();
    return;
  }
  if (e.key === 'j' || e.key === 'ArrowDown') { Actions.navigate(1); e.preventDefault(); return; }
  if (e.key === 'k' || e.key === 'ArrowUp')   { Actions.navigate(-1); e.preventDefault(); return; }
  if (e.key === 'Enter' && Store.selectedId) {
    // Selection already shows detail panel — focus body for edit.
    const el = document.querySelector('.detail');
    if (el && el.scrollIntoView) el.scrollIntoView();
    return;
  }
});

// ===================================================================
// Bootstrap
// ===================================================================
applyTheme();
render();
wsConnect();
loadProjects();
</script>
</body>
</html>
