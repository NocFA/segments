body[data-theme="dossier"] .pri-roman.p2 { color: var(--seg-pri2); }
body[data-theme="dossier"] .pri-roman.p3 { color: var(--seg-pri3); }

body[data-theme="dossier"] .status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 2px; font-weight: 500;
  text-transform: uppercase;
}
body[data-theme="dossier"] .status-pill .glyph { font-size: 12px; }
body[data-theme="dossier"] .status-pill.s-todo        { color: var(--seg-todo); }
body[data-theme="dossier"] .status-pill.s-in_progress { color: var(--seg-inprog); }
body[data-theme="dossier"] .status-pill.s-blocker     { color: var(--seg-blocker); }
body[data-theme="dossier"] .status-pill.s-done        { color: var(--seg-done); }
body[data-theme="dossier"] .status-pill.s-closed      { color: var(--seg-closed); }

body[data-theme="dossier"] .row-title-wrap { min-width: 0; }
body[data-theme="dossier"] .row-title {
  font-family: var(--seg-font-serif);
  font-size: 17px; line-height: 1.25;
  color: var(--seg-text);
  font-weight: 400; letter-spacing: -0.2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body[data-theme="dossier"] .row.s-closed .row-title {
  color: var(--seg-faint); text-decoration: line-through;
}
body[data-theme="dossier"] .row-body {
  font-family: var(--seg-font);
  font-size: 11.5px;
  color: var(--seg-muted);
  margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body[data-theme="dossier"] .blocker-chip {
  font-family: var(--seg-font); font-size: 9.5px; font-weight: 600;
  letter-spacing: 1.5px; white-space: nowrap;
}
body[data-theme="dossier"] .blocker-chip.unresolved {
  color: var(--seg-blocker);
  border: 1.5px solid var(--seg-blocker);
  padding: 1px 5px; border-radius: 2px;
  transform: rotate(-2deg);
  display: inline-block;
}
body[data-theme="dossier"] .blocker-chip.resolved {
  color: var(--seg-faint); font-size: 10px;
}
body[data-theme="dossier"] .row-proj {
  font-family: var(--seg-font); font-size: 9.5px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--seg-muted);
  border: 1px solid var(--seg-rule); padding: 1px 6px; border-radius: 2px;
  white-space: nowrap; flex-shrink: 0;
}
body[data-theme="dossier"] .row-time {
  font-family: var(--seg-font);
  font-size: 10.5px;
  color: var(--seg-muted);
  text-align: right; letter-spacing: 0.5px; text-transform: uppercase;
}
body[data-theme="dossier"] .row-time .id-line {
  font-size: 9px; color: var(--seg-faint); text-transform: none;
  letter-spacing: 0.3px;
  overflow: hidden; text-overflow: ellipsis;
}

body[data-theme="dossier"] .empty {
  padding: 80px 24px; text-align: center;
  font-family: var(--seg-font-serif); font-style: italic;
  font-size: 16px; color: var(--seg-faint);
}

/* detail panel — overlays content so opening/closing doesn't reflow the view */
body[data-theme="dossier"] .detail {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 440px; z-index: 50;
  border-left: 2px solid var(--seg-rule);
  background: var(--seg-bg); overflow: hidden auto;
  display: flex; flex-direction: column;
  box-shadow: -16px 0 36px rgba(22,19,18,0.45);
}
body[data-theme="dossier"] .detail-body { overflow-wrap: anywhere; word-break: break-word; }
body[data-theme="dossier"] .detail-meta .val { overflow-wrap: anywhere; min-width: 0; }
body[data-theme="dossier"] .detail-meta select { max-width: 100%; }
body[data-theme="dossier"] .detail-head {
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--seg-rule2);
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--seg-font); font-size: 10px; letter-spacing: 2px;
  color: var(--seg-muted); text-transform: uppercase; gap: 10px;
}
body[data-theme="dossier"] .detail-head .id {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  flex: 1; min-width: 0;
}
body[data-theme="dossier"] .detail-close {
  color: var(--seg-text); font-size: 16px; padding: 0 4px;
}
body[data-theme="dossier"] .detail-title-wrap {
  padding: 20px 24px 8px; position: relative;
}
body[data-theme="dossier"] .detail-title-meta {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
body[data-theme="dossier"] .detail-title {
  margin: 0;
  font-family: var(--seg-font-serif);
  font-size: 26px; font-weight: 400;
  color: var(--seg-text);
  line-height: 1.15; letter-spacing: -0.5px;
  cursor: pointer;
}
body[data-theme="dossier"] .detail-title-input {
  width: 100%;
  font-family: var(--seg-font-serif);
  font-size: 22px; color: var(--seg-text);
  background: var(--seg-surface);
  border: 1px solid var(--seg-rule2);
  padding: 8px 10px;
}
body[data-theme="dossier"] .detail-stamp {
  position: absolute; top: 20px; right: 24px;
  border: 2px solid var(--seg-blocker);
  padding: 4px 10px; transform: rotate(6deg);
  font-family: var(--seg-font);
  font-size: 10px; font-weight: 700;
  color: var(--seg-blocker); letter-spacing: 2px;
}
body[data-theme="dossier"] .detail-meta {
  padding: 14px 24px;
  display: grid; grid-template-columns: 96px 1fr;
  column-gap: 12px; row-gap: 6px;
  border-top: 0.5px dashed var(--seg-rule2);
  border-bottom: 0.5px dashed var(--seg-rule2);
  font-family: var(--seg-font);
  font-size: 10.5px; letter-spacing: 1px;
  color: var(--seg-muted);
}
body[data-theme="dossier"] .detail-meta .label { text-transform: uppercase; }
body[data-theme="dossier"] .detail-meta select,
body[data-theme="dossier"] .blocker-combo-trigger {
  font-family: var(--seg-font);
}
body[data-theme="dossier"] .detail-meta .val { color: var(--seg-text); }
body[data-theme="dossier"] .detail-meta .val.mono { font-family: var(--seg-font); }

body[data-theme="dossier"] .detail-body {
  padding: 20px 24px;
  font-family: var(--seg-font-serif);
  font-size: 15px; line-height: 1.55;
  color: var(--seg-text);
  white-space: pre-wrap;
}
body[data-theme="dossier"] .detail-body.has-body::first-letter {
  font-size: 44px; float: left; line-height: 0.9;
  margin-right: 6px; margin-top: 6px;
  font-family: var(--seg-font-serif); color: var(--seg-text);
}
body[data-theme="dossier"] .detail-body textarea {
  width: 100%; min-height: 140px;
  color: var(--seg-text);
  font-family: var(--seg-font-serif);
  font-size: 15px; line-height: 1.55;
  resize: vertical;
  background: var(--seg-surface);
  border: 1px solid var(--seg-rule2);
  padding: 10px;
}
body[data-theme="dossier"] .detail-body textarea:focus { border-color: var(--seg-rule); }

body[data-theme="dossier"] .detail-rel {
  padding: 16px 24px;
  border-top: 0.5px solid var(--seg-rule);
}
body[data-theme="dossier"] .detail-rel .section-title {
  font-family: var(--seg-font); font-size: 9.5px; letter-spacing: 2px;
  color: var(--seg-muted); text-transform: uppercase; margin-bottom: 8px;
}
body[data-theme="dossier"] .detail-rel .rel-row {
  padding: 6px 0; border-bottom: 0.5px dashed var(--seg-rule2);
  display: grid; grid-template-columns: 108px 1fr auto;
  gap: 10px; align-items: center;
  cursor: pointer;
}
body[data-theme="dossier"] .detail-rel .rel-row:hover .rel-title { color: var(--seg-accent); }
body[data-theme="dossier"] .detail-rel .rel-title {
  font-family: var(--seg-font-serif); font-size: 14px; color: var(--seg-text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="dossier"] .detail-rel .rel-id {
  font-family: var(--seg-font); font-size: 9px; color: var(--seg-faint);
  letter-spacing: 0.5px;
}

body[data-theme="dossier"] .detail-actions {
  display: flex; gap: 8px; padding: 12px 24px;
  border-top: 1px solid var(--seg-rule); margin-top: auto;
}
body[data-theme="dossier"] .detail-actions button {
  padding: 4px 12px;
  border: 1px solid var(--seg-rule2);
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 2px;
  color: var(--seg-muted); text-transform: uppercase;
}
body[data-theme="dossier"] .detail-actions button:hover {
  color: var(--seg-text); border-color: var(--seg-rule);
}
body[data-theme="dossier"] .detail-actions .primary {
  background: var(--seg-text); color: var(--seg-bg); border: none;
  font-weight: 600;
}
body[data-theme="dossier"] .detail-actions .danger { color: var(--seg-blocker); }
body[data-theme="dossier"] .detail-actions .danger:hover { border-color: var(--seg-blocker); }

/* dialog */
body[data-theme="dossier"] .dialog-backdrop {
  position: fixed; inset: 0;
  background: rgba(20,17,14,0.55); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center; padding-top: 120px;
}
body[data-theme="dossier"] .dialog {
  background: var(--seg-bg);
  border: 2px solid var(--seg-rule);
  box-shadow: 12px 12px 0 rgba(22,19,18,0.18);
  width: 480px; overflow: hidden;
}
body[data-theme="dossier"] .dialog h3 {
  margin: 0; padding: 14px 20px;
  font-family: var(--seg-font-serif); font-size: 22px;
  color: var(--seg-text);
  border-bottom: 0.5px solid var(--seg-rule2);
  font-style: italic; font-weight: 400;
}
body[data-theme="dossier"] .dialog input {
  width: 100%; padding: 14px 20px;
  font-family: var(--seg-font-serif);
  font-size: 18px; color: var(--seg-text);
  border-bottom: 0.5px solid var(--seg-rule2);
}
body[data-theme="dossier"] .dialog .dialog-actions {
  padding: 10px 20px;
  display: flex; gap: 8px; justify-content: flex-end;
}
body[data-theme="dossier"] .dialog .dialog-actions button {
  padding: 4px 12px; border: 1px solid var(--seg-rule2);
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 2px;
  color: var(--seg-muted); text-transform: uppercase;
}
body[data-theme="dossier"] .dialog .dialog-actions .primary {
  background: var(--seg-text); color: var(--seg-bg); border: none;
  font-weight: 600;
}

/* view stub */
body[data-theme="dossier"] .view-stub {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  font-family: var(--seg-font-serif);
  color: var(--seg-muted);
}
body[data-theme="dossier"] .view-stub .big {
  font-size: 28px; color: var(--seg-text); font-style: italic; letter-spacing: -0.3px;
}
body[data-theme="dossier"] .view-stub .hint {
  font-family: var(--seg-font); font-size: 10px; letter-spacing: 2px;
  color: var(--seg-faint); text-transform: uppercase;
}

/* kanban view (Board) */
body[data-theme="dossier"] .kanban {
  flex: 1; display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  overflow: auto; background: var(--seg-bg);
}
body[data-theme="dossier"] .kanban-col {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--seg-rule2);
  min-width: 0; transition: background 160ms ease;
}
body[data-theme="dossier"] .kanban-col:last-child { border-right: none; }
body[data-theme="dossier"] .kanban-col.drag-over { background: var(--seg-accent-dim); }
body[data-theme="dossier"] .kanban-col-head {
  position: sticky; top: 0; z-index: 1;
  padding: 20px 20px 10px; background: var(--seg-bg);
  border-bottom: 1px solid var(--seg-rule);
  display: flex; align-items: baseline; gap: 10px;
  font-family: var(--seg-font-serif);
  font-size: 20px; font-style: italic; letter-spacing: -0.2px;
  color: var(--seg-muted);
}
body[data-theme="dossier"] .kanban-col-head.g-in_progress { color: var(--seg-inprog); }
body[data-theme="dossier"] .kanban-col-head.g-blocker     { color: var(--seg-blocker); }
body[data-theme="dossier"] .kanban-col-head.g-todo        { color: var(--seg-text); }
body[data-theme="dossier"] .kanban-col-head.g-done        { color: var(--seg-done); }
body[data-theme="dossier"] .kanban-col-head .glyph { font-size: 14px; font-style: normal; }
body[data-theme="dossier"] .kanban-col-head .n {
  margin-left: auto;
  font-family: var(--seg-font); font-size: 10px; letter-spacing: 1.5px;
  color: var(--seg-muted); text-transform: uppercase;
  font-variant-numeric: tabular-nums;
}
body[data-theme="dossier"] .kanban-col-body {
  flex: 1; padding: 14px; overflow: auto;
  display: flex; flex-direction: column; gap: 12px;
  min-height: 140px;
}
body[data-theme="dossier"] .kanban-card {
  padding: 14px 16px;
  background: var(--seg-surface);
  border: 1px solid var(--seg-rule2);
  cursor: grab;
  transition: border-color 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
}
body[data-theme="dossier"] .kanban-card:hover { border-color: var(--seg-rule); }
body[data-theme="dossier"] .kanban-card.selected {
  border-color: var(--seg-rule); box-shadow: 5px 5px 0 var(--seg-rule2);
}
body[data-theme="dossier"] .kanban-card.dragging { opacity: 0.35; cursor: grabbing; }
body[data-theme="dossier"] .kanban-card .card-top {
  display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  margin-bottom: 8px;
  font-family: var(--seg-font); font-size: 9.5px; letter-spacing: 1.5px;
  color: var(--seg-muted); text-transform: uppercase;
}
body[data-theme="dossier"] .kanban-card .pri-roman {
  font-family: var(--seg-font-serif); font-size: 18px;
  font-style: italic; letter-spacing: 0; text-transform: none;
  line-height: 1;
}
body[data-theme="dossier"] .kanban-card .pri-roman.p0 { color: var(--seg-pri0); }
body[data-theme="dossier"] .kanban-card .pri-roman.p1 { color: var(--seg-pri1); }
body[data-theme="dossier"] .kanban-card .pri-roman.p2 { color: var(--seg-pri2); }
body[data-theme="dossier"] .kanban-card .pri-roman.p3 { color: var(--seg-pri3); }
body[data-theme="dossier"] .kanban-card .card-id {
  font-family: var(--seg-font); color: var(--seg-faint);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="dossier"] .kanban-card .card-title {
  font-family: var(--seg-font-serif); font-size: 15px;
  color: var(--seg-text); line-height: 1.3; letter-spacing: -0.2px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 8px;
}
body[data-theme="dossier"] .kanban-card .card-bottom {
  display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  font-family: var(--seg-font); font-size: 9.5px; letter-spacing: 1.2px;
  color: var(--seg-muted); text-transform: uppercase;
  min-width: 0;
}
body[data-theme="dossier"] .kanban-card .card-bottom .card-time { white-space: nowrap; }
body[data-theme="dossier"] .kanban-card .blocker-chip {
  font-family: var(--seg-font); font-size: 9.5px; letter-spacing: 1.2px;
  color: var(--seg-muted); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="dossier"] .kanban-card .blocker-chip.unresolved {
  color: var(--seg-blocker);
}
body[data-theme="dossier"] .kanban-empty {
  color: var(--seg-faint);
  font-family: var(--seg-font-serif); font-size: 13px; font-style: italic;
  padding: 28px 10px; text-align: center;
  border: 0.5px dashed var(--seg-rule2);
}

/* graph view (Lineage) */
body[data-theme="dossier"] .graph {
  flex: 1; overflow: auto; background: var(--seg-bg);
}
/* When the detail panel is open it overlays ~440px on the right; pad the
   graph's scrollable area so the user can scroll right to peek under it. */
body[data-theme="dossier"] .graph.has-detail { padding-right: 460px; }
body[data-theme="dossier"] .graph-head {
  position: sticky; top: 0; z-index: 2; background: var(--seg-bg);
  padding: 16px 24px 10px;
  border-bottom: 1px solid var(--seg-rule);
}
body[data-theme="dossier"] .graph-head .head-title {
  font-family: var(--seg-font-serif);
  font-size: 24px; color: var(--seg-text);
  font-style: italic; letter-spacing: -0.3px;
}
body[data-theme="dossier"] .graph-head .head-sub {
  font-family: var(--seg-font); font-size: 10px; color: var(--seg-muted);
  letter-spacing: 1.2px; text-transform: uppercase; margin-top: 4px;
}
body[data-theme="dossier"] .graph-svg { display: block; }
body[data-theme="dossier"] .graph-svg .g-bg { fill: transparent; pointer-events: all; cursor: default; }
body[data-theme="dossier"] .graph-svg .edge { fill: none; pointer-events: none; transition: opacity 160ms ease; }
body[data-theme="dossier"] .graph-svg .edge.open    { stroke: var(--seg-rule2); stroke-width: 0.75; stroke-dasharray: 3 4; }
body[data-theme="dossier"] .graph-svg .edge.blocked { stroke: var(--seg-blocker); stroke-width: 1.5; }
body[data-theme="dossier"] .graph-svg .arrow.open    { fill: var(--seg-rule2); }
body[data-theme="dossier"] .graph-svg .arrow.blocked { fill: var(--seg-blocker); }
body[data-theme="dossier"] .graph-svg .edge.off { opacity: 0.10; }
body[data-theme="dossier"] .graph-svg .g-node { cursor: pointer; transition: opacity 160ms ease; }
body[data-theme="dossier"] .graph-svg .g-node.off { opacity: 0.20; }
body[data-theme="dossier"] .graph-svg .g-node .bg {
  fill: var(--seg-bg); stroke: var(--seg-rule2); stroke-width: 0.5;
}
/* Blocker status emphasis: classified-style red double border + tinted fill */
body[data-theme="dossier"] .graph-svg .g-node.s-blocker .bg {
  fill: rgba(168,41,31,0.05);
  stroke: var(--seg-blocker);
  stroke-width: 1.25;
  stroke-dasharray: 5 2;
}
/* P1 emphasis */
body[data-theme="dossier"] .graph-svg .g-node.p-1 .bg { stroke-width: 1; }
/* "Currently blocking other work" emphasis: solid accent border + bold deps tag */
body[data-theme="dossier"] .graph-svg .g-node.is-blocking .bg {
  stroke: var(--seg-text); stroke-width: 1.25; stroke-dasharray: none;
}
/* Selection outline overrides */
body[data-theme="dossier"] .graph-svg .g-node.sel .bg {
  fill: var(--seg-surface); stroke: var(--seg-text); stroke-width: 1.75; stroke-dasharray: none;
}
body[data-theme="dossier"] .graph-svg .g-node.s-todo        .bar { stroke: var(--seg-todo);    stroke-width: 1; }
body[data-theme="dossier"] .graph-svg .g-node.s-in_progress .bar { stroke: var(--seg-inprog);  stroke-width: 1; }
body[data-theme="dossier"] .graph-svg .g-node.s-blocker     .bar { stroke: var(--seg-blocker); stroke-width: 1.5; }
body[data-theme="dossier"] .graph-svg .g-node.s-done        .bar { stroke: var(--seg-done);    stroke-width: 1; }
body[data-theme="dossier"] .graph-svg .g-node.s-closed      .bar { stroke: var(--seg-closed);  stroke-width: 1; }
body[data-theme="dossier"] .graph-svg .g-node .ring {
  fill: none; stroke: var(--seg-accent); stroke-width: 0.75; stroke-dasharray: 2 3;
}
body[data-theme="dossier"] .graph-svg .g-meta {
  fill: var(--seg-muted);
  font: 8.5px/1 var(--seg-font);
  letter-spacing: 1px;
}
body[data-theme="dossier"] .graph-svg .g-meta .g-pri {
  font-family: var(--seg-font-serif);
  font-style: italic;
  font-weight: 600;
  letter-spacing: 0;
}
body[data-theme="dossier"] .graph-svg .g-meta .g-pri.p-1 { fill: var(--seg-blocker); font-size: 10px; }
body[data-theme="dossier"] .graph-svg .g-meta .g-pri.p-2 { fill: var(--seg-text); }
body[data-theme="dossier"] .graph-svg .g-meta .g-pri.p-3 { fill: var(--seg-muted); opacity: 0.7; }
body[data-theme="dossier"] .graph-svg .g-meta .g-deps {
  fill: var(--seg-text);
  font-weight: 700;
  letter-spacing: 1.2px;
}
body[data-theme="dossier"] .graph-svg .g-title {
  font: italic 13px/1.25 var(--seg-font-serif);
  color: var(--seg-text);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
body[data-theme="dossier"] .graph-svg .g-node.s-closed .g-title { color: var(--seg-faint); }

/* dossier animations */
@keyframes segBlinkC { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes segInkFadeC { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
@keyframes segPulseC {
  0%   { background: rgba(168,41,31,0.12); box-shadow: 0 0 0 0 rgba(168,41,31,0.3); }
  100% { background: transparent;          box-shadow: 0 0 0 12px rgba(168,41,31,0); }
}
@keyframes segEnterC {
  0%   { opacity: 0; transform: translateY(-8px); background: rgba(168,41,31,0.08); }
  100% { opacity: 1; transform: none; background: transparent; }
}
body[data-theme="dossier"] .seg-pulse { animation: segPulseC 1.4s ease-out; }
body[data-theme="dossier"] .seg-enter { animation: segEnterC 560ms cubic-bezier(.2,.7,.2,1); }
.seg-blink-c { animation: segBlinkC 1.4s ease-in-out infinite; }

/* a11y focus */
body[data-theme="dossier"] button:focus-visible,
body[data-theme="dossier"] input:focus-visible,
body[data-theme="dossier"] textarea:focus-visible,
body[data-theme="dossier"] select:focus-visible,
body[data-theme="dossier"] .row:focus-visible,
body[data-theme="dossier"] .project-item:focus-visible,
body[data-theme="dossier"] .side-item:focus-visible {
  outline: 2px solid var(--seg-accent);
  outline-offset: 2px;
}

/* responsive */
@media (max-width: 1100px) {
  body[data-theme="dossier"] .sidebar { width: 210px; padding: 16px; }
  body[data-theme="dossier"] .detail { width: 380px; }
  body[data-theme="dossier"] .search { min-width: 200px; }

<body data-theme="obsidian" data-mode="dark">
<div id="app"></div>
<script>
"use strict";

// ===================================================================
// Registry of themes. Each theme registers via Themes.register(name, spec).
// Obsidian is implemented; Console + Dossier will be added by future tasks.
// ===================================================================
const Themes = {
  registry: {},
  register(name, spec) { this.registry[name] = spec; },
  get(name) { return this.registry[name] || this.registry.obsidian; },
  list() { return Object.keys(this.registry); },
};

// ===================================================================
// Persistent state
// ===================================================================
const Store = {
  projects: [],
  tasks: [],
  activeProjectId: loadPref('project', null),
  scope: loadPref('ui.scope', 'project'),  // 'project' | 'all' (persisted)
  selectedId: null,
  view: loadPref('ui.view', 'list'),       // list | kanban | graph (persisted)
  search: '',
  filter: loadPref('ui.filter', null),     // null | 'ready' (persisted)
  composerOpen: false,
  composerTitle: '',             // staged new-task title (survives re-render)
  composerBody: '',
  composerBlocker: '',
  composerProjectId: null,       // target project when creating from 'all' scope
  editingBody: null,             // null | string when editing body in detail panel
  editingTitle: null,
  newProjectOpen: false,
  wsConnected: false,
  theme: loadPref('theme', 'obsidian'),
  mode: loadPref('mode', 'dark'),
  version: '',                   // populated from /internal/config
  pulse: {},                     // id -> timestamp for pulse animation
  entering: {},                  // id -> timestamp for enter animation
  agentLog: [],                  // rolling log of WS events for console theme tail
  _graphContentW: 0,             // measured .content width; drives graph wrapping
  combo: null,                   // null | { scope, query, cursor, showFinished }
  dragging: null,                // id of task currently being dragged in Kanban
  dragOverCol: null,             // kanban column (status) the pointer is over
  paletteOpen: false,
  paletteQuery: '',
  paletteCursor: 0,
  _paletteItems: [],             // cached at render; click handler looks up by index
};

function pushAgentLog(msg) {
  Store.agentLog.unshift({ t: Date.now(), msg: msg });
  if (Store.agentLog.length > 40) Store.agentLog.length = 40;
}

function loadPref(key, fallback) {
  try { return localStorage.getItem('segments.' + key) || fallback; }
  catch (e) { return fallback; }
}
function savePref(key, value) {
  try {
    if (value == null) localStorage.removeItem('segments.' + key);
    else localStorage.setItem('segments.' + key, value);
  } catch (e) {}
}

// ===================================================================
// Utility functions
// ===================================================================
const Util = {
  relTime(iso, now) {
    now = now || Date.now();
    const t = new Date(iso).getTime();
    if (!t || isNaN(t)) return '';
    const diff = Math.max(0, (now - t) / 1000);
    if (diff < 45) return 'just now';
    if (diff < 90) return '1m ago';
    if (diff < 3600) return Math.round(diff / 60) + 'm ago';
    if (diff < 5400) return '1h ago';
    if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
    if (diff < 86400 * 2) return 'yesterday';
    if (diff < 86400 * 14) return Math.round(diff / 86400) + 'd ago';
    return Math.round(diff / 86400 / 7) + 'w ago';
  },
  firstLine(body) {
    if (!body) return '';
    return (body.split('\n').find(l => l.trim()) || '').trim();
  },
  fuzzy(q, tasks) {
    if (!q) return tasks;
    const n = q.toLowerCase();
    return tasks.filter(t =>
      (t.id || '').toLowerCase().includes(n) ||
      (t.title || '').toLowerCase().includes(n) ||
      (t.body || '').toLowerCase().includes(n)
    );
  },
  counts(tasks) {
    const c = { total: tasks.length, todo: 0, in_progress: 0, blocker: 0, done: 0, closed: 0 };
    tasks.forEach(t => { if (c[t.status] !== undefined) c[t.status]++; });
    return c;
  },
  ready(tasks) {
    const byId = Object.fromEntries(tasks.map(t => [t.id, t]));
    return tasks.filter(t =>
      t.status === 'todo' && (!t.blocked_by || (byId[t.blocked_by] && byId[t.blocked_by].status === 'done'))
    );
  },
  readyTree(tasks) {
    return tasks.filter(t =>
      t.status === 'todo' || t.status === 'in_progress' || t.status === 'blocker'
    );
  },
  esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  },
  shortId(id, n) {
    if (!id) return '';
    n = n || 8;
    return id.length > n ? id.slice(0, n) : id;
  },
  fuzzyOrdered(needle, haystack) {
    // all chars of needle appear in order somewhere in haystack
    if (!needle) return true;
    let i = 0;
    for (let j = 0; j < haystack.length && i < needle.length; j++) {
      if (haystack[j] === needle[i]) i++;
    }
    return i === needle.length;
  },
};

// ===================================================================
// Blocker combobox helpers
// ===================================================================
function filterBlockerCandidates(q, excludeId, showFinished) {
  const statusRank = { in_progress: 0, blocker: 1, todo: 2, done: 3, closed: 4 };
  const candidates = Store.tasks.filter(t => {
    if (excludeId && t.id === excludeId) return false;
    if (!showFinished && (t.status === 'done' || t.status === 'closed')) return false;
    return true;
  });
  if (!q) {
    return candidates.slice().sort((a, b) => {
      const sa = statusRank[a.status] == null ? 9 : statusRank[a.status];
      const sb = statusRank[b.status] == null ? 9 : statusRank[b.status];
      if (sa !== sb) return sa - sb;
      const pa = (a.priority || 9), pb = (b.priority || 9);
      if (pa !== pb) return pa - pb;
      return (a.title || '').localeCompare(b.title || '');
    });
  }
  const n = q.toLowerCase().trim();
  const scored = [];
  for (const t of candidates) {
    const title = (t.title || '').toLowerCase();
    const id = (t.id || '').toLowerCase();
    let score = 0;
    if (title.startsWith(n)) score = 1000;
    else if (title.includes(n)) score = 500;
    else if (Util.fuzzyOrdered(n, title)) score = 100;
    else if (id.startsWith(n)) score = 50;
    if (score > 0) scored.push({ t, score });
  }
  scored.sort((a, b) =>
    b.score - a.score ||
    (a.t.title || '').length - (b.t.title || '').length ||
    (a.t.title || '').localeCompare(b.t.title || '')
  );
  return scored.map(x => x.t);
}

function renderBlockerCombo(scope, currentId, excludeId) {
  const byId = tasksById();
  const current = currentId ? byId[currentId] : null;
  const open = !!(Store.combo && Store.combo.scope === scope);
  const triggerLabel = current
    ? (Util.shortId(current.id, 8) + ' \u2014 ' + current.title)
    : '\u2014 none \u2014';
  const triggerTitle = current ? current.title : 'No blocker';
  const triggerCls = 'blocker-combo-label' + (current ? '' : ' is-placeholder');
  const trigger =
    '<button type="button" class="blocker-combo-trigger" data-act="blocker-combo-open"' +
      ' data-scope="' + scope + '" aria-haspopup="listbox" aria-expanded="' + (open ? 'true' : 'false') + '"' +
      ' title="' + Util.esc(triggerTitle) + '">' +
      '<span class="' + triggerCls + '">' + Util.esc(triggerLabel) + '</span>' +
      '<span class="blocker-combo-chev" aria-hidden="true">\u25BE</span>' +
    '</button>';

  if (!open) {
    return '<div class="blocker-combo" data-scope="' + scope + '" data-exclude="' +
      Util.esc(excludeId || '') + '">' + trigger + '</div>';
  }

  const query = Store.combo.query || '';
  const showFinished = !!Store.combo.showFinished;
  const items = filterBlockerCandidates(query, excludeId, showFinished);
  const maxIdx = items.length; // includes the 'none' entry at index 0
  let cursor = Store.combo.cursor | 0;
  if (cursor < 0) cursor = 0;
  if (cursor > maxIdx) cursor = maxIdx;

  const noneSel = cursor === 0 ? ' selected' : '';
  const noneOpt =
    '<div class="blocker-combo-opt none' + noneSel + '" role="option"' +
      ' data-act="blocker-combo-pick" data-scope="' + scope + '"' +
      ' data-id="" data-idx="0">\u2014 none \u2014</div>';

  const list = items.length === 0
    ? '<div class="blocker-combo-empty">no matches' + (!showFinished ? ' (try \u201Cshow finished\u201D)' : '') + '</div>'
    : items.map((t, i) => {
        const idx = i + 1;
        const sel = idx === cursor ? ' selected' : '';
        const pri = (t.priority != null && t.priority !== 0) ? 'P' + t.priority : '';
        return '<div class="blocker-combo-opt' + sel + '" role="option"' +
          ' data-act="blocker-combo-pick" data-scope="' + scope + '"' +
          ' data-id="' + Util.esc(t.id) + '" data-idx="' + idx + '"' +
          ' title="' + Util.esc(t.title) + '">' +
          '<span class="blocker-combo-opt-status s-' + t.status + '" aria-hidden="true"></span>' +
          '<span class="blocker-combo-opt-id">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
          '<span class="blocker-combo-opt-title">' + Util.esc(t.title) + '</span>' +
          '<span class="blocker-combo-opt-pri">' + pri + '</span>' +
        '</div>';
      }).join('');

  return '<div class="blocker-combo open" data-scope="' + scope + '" data-exclude="' +
    Util.esc(excludeId || '') + '">' +
    trigger +
    '<div class="blocker-combo-pop" role="dialog" aria-label="Select blocker">' +
      '<input class="blocker-combo-input" type="text" placeholder="Search tasks\u2026"' +
        ' value="' + Util.esc(query) + '"' +
        ' data-act="blocker-combo-input" data-scope="' + scope + '"' +
        ' autocomplete="off" spellcheck="false">' +
      '<label class="blocker-combo-toggle">' +
        '<input type="checkbox" class="blocker-combo-toggle-input"' +
          (showFinished ? ' checked' : '') +
          ' data-act="blocker-combo-toggle-finished" data-scope="' + scope + '">' +
        '<span class="blocker-combo-toggle-box" aria-hidden="true"></span>' +
        '<span>show finished</span>' +
        '<span class="blocker-combo-count">' + items.length + ' / ' +
          Store.tasks.filter(t => !excludeId || t.id !== excludeId).length + '</span>' +
      '</label>' +
      '<div class="blocker-combo-list" role="listbox">' + noneOpt + list + '</div>' +
    '</div>' +
  '</div>';
}

// ===================================================================
// WebSocket
// ===================================================================
let ws = null, reconnectDelay = 1000, reconnectTimer = null;

function wsConnect() {
  if (ws) { try { ws.close(); } catch (e) {} }
  ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => {
    Store.wsConnected = true;
    reconnectDelay = 1000;
    wsSend({ type: 'connected' });
    render();
  };
  ws.onclose = () => {
    Store.wsConnected = false;
    render();
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(wsConnect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch (err) { return; }
    handleWSMessage(msg);
  };
}
function wsSend(msg) { try { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); } catch (e) {} }

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'connected':
      pushAgentLog('ws connected');
      loadProjects();
      break;
    case 'task:created':
    case 'task:updated':
      if (msg.data && taskInScope(msg.data)) {
        const now = Date.now();
        const isNew = !Store.tasks.some(t => t.id === msg.data.id);
        upsertTaskLocal(msg.data);
        if (msg.type === 'task:created' || isNew) Store.entering[msg.data.id] = now;
        else Store.pulse[msg.data.id] = now;
        if (msg.type === 'task:created' || isNew) {
          pushAgentLog('created ' + Util.shortId(msg.data.id, 8) + ' ' + (msg.data.title || '').slice(0, 40));
        } else {
          pushAgentLog('updated ' + Util.shortId(msg.data.id, 8) + ' ' + (msg.data.status || ''));
        }
        scheduleSortAndRender();
        if (msg.type === 'task:created') setTimeout(() => { delete Store.entering[msg.data.id]; scheduleRender(); }, 900);
        setTimeout(() => { delete Store.pulse[msg.data.id]; }, 2000);
      } else if (!msg.data) {
        loadTasks();
      }
      break;
    case 'tasks:created':
      if (Array.isArray(msg.data)) {
        let changed = false;
        const now = Date.now();
        for (const t of msg.data) {
          if (t && taskInScope(t)) {
            upsertTaskLocal(t);
            Store.entering[t.id] = now;
            pushAgentLog('created ' + Util.shortId(t.id, 8) + ' ' + (t.title || '').slice(0, 40));
            setTimeout(((id) => () => { delete Store.entering[id]; scheduleRender(); })(t.id), 900);
            changed = true;
          }
        }
        if (changed) scheduleSortAndRender();
      }
      break;
    case 'task:deleted':
      if (msg.data && msg.data.id) {
        const before = Store.tasks.length;
        Store.tasks = Store.tasks.filter(t => t.id !== msg.data.id);
        if (Store.selectedId === msg.data.id) Store.selectedId = null;
        if (Store.tasks.length !== before) {
          pushAgentLog('deleted ' + Util.shortId(msg.data.id, 8));
          scheduleRender();
        }
      } else {
        loadTasks();
      }
      break;
    case 'project:created':
    case 'project:updated':
    case 'project:deleted':
      pushAgentLog(msg.type + (msg.data && msg.data.name ? ' ' + msg.data.name : ''));
      loadProjects();
      break;
  }
}

function taskInScope(task) {
  if (!task) return false;
  if (Store.scope === 'all') return true;
  return task.project_id === Store.activeProjectId;
}

function hasActiveScope() {
  return Store.scope === 'all' || !!Store.activeProjectId;
}

function projectChipHTML(task) {
  if (Store.scope !== 'all') return '';
  const proj = Store.projects.find(p => p.id === task.project_id);
  if (!proj) return '';
  return '<span class="row-proj" title="' + Util.esc(proj.name) + '">' + Util.esc(proj.name) + '</span>';
}

function upsertTaskLocal(task) {
  const i = Store.tasks.findIndex(t => t.id === task.id);
  if (i >= 0) Store.tasks[i] = task; else Store.tasks.push(task);
}

function sortAndRender() {
  Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
  render();
}

// rAF-coalesced render path for WS-driven updates. Under burst load (e.g.
// stress.exe firing many task:created/updated messages per second) each
// message would otherwise trigger a full app.innerHTML rebuild; batching
// them into at most one rebuild per animation frame keeps the UI responsive.
// User-driven events (click, keypress) still call render() synchronously so
// input stays snappy.
//
// The setTimeout fallback covers the case where the tab is hidden or
// backgrounded: browsers pause rAF in that state, so without a timer the
// pending render would not land until the tab regained focus (visible as
// "stale tasks linger after stress cleanup until I refresh"). First scheduler
// to fire wins; the other path short-circuits on the _renderPending guard.
let _renderPending = false;
let _sortPending = false;
function _flushScheduledRender() {
  if (!_renderPending) return;
  _renderPending = false;
  if (_sortPending) {
    _sortPending = false;
    Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
  }
  render();
}
function scheduleRender() {
  if (_renderPending) return;
  _renderPending = true;
  requestAnimationFrame(_flushScheduledRender);
  setTimeout(_flushScheduledRender, 50);
}
function scheduleSortAndRender() {
  _sortPending = true;
  scheduleRender();
}

// ===================================================================
// Data loaders
// ===================================================================
async function loadProjects() {
  try {
    Store.projects = await API.listProjects();
    if (!Store.projects.some(p => p.id === Store.activeProjectId)) {
      Store.activeProjectId = Store.projects.length ? Store.projects[0].id : null;
      savePref('project', Store.activeProjectId);
    }
    render();
    if (Store.scope === 'all' || Store.activeProjectId) await loadTasks();
  } catch (e) { console.error('loadProjects', e); }
}

async function loadTasks() {
  if (Store.scope === 'all') {
    try {
      Store.tasks = await API.listAllTasks();
      Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
      render();
    } catch (e) { console.error('loadTasks', e); }
    return;
  }
  if (!Store.activeProjectId) { Store.tasks = []; render(); return; }
  try {
    Store.tasks = await API.listTasks(Store.activeProjectId);
    Store.tasks.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
    render();
  } catch (e) { console.error('loadTasks', e); }
}

// ===================================================================
// Actions (event handlers)
// ===================================================================
const Actions = {
  selectTask(id) { Store.selectedId = id; Store.combo = null; render(); },
  clearSelection() { Store.selectedId = null; Store.combo = null; render(); },
  setView(v) {
    Store.view = v;
    savePref('ui.view', v);
    Store.combo = null;
    render();
  },
  setSearch(v) { Store.search = v; render({ preserveFocus: '.search input' }); },
  toggleReadyFilter() {
    Store.filter = Store.filter === 'ready' ? null : 'ready';
    savePref('ui.filter', Store.filter);
    Store.selectedId = null;
    Store.combo = null;
    render();
  },
  openBlockerCombo(scope) {
    const already = Store.combo && Store.combo.scope === scope;
    if (already) { Store.combo = null; render(); return; }
    // Figure out the current selection so we can pre-highlight it.
    let currentId = null;
    let excludeId = null;
    if (scope === 'detail') {
      const t = Store.selectedId && Store.tasks.find(x => x.id === Store.selectedId);
      currentId = t && t.blocked_by ? t.blocked_by : null;
      excludeId = Store.selectedId;
    } else if (scope === 'composer') {
      currentId = Store.composerBlocker || null;
    }
    // If the current blocker is finished, auto-show-finished so it's visible.
    let showFinished = false;
    if (currentId) {
      const cur = Store.tasks.find(x => x.id === currentId);
      if (cur && (cur.status === 'done' || cur.status === 'closed')) showFinished = true;
    }
    const items = filterBlockerCandidates('', excludeId, showFinished);
    let cursor = 0; // 0 = "none"
    if (currentId) {
      const idx = items.findIndex(t => t.id === currentId);
      if (idx >= 0) cursor = idx + 1;
    }
    Store.combo = { scope, query: '', cursor, showFinished };
    render({ focus: '.blocker-combo.open[data-scope="' + scope + '"] .blocker-combo-input' });
  },
  closeBlockerCombo() {
    if (!Store.combo) return;
    Store.combo = null;
    render();
  },
  setBlockerComboQuery(q) {
    if (!Store.combo) return;
    Store.combo.query = q;
    Store.combo.cursor = 0;
    const scope = Store.combo.scope;
    render({ preserveFocus: '.blocker-combo.open[data-scope="' + scope + '"] .blocker-combo-input' });
  },
  toggleBlockerComboShowFinished() {
    if (!Store.combo) return;
    Store.combo.showFinished = !Store.combo.showFinished;
    Store.combo.cursor = 0;
    const scope = Store.combo.scope;
    render({ focus: '.blocker-combo.open[data-scope="' + scope + '"] .blocker-combo-input' });
  },
  moveBlockerComboCursor(dir) {
    if (!Store.combo) return;
    const scope = Store.combo.scope;
    let excludeId = null;
    if (scope === 'detail') excludeId = Store.selectedId;
    const items = filterBlockerCandidates(Store.combo.query || '', excludeId, !!Store.combo.showFinished);
    const max = items.length; // 0 = "none" row, then items
    let c = (Store.combo.cursor | 0) + dir;
    if (c < 0) c = 0;
    if (c > max) c = max;
    Store.combo.cursor = c;
    render({ preserveFocus: '.blocker-combo.open[data-scope="' + scope + '"] .blocker-combo-input' });
  },
  async commitBlockerComboAtCursor() {
    if (!Store.combo) return;
    const scope = Store.combo.scope;
    let excludeId = null;
    if (scope === 'detail') excludeId = Store.selectedId;
    const items = filterBlockerCandidates(Store.combo.query || '', excludeId, !!Store.combo.showFinished);
    const cursor = Store.combo.cursor | 0;
    let id = '';
    if (cursor === 0) id = ''; // none
    else {
      const item = items[cursor - 1];
      if (item) id = item.id;
    }
    await this.pickBlocker(scope, id);
  },
  async pickBlocker(scope, id) {
    Store.combo = null;
    if (scope === 'composer') {
      Store.composerBlocker = id || '';
      render();
      return;
    }
    if (scope === 'detail') {
      const sel = Store.selectedId;
      render();
      if (sel) await Actions.saveTaskEdit(sel, { blocked_by: id || '' });
      return;
    }
  },
  openComposer() {
    Store.composerOpen = true;
    Store.composerTitle = '';
    Store.composerBody = '';
    Store.composerBlocker = '';
    Store.composerProjectId = Store.activeProjectId
      || (Store.projects.length ? Store.projects[0].id : null);
    app.dataset.composerPri = '2';
    render({ focus: '.composer-title' });
  },
  closeComposer() {
    Store.composerOpen = false;
    Store.composerTitle = '';
    Store.composerBody = '';
    Store.composerBlocker = '';
    Store.composerProjectId = null;
    render();
  },
  setComposerProject(id) {
    Store.composerProjectId = id;
  },
  openPalette() {
    Store.paletteOpen = true;
    Store.paletteQuery = '';
    Store.paletteCursor = 0;
    render({ focus: '.palette-input' });
  },
  closePalette() {
    Store.paletteOpen = false;
    Store.paletteQuery = '';
    Store.paletteCursor = 0;
    render();
  },
  togglePalette() {
    if (Store.paletteOpen) this.closePalette(); else this.openPalette();
  },
  setPaletteQuery(q) {
    Store.paletteQuery = q;
    Store.paletteCursor = 0;
    render({ preserveFocus: '.palette-input' });
  },
  movePaletteCursor(dir) {
    const max = Math.max(0, (Store._paletteItems || []).length - 1);
    let c = (Store.paletteCursor | 0) + dir;
    if (c < 0) c = 0;
    if (c > max) c = max;
    Store.paletteCursor = c;
    render({ preserveFocus: '.palette-input' });
  },
  runPaletteItem(index) {
    const items = Store._paletteItems || [];
    const item = items[index | 0];
    Store.paletteOpen = false;
    Store.paletteQuery = '';
    Store.paletteCursor = 0;
    if (!item) { render(); return; }
    Promise.resolve().then(item.run).catch(err => console.error('palette', err));
  },
  cycleSelectedStatus() {
    if (!Store.selectedId) return;
    const order = ['todo', 'in_progress', 'blocker', 'done', 'closed'];
    const t = Store.tasks.find(x => x.id === Store.selectedId);
    if (!t) return;
    const i = order.indexOf(t.status);
    const next = order[(i + 1) % order.length];
    return this.saveTaskEdit(Store.selectedId, { status: next });
  },
  setTheme(name) {
    if (!Themes.registry[name]) return;
    Store.theme = name; savePref('theme', name); applyTheme(); render();
  },
  toggleMode() {
    Store.mode = Store.mode === 'dark' ? 'light' : 'dark';
    savePref('mode', Store.mode); render();
  },
  switchProject(id) {
    Store.activeProjectId = id; savePref('project', id);
    Store.scope = 'project'; savePref('ui.scope', 'project');
    Store.selectedId = null; Store.tasks = [];
    render(); loadTasks();
  },
  setScopeAll() {
    Store.scope = 'all'; savePref('ui.scope', 'all');
    Store.selectedId = null; Store.tasks = [];
    render(); loadTasks();
  },
  openNewProject() { Store.newProjectOpen = true; render({ focus: '.dialog input' }); },
  closeNewProject() { Store.newProjectOpen = false; render(); },
  async createProject(name) {
    if (!name || !name.trim()) return;
    try {
      const p = await API.createProject(name.trim());
      Store.activeProjectId = p.id;
      Store.newProjectOpen = false;
      await loadProjects();
    } catch (e) { console.error('createProject', e); }
  },
  async createTaskFromComposer(title, body, priority, blockedBy) {
    if (!title || !title.trim()) return;
    const targetProject = Store.scope === 'all'
      ? (Store.composerProjectId || (Store.projects[0] && Store.projects[0].id))
      : Store.activeProjectId;
    if (!targetProject) return;
    try {
      const created = await API.createTask(targetProject, {
        title: title.trim(), body: (body || '').trim(), priority: priority | 0,
      });
      // Create endpoint doesn't accept blocked_by; chain a PUT if needed.
      if (blockedBy && created && created.id) {
        await API.updateTask(created.id, {
          project_id: targetProject,
          title: created.title,
          body: created.body || '',
          status: created.status,
          priority: created.priority,
          blocked_by: blockedBy,
        });
      }
      Store.composerOpen = false;
      Store.composerBlocker = '';
      Store.composerProjectId = null;
      render();
    } catch (e) { console.error('createTask', e); }
  },
  async saveTaskEdit(id, patch) {
    const t = Store.tasks.find(x => x.id === id); if (!t) return;
    try {
      const payload = {
        project_id: t.project_id,
        title: patch.title !== undefined ? patch.title : t.title,
        body: patch.body !== undefined ? patch.body : t.body,
        status: patch.status !== undefined ? patch.status : t.status,
        priority: patch.priority !== undefined ? patch.priority : t.priority,
        blocked_by: patch.blocked_by !== undefined ? patch.blocked_by : (t.blocked_by || ''),
      };
      await API.updateTask(id, payload);
      Store.editingBody = null; Store.editingTitle = null;
    } catch (e) { console.error('saveTaskEdit', e); }
  },
  async deleteTaskById(id) {
    const t = Store.tasks.find(x => x.id === id); if (!t) return;
    if (!confirm('Delete task "' + t.title + '"?')) return;
    try {
      await API.deleteTask(id, t.project_id);
      if (Store.selectedId === id) Store.selectedId = null;
    } catch (e) { console.error('deleteTask', e); }
  },
  navigate(dir) {
    const filtered = filteredTasks();
    if (!filtered.length) return;
    const i = filtered.findIndex(t => t.id === Store.selectedId);
    const next = dir > 0 ? Math.min(filtered.length - 1, (i < 0 ? 0 : i + 1))
                         : Math.max(0, (i < 0 ? 0 : i - 1));
    Store.selectedId = filtered[next].id; render({ scrollTo: '.row.selected, .g-node.sel' });
  },
};

// Derived selectors
// ===================================================================
function filteredTasks() {
  let out = Store.tasks.slice();
  if (Store.filter === 'ready') {
    out = Store.view === 'graph' ? Util.readyTree(out) : Util.ready(out);
  }
  if (Store.search) out = Util.fuzzy(Store.search, out);
  return out;
}

function tasksById() {
  return Object.fromEntries(Store.tasks.map(t => [t.id, t]));
}

// ===================================================================
// Command palette: build the item list from current state.
// ===================================================================
function paletteItems() {
  const q = (Store.paletteQuery || '').trim().toLowerCase();
  const items = [];

  ['list', 'kanban', 'graph'].forEach(v => {
    if (v === Store.view) return;
    const labels = { list: 'List', kanban: 'Kanban', graph: 'Graph' };
    items.push({ type: 'view', label: 'Switch to ' + labels[v] + ' view', run: () => Actions.setView(v) });
  });

  items.push({
    type: 'scope',
    label: Store.scope === 'all' ? 'Show single project' : 'Show all projects (all tasks)',
    run: () => Store.scope === 'all' ? Actions.switchProject(Store.activeProjectId) : Actions.setScopeAll(),
  });

  items.push({
    type: 'filter',
    label: Store.filter === 'ready' ? 'Clear ready filter' : 'Show only ready tasks',
    run: () => Actions.toggleReadyFilter(),
  });

  items.push({
    type: 'mode',
    label: 'Toggle ' + (Store.mode === 'dark' ? 'light' : 'dark') + ' mode',
    run: () => Actions.toggleMode(),
  });

  Themes.list().forEach(k => {
    if (k === Store.theme) return;
    const spec = Themes.get(k);
    items.push({ type: 'theme', label: 'Theme: ' + (spec.label || k), run: () => Actions.setTheme(k) });
  });

  const sel = Store.selectedId ? Store.tasks.find(t => t.id === Store.selectedId) : null;
  if (sel) {
    const short = sel.id.slice(0, 8);
    if (sel.status !== 'done') {
      items.push({ type: 'task', label: 'Mark selected done', sub: short + '  ' + sel.title, run: () => Actions.saveTaskEdit(sel.id, { status: 'done' }) });
    }
    if (sel.status !== 'in_progress') {
      items.push({ type: 'task', label: 'Mark selected in progress', sub: short + '  ' + sel.title, run: () => Actions.saveTaskEdit(sel.id, { status: 'in_progress' }) });
    }
    items.push({ type: 'task', label: 'Delete selected task', sub: short + '  ' + sel.title, run: () => Actions.deleteTaskById(sel.id) });
  }

  items.push({ type: 'new', label: 'New task (composer)', run: () => Actions.openComposer() });

  for (const t of Store.tasks) {
    items.push({
      type: 'jump',
      label: t.title || '(untitled)',
      sub: t.id.slice(0, 8),
      run: () => Actions.selectTask(t.id),
    });
  }

  if (!q) return items.slice(0, 50);
  return items
    .filter(it => it.label.toLowerCase().includes(q) || (it.sub || '').toLowerCase().includes(q))
    .slice(0, 50);
}

function paletteOverlay() {
  if (!Store.paletteOpen) return '';
  const items = paletteItems();
  Store._paletteItems = items;
  const cursor = Math.min(Store.paletteCursor | 0, Math.max(0, items.length - 1));
  Store.paletteCursor = cursor;
  const rows = items.length
    ? items.map((it, i) =>
        '<div class="palette-item' + (i === cursor ? ' active' : '') + '"' +
          ' data-act="palette-item" data-idx="' + i + '" role="option"' +
          ' aria-selected="' + (i === cursor ? 'true' : 'false') + '">' +
          '<span class="palette-item-type">' + Util.esc(it.type) + '</span>' +
          '<span class="palette-item-label">' + Util.esc(it.label) + '</span>' +
          (it.sub ? '<span class="palette-item-sub">' + Util.esc(it.sub) + '</span>' : '') +
        '</div>').join('')
    : '<div class="palette-empty">No matches.</div>';
  return '<div class="palette-backdrop" data-act="palette-backdrop" role="dialog" aria-modal="true" aria-label="Command palette">' +
    '<div class="palette" role="listbox">' +

        '<span>' + items.length + (items.length === 1 ? ' match' : ' matches') + '</span>' +

function groupedByStatus(tasks) {
  const order = ['in_progress', 'blocker', 'todo', 'done', 'closed'];
  const buckets = {};
  order.forEach(s => buckets[s] = []);
  tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });
  return order.filter(s => buckets[s].length).map(s => ({ key: s, items: buckets[s] }));
}

// Kanban uses a fixed left-to-right flow: intake -> active work -> stuck -> settled.
// Closed tasks are terminal and not shown on the board; flip back to List to edit them.
const KANBAN_COLS = ['todo', 'in_progress', 'blocker', 'done'];
function groupedForKanban(tasks) {
  const buckets = {};
  KANBAN_COLS.forEach(s => buckets[s] = []);
  tasks.forEach(t => { if (buckets[t.status]) buckets[t.status].push(t); });
  return buckets;
}

// ===================================================================
// Shared dependency-graph layout. Rank = longest path from a root; roots
// have rank 0. Within a rank, nodes flow left to right and wrap to a new
// visual row when they exceed containerW so the DAG fits without forcing
// huge horizontal scroll on small screens. Wide screens with few nodes
// per rank get a single row and use the extra space naturally.
// Returns { pos: {id: {x,y,r,sub}}, W, H, width, height, ranks }.
// ===================================================================
const Graph = {
  layout(tasks, byId, opts) {
    const W = opts.W, H = opts.H;
    const gapX = opts.gapX, gapY = opts.gapY;
    const padX = opts.padX != null ? opts.padX : 40;
    const padY = opts.padY != null ? opts.padY : 40;
    const rankGap = opts.rankGap != null ? opts.rankGap : 0;
    const containerW = opts.containerW > 0 ? opts.containerW : Infinity;

    const inScope = new Set(tasks.map(t => t.id));
    const rank = {};
    const visit = (id, seen) => {
      if (rank[id] !== undefined) return rank[id];
      if (seen.has(id)) return 0;
      seen.add(id);
      const t = byId[id];
      const blk = t && t.blocked_by && inScope.has(t.blocked_by) ? t.blocked_by : null;
      const r = blk ? 1 + visit(blk, seen) : 0;
      rank[id] = r;
      return r;
    };
    tasks.forEach(t => visit(t.id, new Set()));

    const rows = {};
    tasks.forEach(t => {
      const r = rank[t.id] || 0;
      (rows[r] = rows[r] || []).push(t);
    });

    const usable = containerW - 2 * padX + gapX;
    const maxCols = Math.max(1, Math.floor(usable / (W + gapX)));

    const keys = Object.keys(rows).map(Number).sort((a, b) => a - b);
    const pos = {};
    let yCursor = padY;
    keys.forEach(r => {
      rows[r].sort((a, b) => (a.priority - b.priority) || a.id.localeCompare(b.id));
      const cols = Math.min(maxCols, rows[r].length);
      rows[r].forEach((t, i) => {
        const col = i % cols;
        const sub = Math.floor(i / cols);
        pos[t.id] = {
          x: padX + col * (W + gapX),
          y: yCursor + sub * (H + gapY),
          r: r,
          sub: sub,
        };
      });
      const subRows = Math.ceil(rows[r].length / cols);
      yCursor += subRows * (H + gapY) + rankGap;
    });

    const xs = Object.values(pos).map(p => p.x + W);
    const width = (xs.length ? Math.max.apply(null, xs) : padX) + padX;
    const height = (keys.length ? yCursor : padY) + padY - rankGap;
    return { pos: pos, W: W, H: H, width: width, height: height, ranks: keys.length };
  },
  // edges: returns [{child, parent, blocked}] for tasks with blocked_by.
  edges(tasks, byId) {
    const out = [];
    tasks.forEach(t => {
      if (!t.blocked_by) return;
      const parent = byId[t.blocked_by];
      if (!parent) return;
      out.push({ child: t, parent: parent, blocked: parent.status !== 'done' });
    });
    return out;
  },
  // Estimated width of the .content area. Uses the previously-measured
  // value if available (set by render() after DOM insertion), otherwise
  // falls back to viewport math. The render() pass remeasures and
  // re-renders once if the estimate was off.
  containerWidth() {
    if (Store && Store._graphContentW > 0) return Store._graphContentW;
    if (typeof window === 'undefined') return 1024;
    const w = window.innerWidth;
    let avail = w;
    if (w > 720) avail -= (w > 1100 ? 230 : 180);
    // Detail panel now overlays the content (position: absolute), so we no
    // longer subtract its width. The graph keeps the same layout when a task
    // is selected, eliminating the jarring reflow.
    return Math.max(360, avail - 20);
  },
  // blockingMap: returns Map<id, count> where count is the number of in-scope
  // tasks that are still waiting on `id`. A parent is "currently blocking"
  // only when both: (a) the parent itself isn't done/closed (a finished parent
  // no longer holds anyone up) and (b) at least one in-scope dependent is
  // still pending. Done/closed dependents don't count toward the total.
  blockingMap(tasks) {
    const m = new Map();
    const byId = {};
    tasks.forEach(t => { byId[t.id] = t; });
    tasks.forEach(t => {
      if (!t.blocked_by) return;
      const parent = byId[t.blocked_by];
      if (!parent) return;
      if (parent.status === 'done' || parent.status === 'closed') return;
      if (t.status === 'done' || t.status === 'closed') return;
      m.set(parent.id, (m.get(parent.id) || 0) + 1);
    });
    return m;
  },
  // focusSet: returns a Set of task ids in the same connected component
  // as `sel` (upstream blockers via blocked_by chain + downstream dependents,
  // transitively). Returns null when there is no selection or it's out of scope.
  // Each task has at most one blocked_by, so upstream is a single chain;
  // downstream can branch.
  focusSet(sel, tasks, byId) {
    if (!sel || !byId[sel]) return null;
    const inScope = new Set(tasks.map(t => t.id));
    if (!inScope.has(sel)) return null;
    const childrenOf = {};
    tasks.forEach(t => {
      const blk = t.blocked_by;
      if (blk && inScope.has(blk)) {
        (childrenOf[blk] = childrenOf[blk] || []).push(t.id);
      }
    });
    const focus = new Set();
    let cur = sel;
    while (cur && inScope.has(cur) && !focus.has(cur)) {
      focus.add(cur);
      const t = byId[cur];
      cur = t && t.blocked_by;
    }
    const stack = [sel];
    while (stack.length) {
      const id = stack.pop();
      (childrenOf[id] || []).forEach(c => {
        if (!focus.has(c)) { focus.add(c); stack.push(c); }
      });
    }
    return focus;
  },
};

function obsKanbanCard(T, t, byId) {
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const selected = Store.selectedId === t.id;
  const dragging = Store.dragging === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['kanban-card', 's-' + t.status];
  if (selected) classes.push('selected');
  if (dragging) classes.push('dragging');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const bars = [0, 1, 2, 3].map(i => {
    const filled = (4 - t.priority);
    return '<span class="f' + i + ' ' + (i < filled ? 'on' : '') + '"></span>';
  }).join('');

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : '') + '" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? '\u2715 ' : '\u2713 ') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span></span>';

  return '<div class="' + classes.join(' ') + '" draggable="true" data-act="kanban-card" data-id="' + Util.esc(t.id) + '" aria-label="' + Util.esc(t.title) + '">' +
    '<div class="card-top">' +
      '<span class="card-id" title="' + Util.esc(t.id) + '">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
      '<span class="pri-bars p' + t.priority + '" aria-label="Priority P' + t.priority + '">' + bars + '</span>' +
    '</div>' +
    '<div class="card-title">' + Util.esc(t.title) + '</div>' +
    '<div class="card-bottom">' +
      blockerChip +
      '<span class="card-time">' + Util.esc(Util.relTime(t.updated_at)) + '</span>' +
    '</div>' +
  '</div>';
}

function obsGraphView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="graph"><div class="empty">' +
      (hasActiveScope()
        ? 'No tasks' + (Store.search ? ' match \u201C' + Util.esc(Store.search) + '\u201D' : '') + '. Press <kbd>c</kbd> to create.'
        : 'Select or create a project to get started.') +
    '</div></div>';
  }
  const layout = Graph.layout(tasks, byId, {
    W: 168, H: 62, gapX: 22, gapY: 34, padX: 28, padY: 28, rankGap: 14,
    containerW: Graph.containerWidth(),
  });
  const ready = new Set(Util.ready(Store.tasks).map(t => t.id));
  const readyInView = tasks.reduce((n, t) => n + (ready.has(t.id) ? 1 : 0), 0);
  const sel = Store.selectedId;
  const focus = Graph.focusSet(sel, tasks, byId);
  const blockingMap = Graph.blockingMap(tasks);
  const edges = Graph.edges(tasks, byId).map(e => {
    const from = layout.pos[e.parent.id], to = layout.pos[e.child.id];
    if (!from || !to) return '';
    const x1 = from.x + layout.W / 2, y1 = from.y + layout.H;
    const x2 = to.x + layout.W / 2, y2 = to.y;
    const mid = (y1 + y2) / 2;
    const inFocus = !focus || (focus.has(e.parent.id) && focus.has(e.child.id));
    const cls = 'edge ' + (e.blocked ? 'blocked' : 'open') + (inFocus ? '' : ' off');
    const marker = e.blocked ? 'obs-arrow-blocked' : 'obs-arrow';
    return '<path class="' + cls + '" d="M ' + x1 + ' ' + y1 + ' C ' + x1 + ' ' + mid + ' ' + x2 + ' ' + mid + ' ' + x2 + ' ' + y2 + '" marker-end="url(#' + marker + ')"></path>';
  }).join('');
  const nodes = tasks.map(t => {
    const p = layout.pos[t.id]; if (!p) return '';
    const isReady = ready.has(t.id);
    const isSel = sel === t.id;
    const blocks = blockingMap.get(t.id) || 0;
    const cls = ['g-node', 's-' + t.status, 'p-' + t.priority];
    if (isSel) cls.push('sel');
    if (isReady) cls.push('ready');
    if (blocks > 0) cls.push('is-blocking');
    if (focus && !focus.has(t.id)) cls.push('off');
    const priChip = t.priority === 0 ? '' :
      '<text class="g-pri p-' + t.priority + '" x="' + (layout.W - 8) + '" y="14" text-anchor="end">P' + t.priority + '</text>';
    const depsTag = blocks > 0 ? '<tspan class="g-deps">  \u2937' + blocks + '</tspan>' : '';
    return '<g class="' + cls.join(' ') + '" data-act="select" data-id="' + Util.esc(t.id) + '" transform="translate(' + p.x + ',' + p.y + ')">' +
      (isReady ? '<rect class="ring" x="-3" y="-3" width="' + (layout.W + 6) + '" height="' + (layout.H + 6) + '" rx="8"></rect>' : '') +
      '<rect class="bg" width="' + layout.W + '" height="' + layout.H + '" rx="6"></rect>' +
      '<rect class="bar" width="3" height="' + layout.H + '" rx="1.5"></rect>' +
      (blocks > 0 ? '<rect class="bar2" x="3" width="2" height="' + layout.H + '"></rect>' : '') +
      '<text class="g-meta" x="14" y="20">' + Util.esc(Util.shortId(t.id, 8)) + depsTag + '</text>' +
      priChip +
      '<foreignObject x="14" y="24" width="' + (layout.W - 36) + '" height="' + (layout.H - 28) + '">' +
        '<div xmlns="http://www.w3.org/1999/xhtml" class="g-title">' + Util.esc(t.title) + '</div>' +
      '</foreignObject>' +
    '</g>';
  }).join('');
  const inTree = Store.filter === 'ready';
  return '<div class="graph' + (sel ? ' has-detail' : '') + '" data-act="deselect">' +
    '<div class="graph-head">' +
      '<span>Dependency DAG \u00B7 top-down</span>' +
      '<span class="dot">\u00B7</span>' +
      '<span><span class="ready-dot">\u25CF</span> ready (no unresolved blockers)</span>' +
      '<span class="dot">\u00B7</span>' +
      '<span>' + readyInView + ' ready / ' + tasks.length + (inTree ? ' in flight' : ' total') + '</span>' +
    '</div>' +
    '<svg class="graph-svg" width="' + layout.width + '" height="' + layout.height + '">' +
      '<defs>' +
        '<marker id="obs-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow open"></path></marker>' +
        '<marker id="obs-arrow-blocked" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto"><path d="M0,0 L10,5 L0,10 z" class="arrow blocked"></path></marker>' +
      '</defs>' +
      '<rect class="g-bg" data-act="deselect" width="' + layout.width + '" height="' + layout.height + '"></rect>' +
      edges +
      nodes +
    '</svg>' +
  '</div>';
}

function obsListView(T, tasks, byId) {
  if (!tasks.length) {
    return '<div class="list"><div class="empty">' +
      (hasActiveScope() ? 'No tasks' + (Store.search ? ' match “' + Util.esc(Store.search) + '”' : '') + '. Press <kbd>c</kbd> to create.'
        : 'Select or create a project to get started.') +
    '</div></div>';
  }
  const groups = groupedByStatus(tasks);
  const T_META = T.statusMeta;
  return '<div class="list" role="grid" aria-label="Task list">' +
    groups.map(g => {
      const meta = T_META[g.key];
      return '<div class="list-group" role="rowgroup">' +
        '<div class="list-group-header" role="row">' +
          '<span class="glyph" aria-hidden="true" style="color:var(--seg-' + (g.key === 'in_progress' ? 'inprog' : g.key) + ')">' + (meta ? meta.glyph : '') + '</span>' +
          '<span>' + (meta ? meta.label : g.key) + '</span>' +
          '<span class="n">' + g.items.length + '</span>' +
        '</div>' +
        g.items.map(t => obsListRow(T, t, byId)).join('') +
      '</div>';
    }).join('') +
  '</div>';
}

function obsListRow(T, t, byId) {
  const meta = T.statusMeta[t.status];
  const blocker = t.blocked_by ? byId[t.blocked_by] : null;
  const unresolved = blocker && blocker.status !== 'done';
  const body1 = Util.firstLine(t.body);
  const selected = Store.selectedId === t.id;
  const pulsing = Store.pulse[t.id] && Date.now() - Store.pulse[t.id] < 2000;
  const entering = !!Store.entering[t.id];
  const classes = ['row', 's-' + t.status];
  if (selected) classes.push('selected');
  if (pulsing) classes.push('seg-pulse');
  if (entering) classes.push('seg-enter');

  const bars = [0, 1, 2, 3].map(i => {
    const filled = (4 - t.priority);
    return '<span class="f' + i + ' ' + (i < filled ? 'on' : '') + '"></span>';
  }).join('');

  const blockerChip = t.blocked_by
    ? '<span class="blocker-chip ' + (unresolved ? 'unresolved' : '') + '" role="gridcell" title="' + Util.esc(blocker ? blocker.title : t.blocked_by) + '">' +
        (unresolved ? '✕ ' : '✓ ') + Util.esc(Util.shortId(t.blocked_by, 8)) +
      '</span>'
    : '<span role="gridcell"></span>';

  const priLabel = 'Priority P' + t.priority;
  const statusLabel = meta ? meta.label : t.status;
  const projChip = projectChipHTML(t);
  return '<div class="' + classes.join(' ') + '" role="row" tabindex="0" aria-selected="' + (selected ? 'true' : 'false') + '" aria-label="' + Util.esc(statusLabel + ' · ' + t.title) + '" data-act="select" data-id="' + Util.esc(t.id) + '">' +
    '<span class="pri-bars p' + t.priority + '" role="gridcell" aria-label="' + priLabel + '">' + bars + '</span>' +
    '<span class="status-pill s-' + t.status + '" role="gridcell">' +
      '<span class="glyph" aria-hidden="true">' + (meta ? meta.glyph : '') + '</span>' +
      '<span>' + (meta ? meta.label : t.status) + '</span>' +
    '</span>' +
    '<span class="row-id" role="gridcell" title="' + Util.esc(t.id) + '">' + Util.esc(Util.shortId(t.id, 8)) + '</span>' +
    '<span class="row-title-wrap" role="gridcell">' +
      '<span class="row-title">' + Util.esc(t.title) + '</span>' +
      (body1 ? '<span class="row-body">— ' + Util.esc(body1) + '</span>' : '') +
      projChip +
    '</span>' +
    blockerChip +
    '<span class="row-time" role="gridcell">' + Util.esc(Util.relTime(t.updated_at)) + '</span>' +
  '</div>';
}

function obsDetail(T, task, byId) {

  const dependents = Object.values(byId).filter(t => t.blocked_by === task.id);

    : '<h2 class="detail-title" tabindex="0" role="button" aria-label="Edit title" data-act="edit-title">' + Util.esc(task.title) + '</h2>';

    : '<div class="detail-body" data-act="edit-body">' +

      '</div>';

  return '<aside class="detail">' +
    '<div class="detail-head">' +
      '<span class="id">' + Util.esc(Util.shortId(task.id, 12)) + (proj ? ' · ' + Util.esc(proj.name) : '') + '</span>' +
      '<button class="detail-close" data-act="deselect">✕</button>' +
    '</div>' +

    '<div class="detail-meta">' +
      '<span>Status</span>' +

      '<span>Priority</span>' +

    '</div>' +

          '<span class="status-pill s-' + blocker.status + '"><span class="glyph">' + T.statusMeta[blocker.status].glyph + '</span></span>' +

      (editing
        ? '<button class="primary" data-act="detail-save">Save</button><button data-act="detail-cancel">Cancel</button>'

function conKanbanView(T, tasks, byId) {
  if (!hasActiveScope()) {
    return '<div class="view-stub">' +
      '<div class="big">KANBAN</div>' +
      '<div class="hint">// select or create a project to get started.</div>' +

  }

  const meta = T.statusMeta;
  return '<div class="kanban" data-act="deselect">' +
    KANBAN_COLS.map(col => {
      const items = buckets[col] || [];
      const m = meta[col] || { label: col, glyph: '' };
      const over = Store.dragging && Store.dragOverCol === col;
      return '<div class="kanban-col' + (over ? ' drag-over' : '') + '" data-act="kanban-col" data-status="' + col + '">' +
        '<div class="kanban-col-head g-' + col + '">' +
          '<span class="glyph" aria-hidden="true">' + m.glyph + '</span>' +

          '<span class="n">[' + items.length + ']</span>' +
        '</div>' +
        '<div class="kanban-col-body">' +
          (items.length
            ? items.map(t => conKanbanCard(T, t, byId)).join('')
            : '<div class="kanban-empty">// drop here</div>') +

      '</div>';
    }).join('') +
