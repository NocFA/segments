<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segments</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%237aa7d9%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%23e7e5e2%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%226%22%20fill%3D%22url(%23g)%22%2F%3E%3Crect%20x%3D%227%22%20y%3D%227%22%20width%3D%2218%22%20height%3D%2218%22%20rx%3D%222%22%20fill%3D%22%230e1012%22%2F%3E%3C%2Fsvg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Shared base ===== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  background: var(--seg-bg);
  color: var(--seg-text);
  font-family: var(--seg-font);
  font-feature-settings: var(--seg-font-feature, normal);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}
button, input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; padding: 0; cursor: pointer; }
input, textarea, select { background: none; border: none; outline: none; }
::selection { background: var(--seg-accent-dim); }
input::placeholder, textarea::placeholder { color: var(--seg-faint); }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: var(--seg-scroll); border-radius: 5px; }
*::-webkit-scrollbar-thumb:hover { background: var(--seg-scroll-hover); }
*::-webkit-scrollbar-track { background: transparent; }

kbd {
  font-family: var(--seg-font-mono);
  font-size: 9.5px;
  border: 1px solid var(--seg-line2);
  padding: 0 4px;
  border-radius: 3px;
  color: var(--seg-muted);
  background: var(--seg-surface);
}

/* ===== Obsidian theme (Direction A) ===== */
body[data-theme="obsidian"] {
  --seg-bg: #0e1012;
  --seg-surface: #16181b;
  --seg-surface2: #1d2024;
  --seg-line: rgba(255,255,255,0.06);
  --seg-line2: rgba(255,255,255,0.10);
  --seg-text: #e7e5e2;
  --seg-muted: #8a8a85;
  --seg-faint: #5b5b57;
  --seg-accent: #7aa7d9;
  --seg-accent-dim: rgba(122,167,217,0.14);
  --seg-todo: #8a8a85;
  --seg-inprog: #7aa7d9;
  --seg-blocker: #d97a7a;
  --seg-done: #7ac28a;
  --seg-closed: #4a4a47;
  --seg-warn: #d4a857;
  --seg-pri0: #d97a7a;
  --seg-pri1: #e0b675;
  --seg-pri2: #7aa7d9;
  --seg-pri3: #5b5b57;
  --seg-font: "Geist", "Geist Sans", -apple-system, system-ui, sans-serif;
  --seg-font-mono: "Geist Mono", ui-monospace, monospace;
  --seg-font-feature: "ss01", "cv11";
  --seg-glow: 0 0 0 1px rgba(122,167,217,0.35), 0 0 20px rgba(122,167,217,0.12);
  --seg-scroll: rgba(255,255,255,0.08);
  --seg-scroll-hover: rgba(255,255,255,0.16);
}
body[data-theme="obsidian"][data-mode="light"] {
  --seg-bg: #f6f5f2;
  --seg-surface: #ffffff;
  --seg-surface2: #eeece7;
  --seg-line: rgba(0,0,0,0.07);
  --seg-line2: rgba(0,0,0,0.12);
  --seg-text: #14151a;
  --seg-muted: #6a6a65;
  --seg-faint: #9a9a95;
  --seg-accent: #2e5a8a;
  --seg-accent-dim: rgba(46,90,138,0.10);
  --seg-inprog: #2e5a8a;
  --seg-blocker: #b04545;
  --seg-done: #2f7d45;
  --seg-closed: #aaaaa5;
  --seg-warn: #b8841f;
  --seg-glow: 0 0 0 1px rgba(46,90,138,0.35), 0 0 20px rgba(46,90,138,0.10);
  --seg-scroll: rgba(0,0,0,0.12);
  --seg-scroll-hover: rgba(0,0,0,0.22);
}

/* ===== Obsidian component styles ===== */
body[data-theme="obsidian"] .app {
  height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
}

/* topbar */
body[data-theme="obsidian"] .topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 16px; border-bottom: 1px solid var(--seg-line);
  background: var(--seg-bg); flex-shrink: 0;
}
body[data-theme="obsidian"] .brand { display: flex; align-items: center; gap: 8px; }
body[data-theme="obsidian"] .brand-mark {
  width: 18px; height: 18px; border-radius: 3px;
  background: linear-gradient(135deg, var(--seg-accent), var(--seg-text));
  position: relative;
}
body[data-theme="obsidian"] .brand-mark::after {
  content: ""; position: absolute; inset: 4px; border-radius: 1px; background: var(--seg-bg);
}
body[data-theme="obsidian"] .brand-name {
  font-size: 13px; font-weight: 600; letter-spacing: -0.1px; color: var(--seg-text);
}
body[data-theme="obsidian"] .brand-ver {
  font-size: 11px; color: var(--seg-faint); font-family: var(--seg-font-mono);
}

body[data-theme="obsidian"] .view-tabs {
  display: flex; gap: 2px; margin-left: 12px; padding: 2px;
  background: var(--seg-surface); border-radius: 6px; border: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .view-tab {
  padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--seg-muted);
  display: flex; align-items: center; gap: 6px;
}
body[data-theme="obsidian"] .view-tab .hint {
  font-size: 10px; color: var(--seg-faint); font-family: var(--seg-font-mono);
}
body[data-theme="obsidian"] .view-tab.active {
  color: var(--seg-text); background: var(--seg-surface2); font-weight: 500;
}
body[data-theme="obsidian"] .view-tab[data-disabled] { opacity: 0.45; cursor: not-allowed; }

body[data-theme="obsidian"] .search-wrap {
  flex: 1; display: flex; justify-content: center;
}
body[data-theme="obsidian"] .search {
  display: flex; align-items: center; gap: 8px;
  background: var(--seg-surface); border: 1px solid var(--seg-line);
  padding: 5px 10px; border-radius: 6px; min-width: 320px; max-width: 460px; width: 100%;
}
body[data-theme="obsidian"] .search input {
  flex: 1; color: var(--seg-text); font-size: 12.5px;
}
body[data-theme="obsidian"] .search .icon { color: var(--seg-faint); font-size: 12px; }
body[data-theme="obsidian"] .search .slash {
  font-size: 10px; color: var(--seg-faint); font-family: var(--seg-font-mono);
  border: 1px solid var(--seg-line); padding: 1px 4px; border-radius: 3px;
}

body[data-theme="obsidian"] .topbar-btn {
  font-size: 11.5px; color: var(--seg-muted);
  padding: 5px 9px; border: 1px solid var(--seg-line); border-radius: 5px;
  font-family: var(--seg-font-mono);
}
body[data-theme="obsidian"] .topbar-btn:hover { color: var(--seg-text); border-color: var(--seg-line2); }

body[data-theme="obsidian"] .agent-ind {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--seg-muted); user-select: none;
}
body[data-theme="obsidian"] .agent-ind.on { color: var(--seg-accent); }
body[data-theme="obsidian"] .agent-dot {
  width: 6px; height: 6px; border-radius: 3px; background: var(--seg-faint);
}
body[data-theme="obsidian"] .agent-ind.on .agent-dot { background: var(--seg-accent); animation: segDot 1.6s ease-in-out infinite; }

body[data-theme="obsidian"] .mode-btn {
  font-size: 14px; color: var(--seg-muted); padding: 3px 6px;
}

body[data-theme="obsidian"] .theme-select {
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  padding: 4px 8px; border: 1px solid var(--seg-line); border-radius: 5px;
  background: var(--seg-surface); cursor: pointer;
}
body[data-theme="obsidian"] .theme-select:hover { color: var(--seg-text); }

/* body layout */
body[data-theme="obsidian"] .main { display: flex; flex: 1; min-height: 0; position: relative; }

/* sidebar */
body[data-theme="obsidian"] .sidebar {
  width: 212px; border-right: 1px solid var(--seg-line);
  padding: 14px 8px; display: flex; flex-direction: column; gap: 16px;
  background: var(--seg-bg); flex-shrink: 0; overflow-y: auto;
}
body[data-theme="obsidian"] .side-label {
  font-size: 10.5px; color: var(--seg-faint); letter-spacing: 0.6px;
  padding: 0 10px 6px; text-transform: uppercase;
}
body[data-theme="obsidian"] .side-item {
  width: 100%; padding: 7px 10px; font-size: 12.5px;
  color: var(--seg-muted); border-radius: 5px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
body[data-theme="obsidian"] .side-item:hover { color: var(--seg-text); }
body[data-theme="obsidian"] .side-item.active {
  color: var(--seg-text); background: var(--seg-surface2); font-weight: 500;
}
body[data-theme="obsidian"] .side-item .count { color: var(--seg-faint); font-size: 10.5px; font-variant-numeric: tabular-nums; }
body[data-theme="obsidian"] .side-item .pill {
  color: var(--seg-accent); background: var(--seg-accent-dim);
  font-size: 10.5px; padding: 1px 5px; border-radius: 3px;
}
body[data-theme="obsidian"] .project-item {
  width: 100%; padding: 7px 10px; border-radius: 5px;
  display: flex; align-items: center; gap: 10px;
}
body[data-theme="obsidian"] .project-item:hover { background: rgba(255,255,255,0.02); }
body[data-theme="obsidian"] .project-item.active { background: var(--seg-surface2); }
body[data-theme="obsidian"] .project-dot {
  width: 6px; height: 6px; border-radius: 3px; background: var(--seg-faint); flex-shrink: 0;
}
body[data-theme="obsidian"] .project-item.active .project-dot { background: var(--seg-accent); }
body[data-theme="obsidian"] .project-name {
  font-size: 12.5px; color: var(--seg-muted); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: left;
}
body[data-theme="obsidian"] .project-item.active .project-name { color: var(--seg-text); font-weight: 500; }
body[data-theme="obsidian"] .project-count {
  font-size: 10.5px; color: var(--seg-faint); font-variant-numeric: tabular-nums;
}
body[data-theme="obsidian"] .project-bars { display: flex; gap: 1.5px; align-items: flex-end; }
body[data-theme="obsidian"] .project-bars span { width: 3px; border-radius: 0.5px; }

body[data-theme="obsidian"] .side-shortcuts {
  padding: 10px 12px; font-size: 10.5px; color: var(--seg-faint);
  border-top: 1px solid var(--seg-line); line-height: 1.7; margin-top: auto;
}
body[data-theme="obsidian"] .side-shortcuts .title { color: var(--seg-muted); margin-bottom: 4px; }

/* content area */
body[data-theme="obsidian"] .content {
  flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
}

/* composer */
body[data-theme="obsidian"] .composer {
  border-bottom: 1px solid var(--seg-line);
  background: var(--seg-surface);
  padding: 12px 16px;
}
body[data-theme="obsidian"] .composer-title {
  width: 100%; font-size: 14px; color: var(--seg-text); margin-bottom: 8px;
}
body[data-theme="obsidian"] .composer-body {
  width: 100%; resize: none; color: var(--seg-muted); font-size: 12.5px;
  line-height: 1.5; min-height: 44px;
}
body[data-theme="obsidian"] .composer-row {
  display: flex; gap: 12px; align-items: center; margin-top: 6px;
}
body[data-theme="obsidian"] .composer-row .label {
  font-size: 11px; color: var(--seg-faint);
}
body[data-theme="obsidian"] .pri-btn {
  padding: 2px 7px; border-radius: 3px; font-size: 11px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
}
body[data-theme="obsidian"] .pri-btn.active {
  border-color: var(--seg-accent); color: var(--seg-accent);
}
body[data-theme="obsidian"] .composer-hint {
  flex: 1; text-align: right; font-size: 10.5px; color: var(--seg-faint);
}
body[data-theme="obsidian"] .composer select {
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  border: 1px solid var(--seg-line); padding: 2px 6px; border-radius: 3px;
  background: var(--seg-surface); cursor: pointer;
}

/* list view */
body[data-theme="obsidian"] .list { flex: 1; overflow: auto; }
body[data-theme="obsidian"] .list-group-header {
  display: flex; align-items: baseline; gap: 10px;
  padding: 14px 16px 6px;
  font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--seg-muted); background: var(--seg-bg);
  position: sticky; top: 0; z-index: 1;
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .list-group-header .glyph { font-size: 13px; }
body[data-theme="obsidian"] .list-group-header .n { color: var(--seg-faint); font-size: 10.5px; }
body[data-theme="obsidian"] .row {
  display: grid;
  grid-template-columns: 22px 92px 70px 1fr auto auto;
  gap: 12px; align-items: center;
  padding: 9px 16px;
  border-bottom: 1px solid var(--seg-line);
  cursor: pointer;
  font-size: 13px;
  position: relative;
}
body[data-theme="obsidian"] .row.selected { background: var(--seg-surface2); }
body[data-theme="obsidian"] .row.selected::before {
  content: ""; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 2px; background: var(--seg-accent); border-radius: 2px;
}
body[data-theme="obsidian"] .pri-bars { display: inline-flex; gap: 2px; align-items: flex-end; height: 10px; vertical-align: middle; }
body[data-theme="obsidian"] .pri-bars span { width: 2.5px; border-radius: 0.5px; background: var(--seg-line2); }
body[data-theme="obsidian"] .pri-bars span.f0 { height: 4px; }
body[data-theme="obsidian"] .pri-bars span.f1 { height: 5.5px; }
body[data-theme="obsidian"] .pri-bars span.f2 { height: 7px; }
body[data-theme="obsidian"] .pri-bars span.f3 { height: 8.5px; }
body[data-theme="obsidian"] .pri-bars.p0 span.on { background: var(--seg-pri0); }
body[data-theme="obsidian"] .pri-bars.p1 span.on { background: var(--seg-pri1); }
body[data-theme="obsidian"] .pri-bars.p2 span.on { background: var(--seg-pri2); }
body[data-theme="obsidian"] .pri-bars.p3 span.on { background: var(--seg-pri3); }
body[data-theme="obsidian"] .status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500; letter-spacing: 0.1px;
  min-width: 92px;
}
body[data-theme="obsidian"] .status-pill .glyph { font-size: 13px; line-height: 1; width: 12px; text-align: center; }
body[data-theme="obsidian"] .status-pill.s-todo        { color: var(--seg-todo); }
body[data-theme="obsidian"] .status-pill.s-in_progress { color: var(--seg-inprog); }
body[data-theme="obsidian"] .status-pill.s-blocker     { color: var(--seg-blocker); }
body[data-theme="obsidian"] .status-pill.s-done        { color: var(--seg-done); }
body[data-theme="obsidian"] .status-pill.s-closed      { color: var(--seg-closed); }
body[data-theme="obsidian"] .row-id {
  color: var(--seg-faint); font-family: var(--seg-font-mono);
  font-size: 11px; font-variant-numeric: tabular-nums;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="obsidian"] .row-title-wrap {
  min-width: 0; display: flex; gap: 10px; align-items: baseline; overflow: hidden;
}
body[data-theme="obsidian"] .row-title {
  color: var(--seg-text); font-weight: 450;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 1; min-width: 0;
}
body[data-theme="obsidian"] .row.s-closed .row-title { color: var(--seg-faint); }
body[data-theme="obsidian"] .row-body {
  color: var(--seg-muted); font-size: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
body[data-theme="obsidian"] .blocker-chip {
  font-size: 11px;
  border: 1px solid var(--seg-line2);
  padding: 1px 6px; border-radius: 3px;
  font-variant-numeric: tabular-nums; color: var(--seg-faint);
  white-space: nowrap;
}
body[data-theme="obsidian"] .blocker-chip.unresolved {
  color: var(--seg-blocker); border-color: rgba(217,122,122,0.25);
}
body[data-theme="obsidian"] .row-proj {
  font-size: 10.5px; color: var(--seg-muted);
  background: var(--seg-accent-dim); padding: 1px 6px; border-radius: 3px;
  white-space: nowrap; flex-shrink: 0;
}
body[data-theme="obsidian"] .row-time {
  color: var(--seg-faint); font-size: 11.5px; font-variant-numeric: tabular-nums;
  min-width: 48px; text-align: right;
}

/* empty */
body[data-theme="obsidian"] .empty {
  color: var(--seg-faint); text-align: center; padding: 60px 20px; font-size: 13px;
}

/* detail panel — overlays content so opening/closing doesn't reflow the view */
body[data-theme="obsidian"] .detail {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 380px; z-index: 50;
  border-left: 1px solid var(--seg-line);
  background: var(--seg-bg); overflow: hidden auto;
  display: flex; flex-direction: column;
  box-shadow: -16px 0 36px rgba(0,0,0,0.55);
}
body[data-theme="obsidian"] .detail-body { overflow-wrap: anywhere; word-break: break-word; }
body[data-theme="obsidian"] .detail-meta .val { overflow-wrap: anywhere; min-width: 0; }
body[data-theme="obsidian"] .detail-meta select { max-width: 100%; }
body[data-theme="obsidian"] .detail-head {
  padding: 12px 18px; border-bottom: 1px solid var(--seg-line);
  display: flex; justify-content: space-between; align-items: center;
}
body[data-theme="obsidian"] .detail-head .id {
  font-size: 11px; color: var(--seg-faint); font-family: var(--seg-font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="obsidian"] .detail-close {
  color: var(--seg-muted); font-size: 14px; padding-left: 10px;
}
body[data-theme="obsidian"] .detail-title {
  padding: 14px 18px 8px;
  margin: 0; font-size: 17px; font-weight: 500; color: var(--seg-text);
  line-height: 1.3; letter-spacing: -0.15px;
}
body[data-theme="obsidian"] .detail-meta {
  padding: 8px 18px 14px;
  display: grid; grid-template-columns: 84px 1fr;
  column-gap: 12px; row-gap: 8px; font-size: 12px;
  color: var(--seg-muted);
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .detail-meta select { color: var(--seg-text); cursor: pointer; }
body[data-theme="obsidian"] .detail-meta .val { color: var(--seg-text); }
body[data-theme="obsidian"] .detail-meta .val.mono { font-family: var(--seg-font-mono); font-size: 11px; }
body[data-theme="obsidian"] .detail-body {
  padding: 14px 18px; color: var(--seg-text);
  font-size: 13.5px; line-height: 1.6; white-space: pre-wrap;
}
body[data-theme="obsidian"] .detail-body textarea {
  width: 100%; min-height: 120px; color: var(--seg-text);
  font-size: 13.5px; line-height: 1.6; resize: vertical;
  font-family: inherit; background: var(--seg-surface); border: 1px solid var(--seg-line);
  padding: 10px; border-radius: 4px;
}
body[data-theme="obsidian"] .detail-body textarea:focus { border-color: var(--seg-accent); }
body[data-theme="obsidian"] .detail-rel {
  padding: 12px 18px; border-top: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .detail-rel .section-title {
  font-size: 10.5px; color: var(--seg-faint); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 6px;
}
body[data-theme="obsidian"] .detail-rel .rel-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 0;
  font-size: 12px; color: var(--seg-text); cursor: pointer;
}
body[data-theme="obsidian"] .detail-rel .rel-row:hover { color: var(--seg-accent); }
body[data-theme="obsidian"] .detail-rel .rel-id { color: var(--seg-faint); font-family: var(--seg-font-mono); font-size: 11px; }
body[data-theme="obsidian"] .detail-rel .rel-title {
  color: var(--seg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0;
}
body[data-theme="obsidian"] .detail-actions {
  display: flex; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--seg-line); margin-top: auto;
}
body[data-theme="obsidian"] .detail-actions button {
  padding: 6px 12px; border: 1px solid var(--seg-line); border-radius: 4px;
  font-size: 12px; color: var(--seg-muted);
}
body[data-theme="obsidian"] .detail-actions button:hover { color: var(--seg-text); border-color: var(--seg-line2); }
body[data-theme="obsidian"] .detail-actions .primary {
  background: var(--seg-accent); color: #000; border: none; font-weight: 500;
}
body[data-theme="obsidian"] .detail-actions .primary:hover { opacity: 0.9; }
body[data-theme="obsidian"] .detail-actions .danger { color: var(--seg-blocker); }
body[data-theme="obsidian"] .detail-actions .danger:hover { border-color: var(--seg-blocker); }

/* dialog: new project */
body[data-theme="obsidian"] .dialog-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center; padding-top: 120px;
}
body[data-theme="obsidian"] .dialog {
  background: var(--seg-bg); border: 1px solid var(--seg-line2); border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 420px; overflow: hidden;
}
body[data-theme="obsidian"] .dialog h3 {
  margin: 0; padding: 14px 18px; font-size: 14px; font-weight: 500;
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .dialog input {
  width: 100%; padding: 14px 18px; font-size: 14px; color: var(--seg-text);
  border-bottom: 1px solid var(--seg-line);
}
body[data-theme="obsidian"] .dialog .dialog-actions { padding: 10px 18px; display: flex; gap: 8px; justify-content: flex-end; }
body[data-theme="obsidian"] .dialog .dialog-actions button {
  padding: 6px 14px; border-radius: 4px; font-size: 12px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
}
body[data-theme="obsidian"] .dialog .dialog-actions .primary {
  background: var(--seg-accent); color: #000; border: none; font-weight: 500;
}

/* stub view placeholder */
body[data-theme="obsidian"] .view-stub {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--seg-muted);
}
body[data-theme="obsidian"] .view-stub .big { font-size: 20px; color: var(--seg-text); font-weight: 500; }
body[data-theme="obsidian"] .view-stub .hint { font-size: 12px; color: var(--seg-faint); font-family: var(--seg-font-mono); }

/* kanban view */
body[data-theme="obsidian"] .kanban {
  flex: 1; display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  overflow: auto; background: var(--seg-bg);
}
body[data-theme="obsidian"] .kanban-col {
  display: flex; flex-direction: column;
  border-right: 1px solid var(--seg-line);
  min-width: 0; transition: background 140ms ease;
}
body[data-theme="obsidian"] .kanban-col:last-child { border-right: none; }
body[data-theme="obsidian"] .kanban-col.drag-over { background: var(--seg-accent-dim); }
body[data-theme="obsidian"] .kanban-col-head {
  position: sticky; top: 0; z-index: 1;
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 10px; background: var(--seg-bg);
  border-bottom: 1px solid var(--seg-line);
  font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--seg-muted);
}
body[data-theme="obsidian"] .kanban-col-head .glyph { font-size: 13px; width: 14px; text-align: center; }
body[data-theme="obsidian"] .kanban-col-head.g-in_progress .glyph { color: var(--seg-inprog); }
body[data-theme="obsidian"] .kanban-col-head.g-blocker     .glyph { color: var(--seg-blocker); }
body[data-theme="obsidian"] .kanban-col-head.g-todo        .glyph { color: var(--seg-todo); }
body[data-theme="obsidian"] .kanban-col-head.g-done        .glyph { color: var(--seg-done); }
body[data-theme="obsidian"] .kanban-col-head .n {
  margin-left: auto; color: var(--seg-faint);
  font-size: 10.5px; font-variant-numeric: tabular-nums;
}
body[data-theme="obsidian"] .kanban-col-body {
  flex: 1; padding: 10px; overflow: auto;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 120px;
}
body[data-theme="obsidian"] .kanban-card {
  padding: 10px 11px;
  background: var(--seg-surface);
  border: 1px solid var(--seg-line);
  border-radius: 5px;
  cursor: grab; position: relative;
  transition: border-color 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
}
body[data-theme="obsidian"] .kanban-card:hover { border-color: var(--seg-line2); }
body[data-theme="obsidian"] .kanban-card.selected { border-color: var(--seg-accent); box-shadow: var(--seg-glow); }
body[data-theme="obsidian"] .kanban-card.dragging { opacity: 0.35; cursor: grabbing; }
body[data-theme="obsidian"] .kanban-card .card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
body[data-theme="obsidian"] .kanban-card .card-id {
  font-size: 10.5px; color: var(--seg-faint); font-family: var(--seg-font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="obsidian"] .kanban-card .card-title {
  font-size: 12.5px; color: var(--seg-text); line-height: 1.35;
  font-weight: 450; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
body[data-theme="obsidian"] .kanban-card .card-bottom {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  font-size: 10.5px; color: var(--seg-faint); font-variant-numeric: tabular-nums;
  min-width: 0;
}
body[data-theme="obsidian"] .kanban-card .card-bottom .card-time { white-space: nowrap; }
body[data-theme="obsidian"] .kanban-empty {
  color: var(--seg-faint); font-size: 11.5px;
  padding: 28px 10px; text-align: center;
  border: 1px dashed var(--seg-line); border-radius: 4px;
}

/* graph view */
body[data-theme="obsidian"] .graph {
  flex: 1; overflow: auto; position: relative; background: var(--seg-bg);
}
/* When the detail panel is open it overlays ~380px on the right; pad the
   graph's scrollable area so the user can scroll right to peek under it. */
body[data-theme="obsidian"] .graph.has-detail { padding-right: 400px; }
body[data-theme="obsidian"] .graph-head {
  position: sticky; top: 0; z-index: 2; background: var(--seg-bg);
  display: flex; gap: 14px; padding: 10px 16px;
  border-bottom: 1px solid var(--seg-line);
  font-size: 11px; color: var(--seg-muted);
}
body[data-theme="obsidian"] .graph-head .dot { color: var(--seg-faint); }
body[data-theme="obsidian"] .graph-head .ready-dot { color: var(--seg-accent); }
body[data-theme="obsidian"] .graph-svg { display: block; }
body[data-theme="obsidian"] .graph-svg .g-bg { fill: transparent; pointer-events: all; cursor: default; }
body[data-theme="obsidian"] .graph-svg .edge { fill: none; pointer-events: none; transition: opacity 160ms ease; }
body[data-theme="obsidian"] .graph-svg .edge.open    { stroke: var(--seg-line2); stroke-width: 1; }
body[data-theme="obsidian"] .graph-svg .edge.blocked { stroke: var(--seg-blocker); stroke-width: 1.4; }
body[data-theme="obsidian"] .graph-svg .arrow.open    { fill: var(--seg-faint); }
body[data-theme="obsidian"] .graph-svg .arrow.blocked { fill: var(--seg-blocker); }
body[data-theme="obsidian"] .graph-svg .edge.off { opacity: 0.10; }
body[data-theme="obsidian"] .graph-svg .g-node { cursor: pointer; transition: opacity 160ms ease; }
body[data-theme="obsidian"] .graph-svg .g-node.off { opacity: 0.20; }
body[data-theme="obsidian"] .graph-svg .g-node .bg { fill: var(--seg-surface); stroke: var(--seg-line2); stroke-width: 1; }
body[data-theme="obsidian"] .graph-svg .g-node.s-todo        .bar { fill: var(--seg-todo); }
body[data-theme="obsidian"] .graph-svg .g-node.s-in_progress .bar { fill: var(--seg-inprog); }
body[data-theme="obsidian"] .graph-svg .g-node.s-blocker     .bar { fill: var(--seg-blocker); }
body[data-theme="obsidian"] .graph-svg .g-node.s-done        .bar { fill: var(--seg-done); }
body[data-theme="obsidian"] .graph-svg .g-node.s-closed      .bar { fill: var(--seg-closed); }
/* Blocker status emphasis: tinted fill + dashed accent border */
body[data-theme="obsidian"] .graph-svg .g-node.s-blocker .bg {
  fill: rgba(217,122,122,0.06);
  stroke: var(--seg-blocker);
  stroke-width: 1.3;
  stroke-dasharray: 4 2.5;
}
/* P1 priority emphasis: thicker outline for urgent nodes */
body[data-theme="obsidian"] .graph-svg .g-node.p-1 .bg { stroke-width: 1.5; }
/* "Currently blocking other work" emphasis: warm amber border + secondary
   left ribbon next to the status bar + bold tag in meta line. Amber is
   chosen over accent (which would clash with selection) and over blocker
   red (which is reserved for status=blocker). */
body[data-theme="obsidian"] .graph-svg .g-node.is-blocking .bg {
  stroke: var(--seg-warn); stroke-width: 1.5; stroke-dasharray: none;
}
body[data-theme="obsidian"] .graph-svg .g-node.is-blocking .bar2 { fill: var(--seg-warn); }
/* Selection outline overrides others */
body[data-theme="obsidian"] .graph-svg .g-node.sel .bg {
  fill: var(--seg-surface2); stroke: var(--seg-accent); stroke-width: 1.8; stroke-dasharray: none;
}
body[data-theme="obsidian"] .graph-svg .g-node .ring {
  fill: none; stroke: var(--seg-accent); stroke-width: 1; opacity: 0.55;
}
body[data-theme="obsidian"] .graph-svg .g-meta {
  fill: var(--seg-faint);
  font: 9.5px/1 var(--seg-font-mono);
  font-variant-numeric: tabular-nums;
}
body[data-theme="obsidian"] .graph-svg .g-pri {
  font: 600 9.5px/1 var(--seg-font-mono);
  font-variant-numeric: tabular-nums;
  fill: var(--seg-faint);
}
body[data-theme="obsidian"] .graph-svg .g-pri.p-1 { fill: var(--seg-blocker); }
body[data-theme="obsidian"] .graph-svg .g-pri.p-2 { fill: var(--seg-accent); }
body[data-theme="obsidian"] .graph-svg .g-pri.p-3 { fill: var(--seg-faint); opacity: 0.7; }
body[data-theme="obsidian"] .graph-svg .g-meta .g-deps {
  fill: var(--seg-warn);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
body[data-theme="obsidian"] .graph-svg .g-title {
  font: 11.5px/1.3 var(--seg-font);
  color: var(--seg-text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
body[data-theme="obsidian"] .graph-svg .g-node.s-closed .g-title { color: var(--seg-faint); }

/* animations */
@keyframes segPulse {
  0%   { box-shadow: 0 0 0 0 rgba(122,167,217,0.55); }
  100% { box-shadow: 0 0 0 8px rgba(122,167,217,0); }
}
@keyframes segSlideIn {
  0%   { opacity: 0; transform: translateY(-6px); background: rgba(122,167,217,0.08); }
  100% { opacity: 1; transform: none; background: transparent; }
}
@keyframes segDot {
  0%,100% { opacity: 0.5; }
  50%     { opacity: 1; }
}
.seg-pulse { animation: segPulse 1.4s ease-out; }
.seg-enter { animation: segSlideIn 420ms cubic-bezier(.2,.7,.2,1); }

/* a11y: visible focus ring only via keyboard */
body[data-theme="obsidian"] button:focus-visible,
body[data-theme="obsidian"] input:focus-visible,
body[data-theme="obsidian"] textarea:focus-visible,
body[data-theme="obsidian"] select:focus-visible,
body[data-theme="obsidian"] .row:focus-visible,
body[data-theme="obsidian"] .project-item:focus-visible,
body[data-theme="obsidian"] .side-item:focus-visible {
  outline: 2px solid var(--seg-accent);
  outline-offset: 2px;
  border-radius: 4px;
}
body[data-theme="obsidian"] .row[aria-selected="true"] { background: var(--seg-surface2); }

/* light-mode tweaks for contrast on decorative chrome */
body[data-theme="obsidian"][data-mode="light"] .brand-ver,
body[data-theme="obsidian"][data-mode="light"] .row-time,
body[data-theme="obsidian"][data-mode="light"] .row-id {
  color: var(--seg-muted);
}

/* ready filter sidebar item */
body[data-theme="obsidian"] .side-item.ready-active {
  color: var(--seg-text); background: var(--seg-surface2); font-weight: 500;
}
body[data-theme="obsidian"] .side-item.ready-active .pill {
  color: var(--seg-done); background: rgba(122,194,138,0.14);
}

/* responsive: tablet (<=1100px) */
@media (max-width: 1100px) {
  body[data-theme="obsidian"] .sidebar { width: 180px; padding: 12px 6px; }
  body[data-theme="obsidian"] .detail { width: 320px; }
  body[data-theme="obsidian"] .search { min-width: 200px; }
  body[data-theme="obsidian"] .view-tab .hint { display: none; }
}
/* responsive: narrow tablet (<=900px) */
@media (max-width: 900px) {
  body[data-theme="obsidian"] .sidebar { width: 160px; }
  body[data-theme="obsidian"] .search { min-width: 160px; }
  body[data-theme="obsidian"] .row {
    grid-template-columns: 18px 70px 60px 1fr auto;
    gap: 8px; padding: 9px 12px;
  }
  body[data-theme="obsidian"] .blocker-chip { display: none; }
  body[data-theme="obsidian"] .detail { width: min(420px, 100%); }
}
/* responsive: mobile-ish (<=720px) */
@media (max-width: 720px) {
  body[data-theme="obsidian"] .sidebar { display: none; }
  body[data-theme="obsidian"] .topbar { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
  body[data-theme="obsidian"] .view-tabs { margin-left: 0; }
  body[data-theme="obsidian"] .search-wrap { order: 10; flex-basis: 100%; }
  body[data-theme="obsidian"] .agent-ind span:last-child { display: none; }
  body[data-theme="obsidian"] .detail { width: 100%; }
  body[data-theme="obsidian"] .row {
    grid-template-columns: 18px 24px 1fr auto;
    gap: 8px;
  }
  body[data-theme="obsidian"] .row .row-id { display: none; }
  body[data-theme="obsidian"] .status-pill span:last-child { display: none; }
  body[data-theme="obsidian"] .status-pill { min-width: 0; }
}

/* ===== Console theme (Direction B) ===== */
body[data-theme="console"] {
  --seg-bg: #0a0b08;
  --seg-surface: #10110d;
  --seg-surface2: #17190f;
  --seg-line: rgba(195,165,90,0.12);
  --seg-line2: rgba(195,165,90,0.25);
  --seg-text: #d7c89a;
  --seg-muted: #8b7d4c;
  --seg-faint: #57502e;
  --seg-accent: #e0b84a;
  --seg-accent-dim: rgba(224,184,74,0.18);
  --seg-amber: #e0b84a;
  --seg-green: #8fc66b;
  --seg-cyan: #6bc6c6;
  --seg-red: #e06a4a;
  --seg-todo: #8b7d4c;
  --seg-inprog: #e0b84a;
  --seg-blocker: #e06a4a;
  --seg-done: #8fc66b;
  --seg-closed: #3e3a24;
  --seg-pri0: #e06a4a;
  --seg-pri1: #e0b84a;
  --seg-pri2: #6bc6c6;
  --seg-pri3: #57502e;
  --seg-font: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
  --seg-font-mono: "JetBrains Mono", ui-monospace, monospace;
  --seg-font-body: "IBM Plex Mono", "JetBrains Mono", monospace;
  --seg-font-feature: normal;
  --seg-glow: none;
  --seg-scroll: rgba(195,165,90,0.15);
  --seg-scroll-hover: rgba(195,165,90,0.3);
}
body[data-theme="console"][data-mode="light"] {
  --seg-bg: #f6f1e3;
  --seg-surface: #fffaee;
  --seg-surface2: #f0e8d1;
  --seg-line: rgba(90,70,10,0.15);
  --seg-line2: rgba(90,70,10,0.28);
  --seg-text: #2a2410;
  --seg-muted: #6a5c30;
  --seg-faint: #9a8c5c;
  --seg-accent: #9a6b10;
  --seg-accent-dim: rgba(154,107,16,0.14);
  --seg-amber: #9a6b10;
  --seg-green: #3f6a1a;
  --seg-cyan: #2a6a6a;
  --seg-red: #a83a1a;
  --seg-todo: #6a5c30;
  --seg-inprog: #9a6b10;
  --seg-blocker: #a83a1a;
  --seg-done: #3f6a1a;
  --seg-closed: #b0a880;
  --seg-pri0: #a83a1a;
  --seg-pri1: #9a6b10;
  --seg-pri2: #2a6a6a;
  --seg-pri3: #9a8c5c;
  --seg-scroll: rgba(90,70,10,0.2);
  --seg-scroll-hover: rgba(90,70,10,0.35);
}

/* ===== Console component styles ===== */
body[data-theme="console"] .app {
  height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
}

/* topbar */
body[data-theme="console"] .topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px 8px;
  background: var(--seg-bg); flex-shrink: 0;
  border-bottom: 1px solid var(--seg-line);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .brand { display: flex; align-items: baseline; gap: 8px; }
body[data-theme="console"] .brand-name { color: var(--seg-amber); font-size: 14px; font-weight: 600; }
body[data-theme="console"] .brand-prompt { color: var(--seg-muted); font-size: 11px; }
body[data-theme="console"] .brand-caret { color: var(--seg-amber); font-size: 13px; }
body[data-theme="console"] .brand-ver { color: var(--seg-faint); font-size: 10.5px; }

body[data-theme="console"] .view-tabs {
  display: flex; gap: 4px; margin-left: 10px;
}
body[data-theme="console"] .view-tab {
  padding: 3px 9px; font-size: 11px; color: var(--seg-muted);
  border: 1px solid var(--seg-line);
  display: inline-flex; gap: 4px; align-items: baseline;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .view-tab .hint { font-size: 9.5px; opacity: 0.6; }
body[data-theme="console"] .view-tab.active {
  color: var(--seg-bg); background: var(--seg-amber); border-color: var(--seg-amber);
}
body[data-theme="console"] .view-tab[data-disabled] { opacity: 0.45; cursor: not-allowed; }

body[data-theme="console"] .search-wrap { flex: 1; display: flex; justify-content: flex-end; }
body[data-theme="console"] .search {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--seg-line); background: var(--seg-surface);
  padding: 3px 10px; min-width: 260px; max-width: 380px; width: 100%;
}
body[data-theme="console"] .search input {
  flex: 1; color: var(--seg-text); font-size: 11.5px; font-family: var(--seg-font-mono);
}
body[data-theme="console"] .search .icon { color: var(--seg-muted); font-size: 11px; }
body[data-theme="console"] .search .slash { display: none; }

body[data-theme="console"] .topbar-btn {
  font-size: 10.5px; color: var(--seg-muted);
  padding: 3px 8px; border: 1px solid var(--seg-line);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .topbar-btn:hover { color: var(--seg-text); }

body[data-theme="console"] .agent-ind {
  display: flex; align-items: center; gap: 6px;
  font-size: 10.5px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  letter-spacing: 0.3px;
}
body[data-theme="console"] .agent-ind.on { color: var(--seg-green); }
body[data-theme="console"] .agent-dot {
  width: 6px; height: 6px; border-radius: 0; background: var(--seg-faint);
}
body[data-theme="console"] .agent-ind.on .agent-dot { background: var(--seg-green); }

body[data-theme="console"] .mode-btn {
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  padding: 3px 6px;
}

body[data-theme="console"] .theme-select {
  font-size: 10.5px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  padding: 3px 8px; border: 1px solid var(--seg-line); background: var(--seg-surface);
  cursor: pointer;
}

/* stats strip below topbar */
body[data-theme="console"] .topbar-stats {
  display: flex; gap: 18px; padding: 4px 14px 8px;
  font-size: 10.5px; color: var(--seg-muted);
  background: var(--seg-bg);
  border-bottom: 1px dashed var(--seg-line);
  font-family: var(--seg-font-mono);
  flex-shrink: 0;
}
body[data-theme="console"] .topbar-stats .stat-val { color: var(--seg-text); }
body[data-theme="console"] .topbar-stats .stat-spacer { flex: 1; }
body[data-theme="console"] .topbar-stats .c-inprog  { color: var(--seg-inprog); }
body[data-theme="console"] .topbar-stats .c-blocker { color: var(--seg-blocker); }
body[data-theme="console"] .topbar-stats .c-todo    { color: var(--seg-todo); }
body[data-theme="console"] .topbar-stats .c-done    { color: var(--seg-done); }
body[data-theme="console"] .topbar-stats .c-closed  { color: var(--seg-closed); }
body[data-theme="console"] .topbar-stats .c-ready   { color: var(--seg-green); }
body[data-theme="console"] .topbar-stats .c-last    { color: var(--seg-amber); }

/* main / sidebar */
body[data-theme="console"] .main { display: flex; flex: 1; min-height: 0; position: relative; }
body[data-theme="console"] .sidebar {
  width: 220px; border-right: 1px solid var(--seg-line);
  display: flex; flex-direction: column; flex-shrink: 0;
  background: var(--seg-bg);
  font-family: var(--seg-font-mono); font-size: 11px;
  overflow: hidden;
}
body[data-theme="console"] .side-label {
  padding: 12px 14px 6px; color: var(--seg-muted);
  font-size: 10px; letter-spacing: 0.6px;
  display: flex; justify-content: space-between; align-items: center;
}
body[data-theme="console"] .side-label .add-btn {
  color: var(--seg-faint); font-size: 12px; padding: 0 4px; line-height: 1;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .side-label .add-btn:hover { color: var(--seg-amber); }
body[data-theme="console"] .side-item {
  width: 100%; padding: 4px 14px; box-sizing: border-box;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  color: var(--seg-text); font-size: 11px; font-family: var(--seg-font-mono);
  text-align: left;
}
body[data-theme="console"] .side-item:hover { background: var(--seg-surface); }
body[data-theme="console"] .side-item.ready-active {
  color: var(--seg-amber); background: var(--seg-surface2);
}
body[data-theme="console"] .side-item .pill { color: var(--seg-green); font-size: 10.5px; }

body[data-theme="console"] .project-item {
  width: 100%; padding: 4px 14px; box-sizing: border-box;
  display: flex; gap: 6px; align-items: center;
  color: var(--seg-text); font-size: 11px; font-family: var(--seg-font-mono);
  text-align: left;
}
body[data-theme="console"] .project-item:hover { background: var(--seg-surface); }
body[data-theme="console"] .project-item.active {
  background: var(--seg-surface2); color: var(--seg-amber);
}
body[data-theme="console"] .project-item .arrow { width: 10px; color: var(--seg-faint); }
body[data-theme="console"] .project-item.active .arrow { color: var(--seg-amber); }
body[data-theme="console"] .project-item .project-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="console"] .project-item .c-inprog  { color: var(--seg-inprog);  min-width: 10px; text-align: right; }
body[data-theme="console"] .project-item .c-blocker { color: var(--seg-blocker); min-width: 10px; text-align: right; }
body[data-theme="console"] .project-item .c-total   { color: var(--seg-muted);   min-width: 20px; text-align: right; }

body[data-theme="console"] .agent-log {
  flex: 1; overflow: auto; padding: 2px 14px 14px;
  font-size: 10px; color: var(--seg-muted); line-height: 1.5;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .agent-log .log-empty { color: var(--seg-faint); }
body[data-theme="console"] .agent-log .log-row { margin-bottom: 4px; }
body[data-theme="console"] .agent-log .log-t { color: var(--seg-faint); }
body[data-theme="console"] .agent-log .log-m { color: var(--seg-text); }

body[data-theme="console"] .side-shortcuts {
  padding: 10px 14px; color: var(--seg-faint); font-size: 10px;
  border-top: 1px solid var(--seg-line); line-height: 1.6;
  font-family: var(--seg-font-mono);
  flex-shrink: 0;
}
body[data-theme="console"] .side-shortcuts .title { color: var(--seg-muted); margin-bottom: 2px; }

/* content & composer */
body[data-theme="console"] .content {
  flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
}
body[data-theme="console"] .composer {
  border-bottom: 1px solid var(--seg-line);
  background: var(--seg-surface); padding: 10px 14px;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .composer-input-wrap {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px;
}
body[data-theme="console"] .composer-prompt {
  color: var(--seg-amber); font-size: 11px; font-weight: 600; font-family: var(--seg-font-mono);
  white-space: nowrap;
}
body[data-theme="console"] .composer-title {
  flex: 1; font-size: 13px; color: var(--seg-text);
  font-family: var(--seg-font-body);
}
body[data-theme="console"] .composer-body {
  width: 100%; resize: none; color: var(--seg-muted); font-size: 11.5px;
  line-height: 1.5; min-height: 40px; font-family: var(--seg-font-mono);
}
body[data-theme="console"] .composer-row {
  display: flex; gap: 10px; align-items: center; margin-top: 6px;
  font-size: 10.5px; color: var(--seg-faint);
}
body[data-theme="console"] .composer-row .label { color: var(--seg-muted); font-size: 10.5px; }
body[data-theme="console"] .pri-btn {
  padding: 1px 7px; font-size: 10.5px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .pri-btn.active {
  border-color: var(--seg-amber); color: var(--seg-amber);
}
body[data-theme="console"] .composer-hint {
  flex: 1; text-align: right; font-size: 10px; color: var(--seg-faint);
}
body[data-theme="console"] .composer select {
  font-size: 10.5px; color: var(--seg-muted); font-family: var(--seg-font-mono);
  border: 1px solid var(--seg-line); padding: 2px 6px;
  background: var(--seg-surface); cursor: pointer;
}
/* list */
body[data-theme="console"] .list { flex: 1; overflow: auto; font-family: var(--seg-font-mono); }
body[data-theme="console"] .list-group-header {
  padding: 10px 14px 4px; font-size: 10.5px;
  color: var(--seg-muted); letter-spacing: 0.5px;
  border-bottom: 1px dashed var(--seg-line);
  background: var(--seg-bg); position: sticky; top: 0; z-index: 1;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .list-group-header.g-in_progress { color: var(--seg-inprog); }
body[data-theme="console"] .list-group-header.g-blocker     { color: var(--seg-blocker); }
body[data-theme="console"] .list-group-header.g-todo        { color: var(--seg-todo); }
body[data-theme="console"] .list-group-header.g-done        { color: var(--seg-done); }
body[data-theme="console"] .list-group-header.g-closed      { color: var(--seg-closed); }

body[data-theme="console"] .row {
  display: grid;
  grid-template-columns: 14px 30px 92px 78px 1fr auto auto;
  gap: 10px; align-items: center;
  padding: 4px 14px;
  cursor: pointer;
  font-size: 12px;
  border-left: 2px solid transparent;
  color: var(--seg-text);
  font-family: var(--seg-font-mono);
  position: relative;
}
body[data-theme="console"] .row.selected {
  background: var(--seg-surface2); border-left-color: var(--seg-amber);
}
body[data-theme="console"] .row .row-marker {
  color: var(--seg-faint); font-size: 11px;
}
body[data-theme="console"] .row.selected .row-marker { color: var(--seg-amber); }

body[data-theme="console"] .pri-bang {
  color: var(--seg-faint); font-weight: 600; font-size: 11px;
  letter-spacing: -0.5px; min-width: 24px; display: inline-block;
  font-family: var(--seg-font-mono); font-variant-numeric: tabular-nums;
}
body[data-theme="console"] .pri-bang.p0 { color: var(--seg-pri0); }
body[data-theme="console"] .pri-bang.p1 { color: var(--seg-pri1); }
body[data-theme="console"] .pri-bang.p2 { color: var(--seg-pri2); }
body[data-theme="console"] .pri-bang.p3 { color: var(--seg-pri3); }

body[data-theme="console"] .status-pill {
  display: inline-flex; align-items: baseline; gap: 5px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  font-family: var(--seg-font-mono);
  min-width: 84px;
}
body[data-theme="console"] .status-pill.s-todo        { color: var(--seg-todo); }
body[data-theme="console"] .status-pill.s-in_progress { color: var(--seg-inprog); }
body[data-theme="console"] .status-pill.s-blocker     { color: var(--seg-blocker); }
body[data-theme="console"] .status-pill.s-done        { color: var(--seg-done); }
body[data-theme="console"] .status-pill.s-closed      { color: var(--seg-closed); }

body[data-theme="console"] .row-id {
  color: var(--seg-muted); font-size: 10.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .row-title-wrap {
  min-width: 0; display: flex; gap: 10px; align-items: baseline; overflow: hidden;
}
body[data-theme="console"] .row-title {
  color: var(--seg-text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 1; min-width: 0;
  font-family: var(--seg-font-body);
}
body[data-theme="console"] .row.s-closed .row-title { color: var(--seg-faint); }
body[data-theme="console"] .row-body {
  color: var(--seg-muted); font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
body[data-theme="console"] .blocker-chip {
  font-size: 10.5px; color: var(--seg-muted);
  font-family: var(--seg-font-mono); white-space: nowrap;
}
body[data-theme="console"] .blocker-chip.unresolved { color: var(--seg-red); }
body[data-theme="console"] .blocker-chip.resolved   { color: var(--seg-green); }
body[data-theme="console"] .row-proj {
  font-size: 10.5px; color: var(--seg-accent);
  font-family: var(--seg-font-mono); white-space: nowrap;
  border: 1px solid var(--seg-line2); padding: 0 5px; border-radius: 2px;
  flex-shrink: 0;
}
body[data-theme="console"] .row-time {
  color: var(--seg-faint); font-size: 10.5px;
  min-width: 40px; text-align: right;
  font-family: var(--seg-font-mono);
}

body[data-theme="console"] .empty {
  color: var(--seg-faint); text-align: center; padding: 60px 20px;
  font-size: 12px; font-family: var(--seg-font-mono);
}

/* detail panel — overlays content so opening/closing doesn't reflow the view */
body[data-theme="console"] .detail {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 400px; z-index: 50;
  border-left: 1px solid var(--seg-line);
  background: var(--seg-bg); overflow: hidden auto;
  display: flex; flex-direction: column;
  font-family: var(--seg-font-mono);
  box-shadow: -16px 0 36px rgba(0,0,0,0.55);
}
body[data-theme="console"] .detail-body { overflow-wrap: anywhere; word-break: break-word; }
body[data-theme="console"] .detail-meta .val { overflow-wrap: anywhere; min-width: 0; }
body[data-theme="console"] .detail-meta select { max-width: 100%; }
body[data-theme="console"] .detail-head {
  padding: 8px 14px; border-bottom: 1px solid var(--seg-line);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10.5px; color: var(--seg-muted);
}
body[data-theme="console"] .detail-head .id {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="console"] .detail-close {
  color: var(--seg-muted); font-family: var(--seg-font-mono); padding-left: 10px;
}
body[data-theme="console"] .detail-title {
  margin: 0; padding: 14px 14px 8px;
  font-size: 15px; font-weight: 500; color: var(--seg-text);
  line-height: 1.35;
  font-family: var(--seg-font-body);
}
body[data-theme="console"] .detail-meta {
  padding: 10px 14px;
  display: grid; grid-template-columns: 70px 1fr;
  column-gap: 8px; row-gap: 6px;
  font-size: 11px; color: var(--seg-muted);
  border-top: 1px dashed var(--seg-line);
  border-bottom: 1px dashed var(--seg-line);
}
body[data-theme="console"] .detail-meta select,
body[data-theme="console"] .blocker-combo-trigger {
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .detail-meta .val { color: var(--seg-text); }
body[data-theme="console"] .detail-meta .val.mono { font-family: var(--seg-font-mono); font-size: 10.5px; }
body[data-theme="console"] .detail-body {
  padding: 14px; color: var(--seg-text); font-size: 12px; line-height: 1.6;
  white-space: pre-wrap; font-family: var(--seg-font-body);
}
body[data-theme="console"] .detail-body textarea {
  width: 100%; min-height: 120px; color: var(--seg-text);
  font-size: 12px; line-height: 1.6; resize: vertical;
  font-family: var(--seg-font-body);
  background: var(--seg-surface); border: 1px solid var(--seg-line); padding: 10px;
}
body[data-theme="console"] .detail-body textarea:focus { border-color: var(--seg-amber); }
body[data-theme="console"] .detail-rel {
  padding: 10px 14px; border-top: 1px dashed var(--seg-line);
  font-size: 11px;
}
body[data-theme="console"] .detail-rel .section-title {
  font-size: 10.5px; color: var(--seg-muted); margin-bottom: 6px;
}
body[data-theme="console"] .detail-rel .rel-row {
  display: flex; align-items: center; gap: 8px; padding: 3px 0;
  font-size: 11px; color: var(--seg-text); cursor: pointer;
}
body[data-theme="console"] .detail-rel .rel-row:hover { color: var(--seg-amber); }
body[data-theme="console"] .detail-rel .rel-id { color: var(--seg-muted); font-size: 10.5px; }
body[data-theme="console"] .detail-rel .rel-title {
  color: var(--seg-text); overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; flex: 1; min-width: 0;
}
body[data-theme="console"] .detail-actions {
  display: flex; gap: 8px; padding: 10px 14px; margin-top: auto;
  border-top: 1px solid var(--seg-line);
}
body[data-theme="console"] .detail-actions button {
  padding: 4px 12px; border: 1px solid var(--seg-line);
  font-size: 11px; color: var(--seg-muted); font-family: var(--seg-font-mono);
}
body[data-theme="console"] .detail-actions button:hover {
  color: var(--seg-text); border-color: var(--seg-line2);
}
body[data-theme="console"] .detail-actions .primary {
  background: var(--seg-amber); color: var(--seg-bg); border: none; font-weight: 600;
}
body[data-theme="console"] .detail-actions .primary:hover { opacity: 0.9; }
body[data-theme="console"] .detail-actions .danger { color: var(--seg-red); }
body[data-theme="console"] .detail-actions .danger:hover { border-color: var(--seg-red); }

/* dialog */
body[data-theme="console"] .dialog-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
  display: flex; align-items: flex-start; justify-content: center; padding-top: 120px;
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .dialog {
  background: var(--seg-bg); border: 1px solid var(--seg-line2);
  width: 420px; overflow: hidden;
}
body[data-theme="console"] .dialog h3 {
  margin: 0; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: var(--seg-amber);
  border-bottom: 1px solid var(--seg-line);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .dialog input {
  width: 100%; padding: 12px 14px; font-size: 13px; color: var(--seg-text);
  border-bottom: 1px solid var(--seg-line); font-family: var(--seg-font-mono);
}
body[data-theme="console"] .dialog .dialog-actions {
  padding: 10px 14px; display: flex; gap: 8px; justify-content: flex-end;
}
body[data-theme="console"] .dialog .dialog-actions button {
  padding: 4px 12px; font-size: 11px;
  border: 1px solid var(--seg-line); color: var(--seg-muted);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .dialog .dialog-actions .primary {
  background: var(--seg-amber); color: var(--seg-bg); border: none; font-weight: 600;
}

/* view stub */
body[data-theme="console"] .view-stub {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--seg-muted);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .view-stub .big { font-size: 14px; color: var(--seg-amber); }
body[data-theme="console"] .view-stub .hint { font-size: 10.5px; color: var(--seg-faint); }

/* kanban view */
body[data-theme="console"] .kanban {
  flex: 1; display: grid;
  grid-template-columns: repeat(4, minmax(220px, 1fr));
  overflow: auto; background: var(--seg-bg);
  font-family: var(--seg-font-mono);
}
body[data-theme="console"] .kanban-col {
  display: flex; flex-direction: column;
  border-right: 1px dashed var(--seg-line);
  min-width: 0; transition: background 140ms ease;
}
body[data-theme="console"] .kanban-col:last-child { border-right: none; }
body[data-theme="console"] .kanban-col.drag-over { background: var(--seg-accent-dim); }
body[data-theme="console"] .kanban-col-head {
  position: sticky; top: 0; z-index: 1;
  padding: 10px 14px 6px; background: var(--seg-bg);
  border-bottom: 1px dashed var(--seg-line);
  display: flex; align-items: baseline; gap: 6px;
  font-family: var(--seg-font-mono);
  font-size: 10.5px; letter-spacing: 0.5px;
  color: var(--seg-muted);
}
body[data-theme="console"] .kanban-col-head.g-in_progress { color: var(--seg-inprog); }
body[data-theme="console"] .kanban-col-head.g-blocker     { color: var(--seg-blocker); }
body[data-theme="console"] .kanban-col-head.g-todo        { color: var(--seg-todo); }
body[data-theme="console"] .kanban-col-head.g-done        { color: var(--seg-done); }
body[data-theme="console"] .kanban-col-head .glyph { font-size: 11px; }
body[data-theme="console"] .kanban-col-head .n {
  margin-left: auto; color: var(--seg-faint);
  font-variant-numeric: tabular-nums;
}
body[data-theme="console"] .kanban-col-body {
  flex: 1; padding: 8px 10px; overflow: auto;
  display: flex; flex-direction: column; gap: 6px;
  min-height: 120px;
}
body[data-theme="console"] .kanban-card {
  padding: 8px 10px;
  background: var(--seg-surface);
  border: 1px solid var(--seg-line);
  border-left: 2px solid transparent;
  cursor: grab;
  color: var(--seg-text);
  font-family: var(--seg-font-mono);
  font-size: 11.5px; line-height: 1.4;
  transition: border-color 120ms ease, opacity 120ms ease;
}
body[data-theme="console"] .kanban-card.s-in_progress { border-left-color: var(--seg-inprog); }
body[data-theme="console"] .kanban-card.s-blocker     { border-left-color: var(--seg-blocker); }
body[data-theme="console"] .kanban-card.s-todo        { border-left-color: var(--seg-todo); }
body[data-theme="console"] .kanban-card.s-done        { border-left-color: var(--seg-done); }
body[data-theme="console"] .kanban-card:hover { border-color: var(--seg-line2); }
body[data-theme="console"] .kanban-card.selected { border-color: var(--seg-amber); border-left-color: var(--seg-amber); }
body[data-theme="console"] .kanban-card.dragging { opacity: 0.35; cursor: grabbing; }
body[data-theme="console"] .kanban-card .card-top {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
  margin-bottom: 4px;
}
body[data-theme="console"] .kanban-card .pri-bang {
  font-size: 11px; font-weight: 600; letter-spacing: -0.3px;
  font-family: var(--seg-font-mono); min-width: 22px;
}
body[data-theme="console"] .kanban-card .pri-bang.p0 { color: var(--seg-pri0); }
body[data-theme="console"] .kanban-card .pri-bang.p1 { color: var(--seg-pri1); }
body[data-theme="console"] .kanban-card .pri-bang.p2 { color: var(--seg-pri2); }
body[data-theme="console"] .kanban-card .pri-bang.p3 { color: var(--seg-pri3); }
body[data-theme="console"] .kanban-card .card-id {
  color: var(--seg-muted); font-size: 10.5px; font-family: var(--seg-font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
body[data-theme="console"] .kanban-card .card-title {
  color: var(--seg-text); font-family: var(--seg-font-body);
  font-size: 12px; line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 4px;
}
body[data-theme="console"] .kanban-card .card-bottom {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
  font-size: 10px; color: var(--seg-faint);
  min-width: 0;
}
body[data-theme="console"] .kanban-card .card-bottom .card-time { white-space: nowrap; }
body[data-theme="console"] .kanban-card .blocker-chip {
  font-size: 10px; font-family: var(--seg-font-mono); color: var(--seg-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
body[data-theme="console"] .kanban-card .blocker-chip.unresolved { color: var(--seg-red); }
body[data-theme="console"] .kanban-card .blocker-chip.resolved   { color: var(--seg-green); }
body[data-theme="console"] .kanban-empty {
  color: var(--seg-faint); font-family: var(--seg-font-mono);
  font-size: 10.5px; text-align: center;
  padding: 24px 8px; border: 1px dashed var(--seg-line);
}

/* graph view */
body[data-theme="console"] .graph {
  flex: 1; overflow: auto; background: var(--seg-bg);
  font-family: var(--seg-font-mono);
}
/* When the detail panel is open it overlays ~400px on the right; pad the
   graph's scrollable area so the user can scroll right to peek under it. */
body[data-theme="console"] .graph.has-detail { padding-right: 420px; }
body[data-theme="console"] .graph-head {
  position: sticky; top: 0; z-index: 2; background: var(--seg-bg);
  display: flex; gap: 16px; padding: 9px 14px;
  border-bottom: 1px dashed var(--seg-line);
  font-size: 10.5px; color: var(--seg-muted);
}
body[data-theme="console"] .graph-head .head-tag { color: var(--seg-text); }
body[data-theme="console"] .graph-head .d-ready { color: var(--seg-green); }
body[data-theme="console"] .graph-head .d-blk   { color: var(--seg-red); }
body[data-theme="console"] .graph-head .d-act   { color: var(--seg-amber); }
body[data-theme="console"] .graph-svg { display: block; }
body[data-theme="console"] .graph-svg .g-bg { fill: transparent; pointer-events: all; cursor: default; }
body[data-theme="console"] .graph-svg .edge { fill: none; pointer-events: none; transition: opacity 160ms ease; }
body[data-theme="console"] .graph-svg .edge.open    { stroke: var(--seg-line2); stroke-width: 1; stroke-dasharray: 2 2; }
body[data-theme="console"] .graph-svg .edge.blocked { stroke: var(--seg-red);  stroke-width: 1.4; }
body[data-theme="console"] .graph-svg .arrow.open    { fill: var(--seg-line2); }
body[data-theme="console"] .graph-svg .arrow.blocked { fill: var(--seg-red); }
body[data-theme="console"] .graph-svg .edge.off { opacity: 0.10; }
body[data-theme="console"] .graph-svg .g-node { cursor: pointer; transition: opacity 160ms ease; }
body[data-theme="console"] .graph-svg .g-node.off { opacity: 0.20; }
body[data-theme="console"] .graph-svg .g-node .bg {
  fill: var(--seg-surface); stroke: var(--seg-line2); stroke-width: 1;
}
/* Blocker status emphasis: red bracket-style outline + tinted fill */
body[data-theme="console"] .graph-svg .g-node.s-blocker .bg {
  fill: rgba(224,106,74,0.07);
  stroke: var(--seg-red);
  stroke-width: 1.5;
  stroke-dasharray: 6 2 2 2;
}
body[data-theme="console"] .graph-svg .g-node.s-blocker .bar {
  stroke-width: 2;
  animation: segConBlockBar 1.6s ease-in-out infinite;
}
@keyframes segConBlockBar { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
/* P1 emphasis: amber double-stroke outline */
body[data-theme="console"] .graph-svg .g-node.p-1 .bg { stroke-width: 1.5; }
/* "Currently blocking other work" emphasis: amber border + bold deps tag */
body[data-theme="console"] .graph-svg .g-node.is-blocking .bg {
  stroke: var(--seg-amber); stroke-width: 1.4; stroke-dasharray: none;
}
/* Selection outline overrides */
body[data-theme="console"] .graph-svg .g-node.sel .bg { fill: var(--seg-surface2); stroke: var(--seg-amber); stroke-width: 1.8; stroke-dasharray: none; }
body[data-theme="console"] .graph-svg .g-node.s-todo        .bar { stroke: var(--seg-todo);    stroke-width: 1.5; }
body[data-theme="console"] .graph-svg .g-node.s-in_progress .bar { stroke: var(--seg-inprog);  stroke-width: 1.5; }
body[data-theme="console"] .graph-svg .g-node.s-blocker     .bar { stroke: var(--seg-blocker); stroke-width: 2; }
body[data-theme="console"] .graph-svg .g-node.s-done        .bar { stroke: var(--seg-done);    stroke-width: 1.5; }
body[data-theme="console"] .graph-svg .g-node.s-closed      .bar { stroke: var(--seg-closed);  stroke-width: 1.5; }
body[data-theme="console"] .graph-svg .g-node .ring {
  fill: none; stroke: var(--seg-green); stroke-width: 1; stroke-dasharray: 3 3;
}
body[data-theme="console"] .graph-svg .g-meta {
  fill: var(--seg-muted);
  font: 9px/1 var(--seg-font-mono);
}
body[data-theme="console"] .graph-svg .g-meta .g-pri {
  font-weight: 600;
}
body[data-theme="console"] .graph-svg .g-meta .g-pri.p-1 { fill: var(--seg-red); }
body[data-theme="console"] .graph-svg .g-meta .g-pri.p-2 { fill: var(--seg-amber); }
body[data-theme="console"] .graph-svg .g-meta .g-pri.p-3 { fill: var(--seg-muted); opacity: 0.7; }
body[data-theme="console"] .graph-svg .g-meta .g-deps {
  fill: var(--seg-amber);
  font-weight: 600;
}
body[data-theme="console"] .graph-svg .g-title {
  font: 11px/1.3 var(--seg-font-body, var(--seg-font-mono));
  color: var(--seg-text);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* console animations */
@keyframes segBlink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0.1; } }
@keyframes segPulseB {
  0%   { background: rgba(224,184,74,0.2); }
  100% { background: transparent; }
}
@keyframes segEnterB {
  0%   { opacity: 0; transform: translateX(-8px); background: rgba(143,198,107,0.08); }
  100% { opacity: 1; transform: none; background: transparent; }
}
.seg-blink { animation: segBlink 1.1s steps(2,end) infinite; }
body[data-theme="console"] .seg-pulse { animation: segPulseB 1.2s ease-out; }
body[data-theme="console"] .seg-enter { animation: segEnterB 500ms cubic-bezier(.2,.7,.2,1); }

/* a11y focus */
body[data-theme="console"] button:focus-visible,
body[data-theme="console"] input:focus-visible,
body[data-theme="console"] textarea:focus-visible,
body[data-theme="console"] select:focus-visible,
body[data-theme="console"] .row:focus-visible,
body[data-theme="console"] .project-item:focus-visible,
body[data-theme="console"] .side-item:focus-visible {
  outline: 1px solid var(--seg-amber);
  outline-offset: 1px;
}

/* responsive */
@media (max-width: 1100px) {
  body[data-theme="console"] .sidebar { width: 180px; }
  body[data-theme="console"] .detail { width: 340px; }
  body[data-theme="console"] .search { min-width: 200px; }
  body[data-theme="console"] .view-tab .hint { display: none; }
}
@media (max-width: 900px) {
  body[data-theme="console"] .sidebar { width: 160px; }
  body[data-theme="console"] .row {
    grid-template-columns: 14px 24px 72px 60px 1fr auto;
    gap: 8px; padding: 4px 10px;
  }
  body[data-theme="console"] .blocker-chip { display: none; }
  body[data-theme="console"] .detail { width: min(420px, 100%); }
}
@media (max-width: 720px) {
  body[data-theme="console"] .sidebar { display: none; }
  body[data-theme="console"] .topbar { flex-wrap: wrap; gap: 8px; }
  body[data-theme="console"] .topbar-stats { overflow-x: auto; white-space: nowrap; }
  body[data-theme="console"] .detail { width: 100%; }
  body[data-theme="console"] .row {
    grid-template-columns: 14px 24px 1fr auto; gap: 6px;
  }
  body[data-theme="console"] .row .row-id { display: none; }
  body[data-theme="console"] .row .status-pill { min-width: 0; }
  body[data-theme="console"] .status-pill .label { display: none; }
}

/* ===== Dossier theme (Direction C) ===== */
body[data-theme="dossier"] {
  --seg-bg: #efece4;
  --seg-surface: #f8f5ec;
  --seg-surface2: #e8e3d4;
  --seg-line: rgba(22,19,18,0.5);
  --seg-line2: rgba(22,19,18,0.18);
  --seg-text: #161312;
  --seg-text2: #2e2a27;
  --seg-muted: #6d665c;
  --seg-faint: #a49d8f;
  --seg-accent: #a8291f;
  --seg-accent-dim: rgba(168,41,31,0.14);
  --seg-todo: #6d665c;
  --seg-inprog: #8a6a1a;
  --seg-blocker: #a8291f;
  --seg-done: #3a5a2e;
  --seg-closed: #a49d8f;
  --seg-pri0: #a8291f;
  --seg-pri1: #8a6a1a;
  --seg-pri2: #1f3d6a;
  --seg-pri3: #a49d8f;
  --seg-font: "Space Grotesk", system-ui, sans-serif;
  --seg-font-mono: "Space Grotesk", ui-monospace, monospace;
  --seg-font-serif: "Instrument Serif", "Times New Roman", serif;
  --seg-font-feature: normal;
  --seg-glow: none;
  --seg-rule: #161312;
  --seg-rule2: #b3ac9e;
  --seg-scroll: rgba(22,19,18,0.22);
  --seg-scroll-hover: rgba(22,19,18,0.4);
}
body[data-theme="dossier"][data-mode="dark"] {
  --seg-bg: #14110e;
  --seg-surface: #1a1713;
  --seg-surface2: #241f18;
  --seg-line: rgba(234,226,208,0.22);
  --seg-line2: rgba(234,226,208,0.10);
  --seg-text: #eae2d0;
  --seg-text2: #c8bfa9;
  --seg-muted: #8f8775;
  --seg-faint: #5a5447;
  --seg-accent: #d9604f;
  --seg-accent-dim: rgba(217,96,79,0.18);
  --seg-todo: #8f8775;
  --seg-inprog: #d9a650;
  --seg-blocker: #d9604f;
  --seg-done: #8cb56f;
  --seg-closed: #5a5447;
  --seg-pri0: #d9604f;
  --seg-pri1: #d9a650;
  --seg-pri2: #7aa7d9;
  --seg-pri3: #5a5447;
  --seg-rule: #6f675a;
  --seg-rule2: rgba(234,226,208,0.12);
  --seg-scroll: rgba(234,226,208,0.22);
  --seg-scroll-hover: rgba(234,226,208,0.4);
}

body[data-theme="dossier"] .app {
  height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
}

/* topbar: masthead + stats + controls */
body[data-theme="dossier"] .topbar {
  border-bottom: 2px solid var(--seg-rule);
  background: var(--seg-bg);
  flex-shrink: 0;
}
body[data-theme="dossier"] .dossier-masthead {
  padding: 18px 24px 12px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: end; gap: 16px;
}
body[data-theme="dossier"] .dossier-masthead .left,
body[data-theme="dossier"] .dossier-masthead .right {
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--seg-muted);
}
body[data-theme="dossier"] .dossier-masthead .right {
  display: flex; justify-content: flex-end; gap: 14px; align-items: center;
  letter-spacing: 2px; flex-wrap: wrap;
}
body[data-theme="dossier"] .dossier-masthead .title {
  font-family: var(--seg-font-serif);
  font-size: 44px; line-height: 1; color: var(--seg-text);
  letter-spacing: -1px; text-align: center;
  white-space: nowrap;
}
body[data-theme="dossier"] .dossier-masthead .title .sub {
  font-style: italic; font-size: 24px; color: var(--seg-muted);
}
body[data-theme="dossier"] .dossier-masthead .ver {
  font-family: var(--seg-font); font-size: 10px;
  color: var(--seg-faint); letter-spacing: 1px; margin-left: 6px;
}

body[data-theme="dossier"] .topbar-stats {
  border-top: 1px solid var(--seg-rule);
  padding: 6px 24px;
  display: flex; gap: 14px;
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 1px;
  color: var(--seg-muted); text-transform: uppercase;
  flex-wrap: wrap;
}
body[data-theme="dossier"] .topbar-stats strong { color: var(--seg-text); font-weight: 500; }
body[data-theme="dossier"] .topbar-stats .stat-spacer { flex: 1; }
body[data-theme="dossier"] .topbar-stats .c-blocker strong { color: var(--seg-blocker); }
body[data-theme="dossier"] .topbar-stats .c-done strong    { color: var(--seg-done); }

body[data-theme="dossier"] .topbar-controls {
  border-top: 0.5px solid var(--seg-rule2);
  padding: 10px 24px;
  display: flex; gap: 14px; align-items: center;
  flex-wrap: wrap;
}

body[data-theme="dossier"] .view-tabs {
  display: flex; gap: 2px;
}
body[data-theme="dossier"] .view-tab {
  padding: 6px 14px;
  font-family: var(--seg-font-serif);
  font-size: 16px; color: var(--seg-muted);
  border-bottom: 2px solid transparent;
}
body[data-theme="dossier"] .view-tab .hint {
  font-family: var(--seg-font); font-size: 9px; letter-spacing: 1px;
  color: var(--seg-faint); margin-left: 4px;
}
body[data-theme="dossier"] .view-tab.active {
  color: var(--seg-text); font-style: italic;
  border-bottom-color: var(--seg-rule);
}
body[data-theme="dossier"] .view-tab[data-disabled] { opacity: 0.45; cursor: not-allowed; }

body[data-theme="dossier"] .search-wrap {
  flex: 1; display: flex; justify-content: flex-end;
}
body[data-theme="dossier"] .search {
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--seg-rule);
  padding: 3px 0; min-width: 240px; max-width: 380px; width: 100%;
  font-family: var(--seg-font);
}
body[data-theme="dossier"] .search .icon {
  font-size: 10px; letter-spacing: 2px; color: var(--seg-muted);
  white-space: nowrap;
}
body[data-theme="dossier"] .search input {
  flex: 1; font-size: 13px; color: var(--seg-text);
  font-family: var(--seg-font); min-width: 0;
}
body[data-theme="dossier"] .search .slash { display: none; }

body[data-theme="dossier"] .topbar-btn {
  font-family: var(--seg-font); font-size: 10px; letter-spacing: 2px;
  border: 1px solid var(--seg-rule); padding: 4px 8px;
  color: var(--seg-text);
}

body[data-theme="dossier"] .agent-ind {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--seg-font-serif); font-size: 13px;
  font-style: italic; letter-spacing: 0;
  color: var(--seg-muted); text-transform: none;
}
body[data-theme="dossier"] .agent-dot {
  width: 6px; height: 6px; border-radius: 3px; background: var(--seg-faint);
}
body[data-theme="dossier"] .agent-ind.on { color: var(--seg-inprog); }
body[data-theme="dossier"] .agent-ind.on .agent-dot {
  background: var(--seg-inprog); animation: segInkFadeC 2.6s ease-in-out infinite;
}

body[data-theme="dossier"] .theme-select {
  font-family: var(--seg-font-serif);
  font-size: 14px; font-style: italic; letter-spacing: 0;
  color: var(--seg-text);
  border: none; border-bottom: 0.5px dotted var(--seg-rule2);
  padding: 0 4px;
  background: transparent; cursor: pointer;
  text-transform: none;
}
body[data-theme="dossier"] .theme-select:hover { color: var(--seg-text); }
body[data-theme="dossier"] .mode-btn {
  font-family: var(--seg-font-serif);
  font-size: 15px; font-style: italic; letter-spacing: 0;
  color: var(--seg-muted);
  border: none; border-bottom: 0.5px dotted var(--seg-rule2);
  padding: 0 4px;
  text-transform: none;
}
body[data-theme="dossier"] .mode-btn:hover { color: var(--seg-text); }

/* sidebar */
body[data-theme="dossier"] .main { display: flex; flex: 1; min-height: 0; position: relative; }
body[data-theme="dossier"] .sidebar {
  width: 240px; border-right: 2px solid var(--seg-rule);
  padding: 20px; flex-shrink: 0;
  background: var(--seg-bg);
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 2px;
}
body[data-theme="dossier"] .side-label {
  font-family: var(--seg-font-serif);
  font-style: italic; font-size: 13px;
  color: var(--seg-muted); margin: 0 0 8px; letter-spacing: 0.2px;
  display: flex; justify-content: space-between; align-items: center;
}
body[data-theme="dossier"] .side-label .add-btn {
  color: var(--seg-faint); font-size: 16px; padding: 0 4px; line-height: 1;
  font-family: var(--seg-font-serif);
}
body[data-theme="dossier"] .side-label .add-btn:hover { color: var(--seg-text); }

body[data-theme="dossier"] .side-item {
  width: 100%; padding: 6px 0;
  font-family: var(--seg-font-serif);
  font-size: 17px; color: var(--seg-muted);
  border-bottom: 0.5px dashed var(--seg-rule2);
  display: flex; justify-content: space-between; align-items: baseline;
  text-align: left;
}
body[data-theme="dossier"] .side-item:hover { color: var(--seg-text); }
body[data-theme="dossier"] .side-item.ready-active {
  color: var(--seg-text); font-style: italic;
}
body[data-theme="dossier"] .side-item .pill {
  font-family: var(--seg-font); font-size: 10px; color: var(--seg-muted);
  font-variant-numeric: tabular-nums;
}

body[data-theme="dossier"] .project-item {
  width: 100%; padding: 6px 0;
  border-bottom: 0.5px dashed var(--seg-rule2);
  text-align: left;
}
body[data-theme="dossier"] .project-item:hover .project-name { color: var(--seg-text); }
body[data-theme="dossier"] .project-row {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
body[data-theme="dossier"] .project-item .project-name {
  font-family: var(--seg-font-serif); font-size: 17px;
  color: var(--seg-text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
}
body[data-theme="dossier"] .project-item.active .project-name {
  color: var(--seg-text); font-style: italic;
}
body[data-theme="dossier"] .project-item .project-count {
  font-family: var(--seg-font); font-size: 10px; color: var(--seg-muted);
  font-variant-numeric: tabular-nums;
}
body[data-theme="dossier"] .project-ornaments {
  display: flex; gap: 6px; margin-top: 3px; flex-wrap: wrap;
  font-family: var(--seg-font); font-size: 9px; letter-spacing: 1px;
  color: var(--seg-muted); text-transform: uppercase;
}
body[data-theme="dossier"] .project-ornaments .c-blocker { color: var(--seg-blocker); }
body[data-theme="dossier"] .project-ornaments .c-done    { color: var(--seg-done); }
body[data-theme="dossier"] .project-ornaments .c-inprog  { color: var(--seg-inprog); }

body[data-theme="dossier"] .ready-box {
  margin-top: 20px; padding: 12px 14px;
  border: 1.5px solid var(--seg-blocker);
  transform: rotate(-1deg);
  background: var(--seg-bg);
  text-align: left;
}
body[data-theme="dossier"] .ready-box.active {
  background: var(--seg-accent-dim);
}
body[data-theme="dossier"] .ready-box .label {
  font-family: var(--seg-font); font-size: 9px; letter-spacing: 2px;
  color: var(--seg-blocker); font-weight: 600;
}
body[data-theme="dossier"] .ready-box .num {
  font-family: var(--seg-font-serif);
  font-size: 36px; color: var(--seg-blocker); line-height: 1; margin-top: 4px;
  font-style: italic;
}
body[data-theme="dossier"] .ready-box .sub {
  font-family: var(--seg-font); font-size: 10px;
  color: var(--seg-muted); margin-top: 4px; letter-spacing: 0.3px;
}

body[data-theme="dossier"] .side-shortcuts {
  margin-top: auto; padding-top: 20px;
  font-family: var(--seg-font);
  font-size: 9.5px; color: var(--seg-muted);
  line-height: 1.8; letter-spacing: 0.5px;
}
body[data-theme="dossier"] .side-shortcuts .title {
  color: var(--seg-text); margin-bottom: 4px;
  letter-spacing: 1px; text-transform: uppercase;
}

/* content + composer */
body[data-theme="dossier"] .content {
  flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative;
}
body[data-theme="dossier"] .composer {
  border-bottom: 1px solid var(--seg-rule);
  background: var(--seg-surface);
  padding: 18px 24px;
}
body[data-theme="dossier"] .composer-header {
  font-family: var(--seg-font); font-size: 9px; letter-spacing: 3px;
  color: var(--seg-muted); text-transform: uppercase; margin-bottom: 6px;
}
body[data-theme="dossier"] .composer-title {
  width: 100%;
  font-family: var(--seg-font-serif); font-size: 22px;
  color: var(--seg-text); letter-spacing: -0.2px;
}
body[data-theme="dossier"] .composer-body {
  width: 100%; resize: none; padding: 0;
  font-family: var(--seg-font-serif); font-size: 14px;
  color: var(--seg-muted); line-height: 1.5; min-height: 40px;
  margin-top: 6px; background: transparent;
}
body[data-theme="dossier"] .composer-row {
  display: flex; gap: 10px; align-items: center; margin-top: 8px;
  font-family: var(--seg-font);
  font-size: 10px; letter-spacing: 1px;
  color: var(--seg-muted); text-transform: uppercase;
  flex-wrap: wrap;
}
body[data-theme="dossier"] .composer-row .label { color: var(--seg-muted); }
body[data-theme="dossier"] .pri-btn {
  padding: 2px 8px;
  border: 1px solid var(--seg-rule2);
  color: var(--seg-muted);
  font-family: var(--seg-font-serif); font-size: 13px; font-style: italic;
  min-width: 22px;
}
body[data-theme="dossier"] .pri-btn.active {
  border-color: var(--seg-rule); color: var(--seg-text);
}
body[data-theme="dossier"] .composer-hint {
  flex: 1; text-align: right;
  font-size: 10px; color: var(--seg-faint); letter-spacing: 0.5px;
}
body[data-theme="dossier"] .composer select {
  font-family: var(--seg-font); font-size: 10px; letter-spacing: 1px;
  color: var(--seg-muted);
  border: 1px solid var(--seg-rule2); padding: 2px 6px;
  background: var(--seg-surface); cursor: pointer;
}
/* list */
body[data-theme="dossier"] .list { flex: 1; overflow: auto; }
body[data-theme="dossier"] .list-group-header {
  padding: 22px 24px 8px;
  font-family: var(--seg-font-serif);
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--seg-muted);
  border-bottom: 0.5px solid var(--seg-rule);
  display: flex; justify-content: space-between; align-items: baseline;
  background: var(--seg-bg);
  position: sticky; top: 0; z-index: 1;
}
body[data-theme="dossier"] .list-group-header.g-in_progress { color: var(--seg-inprog); }
body[data-theme="dossier"] .list-group-header.g-blocker     { color: var(--seg-blocker); }
body[data-theme="dossier"] .list-group-header.g-done        { color: var(--seg-done); }
body[data-theme="dossier"] .list-group-header.g-closed      { color: var(--seg-closed); }
body[data-theme="dossier"] .list-group-header .glyph {
  font-size: 14px; margin-right: 8px;
}
body[data-theme="dossier"] .list-group-header .n {
  font-family: var(--seg-font); font-size: 10px; color: var(--seg-muted);
  letter-spacing: 0.5px; text-transform: none;
}

body[data-theme="dossier"] .row {
  display: grid;
  grid-template-columns: 52px 38px 112px 1fr auto 84px;
  gap: 16px; align-items: center;
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--seg-rule2);
  cursor: pointer; position: relative;
}
body[data-theme="dossier"] .row.selected { background: var(--seg-surface); }
body[data-theme="dossier"] .row-num {
  font-family: var(--seg-font-serif);
  font-size: 13px; font-style: italic; color: var(--seg-faint);
  font-variant-numeric: tabular-nums;
}
body[data-theme="dossier"] .pri-roman {
  font-family: var(--seg-font-serif);
  font-style: italic; font-weight: 400;
  font-size: 22px; letter-spacing: 0.5px;
  line-height: 1; min-width: 28px;
  display: inline-block;
}
body[data-theme="dossier"] .pri-roman.p0 { color: var(--seg-pri0); }
body[data-theme="dossier"] .pri-roman.p1 { color: var(--seg-pri1); }
