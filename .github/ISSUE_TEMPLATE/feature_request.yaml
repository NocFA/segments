name: Feature Request
description: Propose a new feature or behaviour change.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or friction that motivated this request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should Segments do? CLI flag, API change, UI addition -- be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you prefer this one.

  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to open a PR?
      options:
        - "Yes"
        - "Maybe, with some guidance"
        - "No"
    validations:
      required: true
